
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSVP</title>

<style>

/* PAGE */

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);

  margin:0 auto;
  padding:40px 16px;

  max-width:1000px;
  color:#6a2a2a;
}

html, body {
  overscroll-behavior: none;
}

body {
  overflow-x: hidden;
}

#coupleName{
text-align:center;
font-size:35px;
color:#9c1818;
margin-bottom:24px;
font-weight:700;
}

/* LAYOUT */

.layout{
  display:flex;
  gap:40px;
 justify-content:space-between;
  align-items:center;
  flex-wrap:nowrap;
  margin:0 auto;
}


.rsvp-subtitle{
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:#8b1a1a;
  margin-top:-12px;
  margin-bottom:30px;
  letter-spacing:0.3px;
}

/* VIDEO */

.player{
width:380px;
max-width:100%;
border-radius:16px;
overflow:hidden;
box-shadow:0 18px 40px rgba(0,0,0,0.25);
display:flex;
flex:0 0 380px;
}

.player iframe{
width:100%;
height:100%;
aspect-ratio:9/16;
border:0;
}

.form-box{
  width:100%;
  max-width:520px;
  flex:1;

  background:white;
  padding:20px;
  border-radius:16px;
  border:2px solid #b41111;

  box-shadow:
  0 10px 20px rgba(0,0,0,0.18),
  inset 0 0 4px rgba(255,255,255,0.6);

  display:flex;
  flex-direction:column;
  overflow:hidden;
}


/* FIELDS */

.field{
margin-bottom:10px;
}

.field label{
display:block;
font-weight:700;
margin-bottom:3px;
font-size:15px;
color:#7e2a2a;
}

input,select,textarea{
width:100%;
box-sizing:border-box;
padding:8px;
border-radius:8px;
border:1px solid rgba(160,0,40,0.25);
font-size:15px;
}
textarea{
height:60px;
resize:none;
}

/* BUTTON */

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:10px;
background:#9c1818;
color:white;
font-weight:700;
cursor:pointer;
transition:.25s;
}

button:active{
transform:scale(0.97);

}

/* LOADING */

button.loading{
opacity:.7;
pointer-events:none;
position:relative;
}

button.loading::after{
content:"";
width:14px;
height:14px;

border:2px solid white;
border-top:2px solid transparent;
border-radius:50%;

position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
animation:spin .8s linear infinite;
}

@keyframes spin{
0%{transform:translateY(-50%) rotate(0deg);}
100%{transform:translateY(-50%) rotate(360deg);}
}

/* EXTRA GUEST FIELD */

#extraGuests{
display:none;
}

.highlight-field{
background:#ffe6ec;
animation:fadeHighlight 1.6s ease;
}

@keyframes fadeHighlight{
0%{background:#ffe6ec;}
100%{background:white;}
}

.slide-down{
animation:slideDown .35s ease;
}

@keyframes slideDown{
0%{opacity:0;transform:translateY(-6px);}
100%{opacity:1;transform:translateY(0);}
}

/* MISS YOU */

#missYou{
display:none;
margin-top:8px;
padding:8px;
background:#fff7f7;
border:1px solid #ffd0d0;
border-radius:8px;
font-size:13px;
}

/* THANK YOU */

#thanksScreen{
display:none;
text-align:center;
padding: 0;
}

#thanksScreen h2{
color:#9c1818;
margin-bottom:10px;
}

/* TOAST */

#toast{
position:fixed;
top:20px;
right:20px;

background:#28a745;
color:white;

padding:10px 16px;
border-radius:8px;

font-size:13px;
font-weight:600;

opacity:0;
transform:translateY(-20px);
transition:.3s;
}

#toast.show{
opacity:1;
transform:translateY(0);
}

/* ================= MOBILE ================= */

@media(max-width:800px){

  body{
    margin:0;
    padding:0;
  }

  .rsvp-subtitle{
    font-size:18px;
  }


  .layout{
    display:flex;
    flex-direction:column;
    align-items:stretch;
    gap:18px;
    padding:16px;
  }
  
.player{
  width:100%;
  max-width:100%;
  margin:0;

  border-radius:0;
  box-shadow:none;
}
  .form-box{
    width:90%;
    max-width:380px;
    margin:0 auto;
    padding:16px;
  }

  input,
  select,
  textarea{
    font-size:16px;
    padding:12px;
  }

  button{
    padding:14px;
    font-size:16px;
    width:100%;
  }

  #smsBubble{
    flex-direction:column;
    align-items:stretch;
    text-align:center;
    gap:10px;
    transition:0.25s ease;
  }

  #smsQuickBtn{
    width:100%;
    padding:12px;
    font-size:14px;
    transition:0.2s ease;
  }

  #smsQuickBtn:hover{
    transform:translateY(-2px);
  }

  /* 🔥 MOBILE SHARE (ЛЁГКИЙ ВАРИАНТ) */

  #shareBlock{
    display:none;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    width:100%;
    margin-top:8px;
    padding:0 10px;
  }

  .share-icon{
    display:flex;
    align-items:center;
    justify-content:center;

    padding:6px;
    border-radius:10px;

    background:none;
    box-shadow:none;

    cursor:pointer;
  }

  .share-icon img{
    width:28px;
    height:28px;
  }

  .share-icon:active{
    transform:scale(0.9);
    opacity:0.7;
  }

}


/* ================= COMMON (НЕ ТРОГАЕМ) ================= */

.preview-line{
  display:flex;
  align-items:center;
  gap:8px;

  font-size:16px;

  border-bottom:1px solid rgba(180,17,17,0.15);
  padding-bottom:6px;
  margin-bottom:10px;
}

.preview-line label{
  width:110px;
  flex-shrink:0;
  font-weight:700;
}

.preview-line .dot{
  white-space:nowrap;
  font-size:20px;
  font-weight:700;
}

.preview-line span[data-preview]{
  font-size:18px;
  font-weight:700;
  color:#9c1818;
  letter-spacing:0.2px;
}

.share-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  width:100%;
}


/* ================= DESKTOP ================= */

@media(min-width:801px){

  .share-icon{
    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    padding:12px;
    border-radius:14px;

    transition:all 0.25s ease;

    background:linear-gradient(145deg, #ffffff, #fff0f0);

    box-shadow:
      0 6px 16px rgba(0,0,0,0.12),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .share-icon:hover{
    transform:translateY(-5px) scale(1.06);

    box-shadow:
      0 14px 30px rgba(0,0,0,0.18),
      0 0 12px rgba(255, 60, 60, 0.25),
      0 0 24px rgba(255, 60, 60, 0.18);
  }

  .share-icon:active{
    transform:scale(0.94);

    box-shadow:
      0 4px 10px rgba(0,0,0,0.15),
      inset 0 2px 6px rgba(0,0,0,0.15);
  }

  .share-icon img{
    width:34px;
    height:34px;

    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25));
  }

}


</style>
</head>

<script type="module">

function formatDate(date){

if(!date) return "";

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

const d=new Date(date);

return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

}

function formatTime(time){

if(!time) return "";

return time.slice(0,5);

}

document.querySelector('[data-preview="venue"]').textContent = data.venue || "";

};

  desktop.style.display = "block";

initShareButtons();

}

  showToast("Something went wrong. Please try again.", true);
  btn.classList.remove("loading");
  sending = false;
}

smsBtn.onclick = async () => {

const url = new URL(window.location.href);
url.searchParams.delete("mode");
const link = url.toString();

const text = "You're invited! RSVP here: " + link;


  // 📱 если есть native share (iPhone / Android)

      });

</script>

<script>

  const toast = document.getElementById("toast");

  toast.textContent = message;
  toast.style.background = isError ? "#d20000" : "#28a745";

  toast.classList.add("show");

  setTimeout(()=>{

<script>

document.addEventListener("click", async (e) => {

  if (e.target.id === "saveInviteBtn") {

    const url = window.location.href;

    if (navigator.share) {
      try {
        await navigator.share({
          title: "Wedding Invite",
          text: "Save this invite",
          url: url
        });
        return;
      } catch {}
    }

    navigator.clipboard.writeText(url);
    alert("Link copied!");
  }

});

<script>

document.addEventListener("DOMContentLoaded", () => {

  const shareIcons = document.querySelectorAll(".share-icon");

  shareIcons.forEach(btn => {

    btn.addEventListener("click", () => {

      const type = btn.dataset.type;

      const url = window.location.href;

      const text = "You're invited! RSVP here: " + url;

      if (type === "whatsapp") {
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
      }

      if (type === "facebook") {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, "_blank");

      if (type === "pinterest") {

        window.location.href = `sms:?body=${encodeURIComponent(text)}`;

});
