<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSVP</title>

<style>

/* PAGE */

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#fff1f4,#ffffff);
margin:40px auto;
max-width:1000px;
padding:0 16px;
color:#6a2a2a;
}

#coupleName{
text-align:center;
font-size:32px;
color:#9c1818;
margin-bottom:24px;
font-weight:700;
}

/* LAYOUT */

.layout{
display:flex;
gap:28px;
justify-content:center;
align-items:stretch;
flex-wrap:wrap;
}

/* VIDEO */

.player{
width:380px;
max-width:100%;
border-radius:16px;
overflow:hidden;
box-shadow:0 18px 40px rgba(0,0,0,0.25);
display:flex;
}

.player iframe{
width:100%;
height:100%;
aspect-ratio:9/16;
border:0;
}

/* FORM */

.form-box{
width:380px;
max-width:100%;
background:white;
padding:20px;
border-radius:16px;
border:2px solid #b41111;

box-shadow:
0 10px 20px rgba(0,0,0,0.18),
inset 0 0 4px rgba(255,255,255,0.6);

display:flex;
flex-direction:column;
overflow:hidden;
}

/* FIELDS */

.field{
margin-bottom:10px;
}

.field label{
display:block;
font-weight:700;
margin-bottom:3px;
font-size:13px;
color:#7e2a2a;
}

input,select,textarea{
width:100%;
box-sizing:border-box;
padding:8px;
border-radius:8px;
border:1px solid rgba(160,0,40,0.25);
font-size:13px;
}
textarea{
height:60px;
resize:none;
}

/* BUTTON */

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:10px;
background:#9c1818;
color:white;
font-weight:700;
cursor:pointer;
transition:.25s;
}

button:active{
transform:scale(0.97);

}

/* LOADING */

button.loading{
opacity:.7;
pointer-events:none;
position:relative;
}

button.loading::after{
content:"";
width:14px;
height:14px;

border:2px solid white;
border-top:2px solid transparent;
border-radius:50%;

position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
animation:spin .8s linear infinite;
}

@keyframes spin{
0%{transform:translateY(-50%) rotate(0deg);}
100%{transform:translateY(-50%) rotate(360deg);}
}

/* EXTRA GUEST FIELD */

#extraGuests{
display:none;
}

.highlight-field{
background:#ffe6ec;
animation:fadeHighlight 1.6s ease;
}

@keyframes fadeHighlight{
0%{background:#ffe6ec;}
100%{background:white;}
}

.slide-down{
animation:slideDown .35s ease;
}

@keyframes slideDown{
0%{opacity:0;transform:translateY(-6px);}
100%{opacity:1;transform:translateY(0);}
}

/* MISS YOU */

#missYou{
display:none;
margin-top:8px;
padding:8px;
background:#fff7f7;
border:1px solid #ffd0d0;
border-radius:8px;
font-size:13px;
}

/* THANK YOU */

#thanksScreen{
display:none;
text-align:center;
padding:30px 20px;
}

#thanksScreen h2{
color:#9c1818;
margin-bottom:10px;
}

/* TOAST */

#toast{
position:fixed;
top:20px;
right:20px;

background:#28a745;
color:white;

padding:10px 16px;
border-radius:8px;

font-size:13px;
font-weight:600;

opacity:0;
transform:translateY(-20px);
transition:.3s;
}

#toast.show{
opacity:1;
transform:translateY(0);
}

/* ================= MOBILE ================= */

@media(max-width:800px){

  body{
    margin:0;
    padding:0;
  }

.layout{
  display:flex;
  flex-direction:column;
  align-items:stretch; /* ← ВАЖНО (не center) */
  gap:18px;
  padding:16px;
}
  
.player{
  width:100%;
  max-width:100%;
  margin:0;
}

.form-box{
  width:90%;
  max-width:380px;
  margin:0 auto;
}
  .form-box{
    padding:16px;
  }

  input,
  select,
  textarea{
    font-size:16px;
    padding:12px;
  }

  button{
    padding:14px;
    font-size:16px;
    width:100%;
  }

#smsBubble{
  flex-direction:column;
  align-items:stretch;
  text-align:center;
  gap:10px;
transition:0.25s ease;
}

#smsQuickBtn{
  width:100%;
  padding:12px;
  font-size:14px;
transition:0.2s ease;
}

#smsQuickBtn:hover{
  transform:translateY(-2px);
}

}

.preview-line{
display:flex;
align-items:center;
gap:4px;
}

.preview-line label{
width:100px;
flex-shrink:0;
font-weight:700;
}

.preview-line{
display:flex;
align-items:center;
gap:8px;
}

.preview-line .dot{
white-space:nowrap;
}

.preview-line span[data-preview]{
font-size:13px;
font-weight:700;
color:#9c1818;
letter-spacing:0.2px;
}

.preview-line{
border-bottom:1px solid rgba(180,17,17,0.15);
padding-bottom:6px;
margin-bottom:10px;
}


.share-icons-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  flex-wrap:nowrap;
  overflow-x:auto;
  padding:6px 0;
}

.share-icon-btn{
  background:none;
  border:none;
  padding:6px;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:0.2s ease;
}

/* 🔥 ВАЖНО: используем fill, НЕ stroke */
.share-icon-btn svg{
  width:22px;
  height:22px;
  fill:#b41111;   /* фирменный цвет */
  display:block;
  transition:0.2s ease;
}

/* hover / tap */
.share-icon-btn:hover svg{
  transform:translateY(-2px);
  opacity:0.9;
}

.share-icon-btn:active svg{
  transform:scale(0.9);
}

</style>
</head>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase=createClient(
"https://octwwpatppbenqwkcqaw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

const token=new URLSearchParams(location.search).get("t");
const guestId=new URLSearchParams(location.search).get("g");

const mode = new URLSearchParams(location.search).get("mode");

/* LOAD SITE DATA */

function formatDate(date){

if(!date) return "";

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

const d=new Date(date);

return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

}

function formatTime(time){

if(!time) return "";

return time.slice(0,5);

}


async function loadSiteData(){

const {data}=await supabase
.from("sites")
.select("couple_name, rsvp_date, video_url, wedding_date, wedding_time, venue, address")
.eq("edit_token",token)
.single();

if(!data) return;

/* couple name */

document.getElementById("coupleName").textContent = data.couple_name || "";

document.getElementById("guestFormTitle").textContent =
data.couple_name + " · RSVP";

/* video */

if(data.video_url){
document.getElementById("videoFrame").src = data.video_url;
}

/* preview fields */

document.querySelector('[data-preview="date"]').textContent = formatDate(data.wedding_date);
document.querySelector('[data-preview="time"]').textContent = data.wedding_time || "";
document.querySelector('[data-preview="venue"]').textContent = data.venue || "";
document.querySelector('[data-preview="address"]').textContent = data.address || "";
document.querySelector('[data-preview="deadline"]').textContent = formatDate(data.rsvp_date);

}

loadSiteData();


async function loadGuestData(){

if(!guestId) return;

const {data}=await supabase
.from("guests")
.select("first_name,last_name,email")
.eq("id",guestId)
.single();

if(!data) return;

nameInput.value = `${data.first_name} ${data.last_name}`;
emailInput.value = data.email;

}

loadGuestData();


/* EXTRA GUESTS */

const guestCount=document.getElementById("guestCount");
const extraGuests=document.getElementById("extraGuests");

guestCount.addEventListener("change",()=>{

if(guestCount.value==="more"){

extraGuests.style.display="block";
extraGuests.classList.add("slide-down");
extraGuests.classList.add("highlight-field");

setTimeout(()=>{
extraGuests.classList.remove("highlight-field");
},1600);

}else{

extraGuests.style.display="none";

}

});

/* MISS YOU */

const rsvpSelect=document.getElementById("rsvpSelect");
const missYou=document.getElementById("missYou");

rsvpSelect.addEventListener("change",()=>{
missYou.style.display=rsvpSelect.value==="no"?"block":"none";
});

/* SUBMIT */

const form=document.getElementById("rsvpForm");
const btn=form.querySelector("button");
const toast=document.getElementById("toast");

let sending=false;

form.addEventListener("submit",async(e)=>{

e.preventDefault();

if(sending)return;

sending=true;
btn.classList.add("loading");

const payload={
token:token,
name:nameInput.value,
email:emailInput.value,
guest_count:guestCount.value,
extra_guests:extraGuestsInput.value,
rsvp_status:rsvpSelect.value,
message:messageInput.value
};

try{

const emailValue = emailInput.value.trim().toLowerCase();

const { data: guestsList } = await supabase
  .from("guests")
  .select("*");

const g = guestsList.find(item =>
  (item.email || "").trim().toLowerCase() === emailValue
);

if (!g) {
  showToast("Guest not found on the list.", true);
  btn.classList.remove("loading");
  sending = false;
  return;
}


if (g.responded_at) {
  showToast("You already submitted RSVP", true);
  btn.classList.remove("loading");
  sending = false;
  return;
}


const { error: updateError } = await supabase
  .from("guests")
  .update({
    name: nameInput.value,
    email: emailInput.value.trim().toLowerCase(),
    guest_count: guestCount.value,
    extra_guests: extraGuestsInput.value,
    rsvp_status: rsvpSelect.value,
    message: messageInput.value,
    responded_at: new Date().toISOString()
  })
  .eq("id", g.id);

if (updateError) {
  console.error(updateError);
  alert("You already submitted RSVP");
  btn.classList.remove("loading");
  sending = false;
  return;
}

toast.classList.add("show");

setTimeout(() => {
  toast.classList.remove("show");
}, 2500);

form.style.display = "none";

// 🔥 меняем текст
const msg = document.getElementById("thanksMessage");
const status = rsvpSelect.value;

if (status === "no") {
  msg.innerHTML = `
    Your RSVP has been received.<br>
    We’ll miss you! ❤️
  `;
} else if (status === "maybe") {
  msg.innerHTML = `
    Your RSVP has been received.<br>
    We hope you can make it ❤️
  `;
} else {
  msg.innerHTML = `
    Your RSVP has been received.<br>
    We look forward to celebrating with you ❤️
  `;
}

// 🔥 НАЧИНАЕТСЯ МАГИЯ
const thanks = document.getElementById("thanksScreen");
const share = document.getElementById("shareBlock");

thanks.style.display = "block";
thanks.style.opacity = "1"; // важно для повторных открытий

// через 1 сек — скрываем thanks
setTimeout(() => {
  thanks.style.transition = "0.5s ease";
  thanks.style.opacity = "0";

  setTimeout(() => {
    thanks.style.display = "none";

    share.style.display = "block";
    share.style.opacity = "0";
    share.style.transition = "0.5s ease";

    setTimeout(() => {
      share.style.opacity = "1";
    }, 50);

  }, 500);

}, 2000);

} catch (err) {
  console.error(err);
  showToast("Something went wrong. Please try again.", true);
  btn.classList.remove("loading");
  sending = false;
}

btn.classList.remove("loading");
sending = false;

});
/* MAP LINK */

document.addEventListener("DOMContentLoaded", () => {

const mapLink = document.getElementById("mapLink");
const mapModal = document.getElementById("mapModal");
const mapFrame = document.getElementById("mapModalFrame");
const closeMap = document.getElementById("closeMapModal");

if(!mapLink) return;

mapLink.addEventListener("click",(e)=>{

e.preventDefault();

const address =
document.querySelector('[data-preview="address"]').textContent.trim();

if(!address) return;

mapFrame.src =
`https://www.google.com/maps?q=${encodeURIComponent(address)}&output=embed`;

mapModal.style.display="flex";

});

closeMap.addEventListener("click",()=>{
mapModal.style.display="none";
});

});

const smsBtn = document.getElementById("smsQuickBtn");

if (smsBtn) {
  
smsBtn.onclick = async () => {

const url = new URL(window.location.href);
url.searchParams.delete("mode");
const link = url.toString();

const text = "You're invited! RSVP here: " + link;


  // 📱 если есть native share (iPhone / Android)
  if (navigator.share) {
    try {
      await navigator.share({
        text: text
      });
      return;
    } catch (err) {
      // если пользователь отменил — ничего страшного
    }
  }

  // fallback → SMS
  const smsLink = `sms:?body=${encodeURIComponent(text)}`;
  window.location.href = smsLink;
};

}

if (mode !== "admin") {
  const bubble = document.getElementById("smsBubble");
  if (bubble) bubble.style.display = "none";
}

</script>

<script>

function showToast(message, isError = false){
  const toast = document.getElementById("toast");

  toast.textContent = message;
  toast.style.background = isError ? "#d20000" : "#28a745";

  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2000);
}

</script>
