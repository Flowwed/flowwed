<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Preview</title>

<script src="https://player.vimeo.com/api/player.js"></script>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column; /* 🔥 важно чтобы bubble был сверху */
  align-items:center;
  justify-content:center;
  background: linear-gradient(180deg, #fff1f4, #ffffff);
  font-family: 'Segoe UI', sans-serif;
}

/* ✅ SMS BUBBLE */
#smsBubble{
  display:none;
  align-items:center;
  gap:12px;

  margin: 16px auto 10px auto;
  width:90%;
  max-width:420px;

  background:#fff7f7;
  border:1px solid #ffd0d0;
  border-radius:14px;
  padding:12px 14px;

  box-shadow:0 6px 16px rgba(0,0,0,0.12);
}

/* VIDEO */

#videoPlayerBox{
  width:min(380px, 90%);
  aspect-ratio:9/16;
  border-radius:18px;
  overflow:hidden;

  box-shadow:
    0 18px 40px rgba(0,0,0,0.25),
    0 8px 16px rgba(0,0,0,0.18);
}

/* 📱 MOBILE */

@media (max-width:800px){

  body{
    display:block;
    margin:0;
    padding:0;
  }

  #videoPlayerBox{
    width:100%;
    max-width:420px;
    margin:0 auto;
    border-radius:16px;
  }

  /* 🔥 ДОБАВЬ ЭТО */
  body{
    padding-left:16px;
    padding-right:16px;
  }

}
</style>
</head>

<body>

<!-- ✅ ADMIN SMS BUBBLE -->
<div id="smsBubble">

  <div style="
  width:24px;
  height:24px;
  border-radius:50%;
  background:#b41111;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:700;
  ">
    i
  </div>

  <div style="flex:1;font-size:13px;color:#7e2a2a;font-weight:600;">
    Send this Save The Date card to your guests
  </div>

  <button id="smsQuickBtn" style="
  background:#b41111;
  color:white;
  border:none;
  border-radius:10px;
  padding:6px 12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  ">
    Send
  </button>

</div>

<!-- VIDEO -->
<div id="videoPlayerBox">
  <iframe id="postWeddingIframe"
    src=""
    frameborder="0"
    allow="autoplay; fullscreen"
    style="width:100%;height:100%;">
  </iframe>
</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

const token = new URLSearchParams(location.search).get("t");
const mode  = new URLSearchParams(location.search).get("mode");

/* ✅ SHOW ADMIN BUBBLE */
if (mode === "admin") {
  const bubble = document.getElementById("smsBubble");
  if (bubble) bubble.style.display = "flex";
}

/* ✅ LOAD VIDEO */
async function loadVideo(){

  if(!token) return;

  const { data, error } = await supabase
    .from("sites")
    .select("stdvideo_url")
    .eq("edit_token", token)
    .single();

  if(error || !data || !data.stdvideo_url) return;

  const iframe = document.getElementById("postWeddingIframe");
  iframe.src = data.stdvideo_url;

  const player = new Vimeo.Player(iframe);

  player.ready().then(()=>{
    player.setVolume(0.7);
  });

}

loadVideo();

/* ✅ SEND BUTTON LOGIC */
const smsBtn = document.getElementById("smsQuickBtn");

if (smsBtn) {

  smsBtn.onclick = async () => {

    const url = new URL(window.location.href);
    url.searchParams.delete("mode"); // 🔥 убираем admin
    const link = url.toString();

    const text = "You're invited! Watch this: " + link;

    // native share (iPhone / Android)
    if (navigator.share) {
      try {
        await navigator.share({ text });
        return;
      } catch {}
    }

    // fallback SMS
    const smsLink = `sms:?body=${encodeURIComponent(text)}`;
    window.location.href = smsLink;
  };

}

</script>

</body>
</html>
