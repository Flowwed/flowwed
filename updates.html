/* ====== STORY CARDS ====== */

section {
  max-width: 1100px;
  margin: 60px auto;
  padding: 60px 60px;
  background: linear-gradient(
    180deg,
    #ffffff 0%,
    #fff7f8 100%
  );

  border-radius: 28px;

  box-shadow:
    0 30px 60px rgba(0, 0, 0, 0.18),
    0 12px 24px rgba(0, 0, 0, 0.10);

  transition:
    transform 0.35s ease,
    box-shadow 0.35s ease;
}

/* hover — “парит” */
section:hover {
  transform: translateY(-8px);
  box-shadow:
    0 45px 90px rgba(0, 0, 0, 0.22),
    0 18px 36px rgba(0, 0, 0, 0.14);
}

/* заголовки внутри карточек */
section h2 {
  font-size: 32px;
  margin-bottom: 18px;
  color: #a52126;
}

/* текст */
section p {
  font-size: 18px;
  line-height: 1.75;
  color: #6f2a2a;
  margin-bottom: 40px;
}

/* последнее описание — без лишнего отступа */
section p:last-child {
  margin-bottom: 0;
}

section {
  animation: fadeUp 0.9s ease both;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}



/* контейнер */
section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
  
}

/* ====== ОТДЕЛЬНАЯ КАРТОЧКА ====== */
.story-card {
  margin-top: 50px;
  padding: 50px 60px;

  background: linear-gradient(
    180deg,
    #ffffff 0%,
    #fff6f7 100%
  );

  border-radius: 30px;

  box-shadow:
    0 28px 60px rgba(0, 0, 0, 0.18),
    0 12px 24px rgba(0, 0, 0, 0.10);

  transition:
    transform 0.35s ease,
    box-shadow 0.35s ease;
}

/* эффект парения */
.story-card:hover {
  transform: none;
  box-shadow:
    0 45px 90px rgba(0, 0, 0, 0.22),
    0 18px 36px rgba(0, 0, 0, 0.14);
}

/* заголовок */
.story-card h2 {
  font-size: 32px;
  margin-bottom: 18px;
  color: #a52126;
}

/* текст */
.story-card p {
  font-size: 18px;
  line-height: 1.75;
  color: #6f2a2a;
}


/* ====== STORY HERO IMAGE ====== */
.story-hero {
  max-width: 1100px;
  margin: 40px auto 60px;
  border-radius: 40px;
  overflow: hidden;

  box-shadow:
    0 40px 80px rgba(0, 0, 0, 0.25);
}

.story-hero img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  display: block;
}
.story-hero.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;

  max-width: 1100px;
  margin: 40px auto 60px;
}


.updates-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;

  padding-top: 16px;     /* 👆 сверху меньше */
  padding-left: 24px;
  padding-right: 24px;
  padding-bottom: 16px;   /* 👇 НИЗ СИЛЬНО МЕНЬШЕ */

  background: #fff;
}

.updates-grid img {
  width: 100%;
  max-height:420px;                 /* 🔥 важно */
  object-fit: cover;
  border-radius: 28px;
}

/* ===== TEXTAREA-LIKE MODE FOR STORY ===== */
.story-card p {
  margin: 0;               /* ❗ убираем ВСЕ отступы */
  padding: 0;
  line-height: 1.35;       /* как textarea */
}

/* Quill иногда вставляет пустые <p><br></p> */
.story-card p:empty {
  display: none;
}

/* если внутри Quill есть <br> */
.story-card br {
  display: block;
  content: "";
  margin-top: 0;
}

[data-visible] {
  visibility: visible;
}

/* ===== WEDDING NAVBAR ===== */

.wedding-nav {
  position: sticky;
  top: 0;
  z-index: 999;

  display: flex;
  align-items: center;

  padding: 14px 28px;

  background: rgba(255, 245, 246, 0.82);
  backdrop-filter: blur(14px);

  border-bottom: 1px solid rgba(165, 33, 38, 0.15);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.nav-left {
  position: relative;
  z-index: 2;
  margin-left: 40px; /* 👈 ВОТ ОНО */
}

/* BACK BUTTON — без изменений */
.back-btn {
  background: linear-gradient(135deg, #a52126, #7b1f22);
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 14px;
  cursor: pointer;

  box-shadow: 0 6px 14px rgba(0,0,0,0.2);
  transition: all .25s ease;
}

.back-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(0,0,0,0.28);
}

/* 🔥 ЦЕНТР СТРАНИЦЫ */
.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  gap: 18px;
  white-space: nowrap;
}
.nav-center a {
  font-size: 15px;
  font-weight: 500;
  color: #732323;
  text-decoration: none;
  cursor: pointer;

  position: relative;
  padding-bottom: 4px;
}

.nav-center a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 0%;
  height: 2px;
  background: #a52126;
  transition: width .3s ease;
}

.nav-center a:hover::after {
  width: 100%;
}

.nav-center a.active {
  color: #a52126;
}

.nav-center a.active::after {
  width: 100%;
}

.vertical-menu-btn,
.vertical-menu-dropdown {
  display: none;
}


/* =========================
   📱 MOBILE HAMBURGER MENU — 1:1
   ========================= */

@media (max-width: 900px) {

  .wedding-nav > .nav-center,
  .wedding-nav > .nav-left {
    display: none !important;
  }

  .vertical-menu-btn {
    position: fixed;
    top: 22px;
    right: 26px;

    width: 30px;
    height: 22px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    cursor: pointer;
    z-index: 1200;
  }

  .vertical-menu-btn span {
    height: 3px;
    border-radius: 3px;
    background: #732323;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }

  .vertical-menu-dropdown {
    position: fixed;
    top: 64px;
    right: 26px;

    width: 240px;
    max-width: calc(100vw - 52px);

    padding: 14px 18px 22px;

    background: linear-gradient(
      to bottom,
      rgba(255,255,255,.92),
      rgba(255,245,248,.88)
    );

    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);

    border-radius: 18px 18px 30px 30px;

    box-shadow:
      0 32px 90px rgba(120,30,50,.35),
      inset 0 1px 0 rgba(255,255,255,.65);

    opacity: 0;
    transform: translateY(-14px) scale(.97);
    pointer-events: none;

    transition:
      opacity .32s ease,
      transform .38s cubic-bezier(.22,1,.36,1);

    z-index: 1200;

    max-height: calc(100vh - 96px);
    overflow-y: auto;
  }

  .vertical-menu-dropdown.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .vertical-menu-dropdown .mobile-back {
    display: flex;
    align-items: center;
    justify-content: center;

    padding: 8px 0 14px;
    margin-bottom: 14px;

    font-size: 16px;
    font-weight: 500;
    color: #732323;

    cursor: pointer;
    position: relative;
  }


  .vertical-menu-dropdown .nav-center {
    display: flex;
    flex-direction: column;
    gap: 14px;

    position: static;
    transform: none;
  }

  .vertical-menu-dropdown .nav-center a {
    font-size: 16px;
    font-weight: 500;
    color: #6f1f1f;
    text-decoration: none;
    padding: 6px 0;
    position: relative;
  }

  .vertical-menu-dropdown .nav-center a::after {
    display: none;
  }

  .vertical-menu-dropdown .nav-center a.active {
    color: #a52126;
    font-weight: 560;
  }

  .vertical-menu-dropdown .nav-center a.active::before {
    content: "";
    position: absolute;
    left: -12px;
    right: -12px;
    top: -6px;
    bottom: -6px;

    background: rgba(165,33,38,.08);
    border-radius: 12px;
    z-index: -1;
  }
}

<script>
function getToken() {
  const params = new URLSearchParams(location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    sessionStorage.getItem("rsvpToken") ||
    "";

  if (token) sessionStorage.setItem("rsvpToken", token);
  return token;
}

function buildLink(path) {
  const token = getToken();
  if (!token) return path;

  if (path === "home") {
    return `https://www.flowwed.com/everaftercinema?token=${token}`;
  }

  return `${path}?token=${token}`;
}

document.querySelectorAll("[data-page]").forEach(link => {
  const page = link.dataset.page;
  link.href = buildLink(page);
});

function goBack() {
  history.length > 1 ? history.back() : window.location.href = buildLink("home");
}
</script>

<script>

(function setActiveNav() {
  let current = location.pathname.split("/").pop();

  // Netlify: /photo_gallery → photo_gallery
  // Local: photo_gallery.html → photo_gallery
  current = current.replace(".html", "");

  document.querySelectorAll(".nav-center a").forEach(link => {
    let page = link.dataset.page || "";

    // приводим data-page к такому же виду
    page = page.replace(".html", "");

    if (page === current) {
      link.classList.add("active");
    }
  });
})();

</script>

<script>
const vBtn = document.getElementById("hamburgerBtn");
const vMenu = document.getElementById("mobileMenu");
const navCenter = document.querySelector(".nav-center");

let vOpen = false;

if (window.innerWidth <= 900 && navCenter && vMenu.childElementCount === 0) {

  const back = document.createElement("div");
  back.className = "mobile-back";
  back.textContent = "← Back";
  back.onclick = goBack;

  vMenu.appendChild(back);
  vMenu.appendChild(navCenter.cloneNode(true));
}

vBtn?.addEventListener("click", e => {
  e.stopPropagation();
  vOpen = !vOpen;
  vMenu.classList.toggle("open", vOpen);
});

vMenu.addEventListener("click", e => {
  if (!e.target.closest("a")) return;
  vOpen = false;
  vMenu.classList.remove("open");
});

document.addEventListener("click", () => {
  if (!vOpen) return;
  vOpen = false;
  vMenu.classList.remove("open");
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const notice = document.getElementById("landscapeNotice");

  function isMobile() {
    return window.innerWidth < 900;
  }

  function isPortrait() {
    return window.matchMedia("(orientation: portrait)").matches;
  }

  function watchOrientationAndGo(url){
    notice.style.display = "flex";

    function check(){
      if (!isPortrait()) {
        notice.style.display = "none";
        window.location.href = url;
        window.removeEventListener("orientationchange", check);
        window.removeEventListener("resize", check);
      }
    }

    window.addEventListener("orientationchange", check);
    window.addEventListener("resize", check);
  }

  // перехватываем только Just Married
  document.querySelectorAll('[data-page="just_married.html"]').forEach(link => {
    link.addEventListener("click", e => {
      if (isMobile() && isPortrait()) {
        e.preventDefault();
        watchOrientationAndGo(link.href);
      }
    });
  });

});
</script>
