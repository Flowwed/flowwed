<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notify Guests</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff5f7;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}


.card {
  background: white;

  padding: 32px 22px;

  border-radius: 18px;

  max-width: 320px;
  width: 90%;

  text-align: center;

  display: flex;
  flex-direction: column;
  justify-content: center;

  border: 2px solid #b41111;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.25),
    inset 0 0 6px rgba(255,255,255,0.4),
    0 0 14px rgba(180,17,17,0.25);

  /* анимация */
  opacity: 0;
  transform: translateY(10px);
  transition: 0.35s ease;
}



.title {
  font-size:22px;
  font-weight:700;
  color:#a52126;
  margin-bottom:12px;
  max-width: 260px;
  margin: 0 auto 12px auto;
}

.text {
  font-size:15px;
  line-height:1.5;
  color:#555;
  max-width: 260px;
  margin: 0 auto;


}


.btn {
  margin-top:22px;
  padding:12px 20px;
  border:none;
  border-radius:999px;
  font-weight:700;
  color:white;
  cursor:pointer;
  background:linear-gradient(#c71c1c,#9f1111);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}



</style>
</head>

<body>

<div class="card">
  <div class="title">Notify your guests</div>

btn.addEventListener("click", async () => {

  const message =
`${coupleName} have shared a new wedding update.

View here:
${link}`;

  if (navigator.share) {
    try {
      
  await navigator.share({

});
    } catch (err) {

  } else {

  }

const card = document.querySelector(".card");

if (card) {
  setTimeout(() => {
    card.style.opacity = "1";
    card.style.transform = "translateY(0)";
  }, 50);

// загрузка имени
(async () => {
  if (!token) return;

  try {
    const { data } = await db
      .from("sites")
      .select("couple_name")
      .eq("edit_token", token)
      .single();

  } catch (e) {

  }
})();
