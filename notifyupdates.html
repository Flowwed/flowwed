<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notify Guests</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff5f7;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  max-width:420px;
  width:90%;
  background:white;
  border-radius:24px;
  padding:28px 26px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.title {
  font-size:22px;
  font-weight:700;
  color:#a52126;
  margin-bottom:12px;
}

.text {
  font-size:15px;
  line-height:1.5;
  color:#555;
}

.btn {
  margin-top:22px;
  padding:12px 20px;
  border:none;
  border-radius:999px;
  font-weight:700;
  color:white;
  cursor:pointer;
  background:linear-gradient(#c71c1c,#9f1111);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="card">
  <div class="title">Share your latest wedding updates</div>
  <div class="text">Notify your guests</div>
  <button class="btn" id="notifyBtn">Notify</button>
</div>

<!-- ✅ ВСЁ В MODULE → НЕТ КОНФЛИКТОВ -->
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// 🔑 твои данные
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
;

// ✅ клиент
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// параметры
const params = new URLSearchParams(location.search);
const token = params.get("t");

const link = `https://flowwed.netlify.app/web-updates?t=${token}`;

let coupleName = "We";

// кнопка
const btn = document.getElementById("notifyBtn");

btn.addEventListener("click", () => {
  const message =
`${coupleName} have shared a new wedding update.

View here:
${link}`;

  const sms = `sms:?body=${encodeURIComponent(message)}`;
  const wa  = `https://wa.me/?text=${encodeURIComponent(message)}`;

  if (confirm("OK = SMS\nCancel = WhatsApp")) {
    location.href = sms;
  } else {
    window.open(wa, "_blank");
  }
});

// загрузка имени
(async () => {
  if (!token) return;

  try {
    const { data } = await db
      .from("sites")
      .select("couple_name")
      .eq("edit_token", token)
      .single();

    if (data?.couple_name) {
      coupleName = data.couple_name.trim();
    }
  } catch (e) {
    console.log("No couple name");
  }
})();
</script>

</body>
</html>
