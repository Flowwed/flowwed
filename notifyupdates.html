<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notify Guests</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff5f7;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;

  min-height:100vh;
  padding-top:40px;
}

.card {
  background: white;
  padding: 32px 22px;
  border-radius: 18px;
  max-width: 320px;
  width: 90%;
  text-align: center;

  display: flex;
  flex-direction: column;
  justify-content: center;

  border: 2px solid #b41111;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.25),
    inset 0 0 6px rgba(255,255,255,0.4),
    0 0 14px rgba(180,17,17,0.25);

  opacity: 0;
  transform: translateY(10px);
  transition: 0.35s ease;
}

.title {
  font-size:22px;
  font-weight:700;
  color:#a52126;
  max-width:260px;
  margin:0 auto 12px auto;
}

.text {
  font-size:15px;
  line-height:1.5;
  color:#555;
  max-width:260px;
  margin:0 auto;
}

.btn {
  margin-top:22px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  font-weight:700;
  color:white;
  cursor:pointer;
  background:#b41111;
}

#signature {
  margin-top:18px;
  font-size:14px;
  color:#7a2a2a;
  font-weight:600;
  opacity:0.85;
  font-style: italic;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">Notify your guests</div>
  <div class="text">Send a wedding update in seconds</div>
  <button class="btn" id="notifyBtn">Notify</button>

  <div id="signature"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "YOUR_KEY_HERE";

const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// параметры
const params = new URLSearchParams(location.search);
const token = params.get("t");

const link = `https://flowwed.netlify.app/web-updates?t=${token}`;

let coupleName = "The Couple";

// 🔥 функция подписи
function renderSignature() {
  const el = document.getElementById("signature");
  if (!el) return;

  el.innerHTML = `
    With love,<br>
    <strong>${coupleName}</strong>
  `;
}

// кнопка
const btn = document.getElementById("notifyBtn");

btn.addEventListener("click", async () => {
  if (navigator.share) {
    try {
      await navigator.share({
        title: "Wedding Update",
        text: `${coupleName} have shared a new wedding update.`,
        url: link
      });
    } catch (err) {
      console.log("Share cancelled");
    }
  } else {
    alert("Sharing not supported on this device");
  }
});

// 🎬 анимация карточки
const card = document.querySelector(".card");
if (card) {
  setTimeout(() => {
    card.style.opacity = "1";
    card.style.transform = "translateY(0)";
  }, 50);
}

// загрузка имени
(async () => {
  if (!token) {
    renderSignature();
    return;
  }

  try {
    const { data } = await db
      .from("sites")
      .select("couple_name")
      .eq("edit_token", token)
      .single();

    if (data?.couple_name) {
      coupleName = data.couple_name.trim();
    }

    renderSignature();

  } catch (e) {
    console.log("No couple name");
    renderSignature();
  }
})();
</script>

</body>
</html>
