<style>

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #fff1f4, #ffffff);
      color: #6a2a2a;
      margin: 40px auto;
      max-width: 1020px;
    }

.page{
  max-width:1280px;
  margin:28px auto 60px;
  padding:0 20px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:32px;
  color:#9c1818;
}

.layout{
  display:block;
}
.panel{
  background:rgba(255,255,255,0.82);
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 40px rgba(0,0,0,0.14);
}

.steps{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.step{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:#ffe5ea;
  font-weight:600;
}

.step.active{
  background:#b41111;
  color:#fff;
}

.section{
  display:none;
}

.section.active{
  display:block;
}

.section-box{
  margin-bottom:18px;
  padding:16px;
  border-radius:16px;
  background:#fff9fa;
  border:1px solid #f3d8de;
}

.section-box h2{
  margin:0 0 12px;
  font-size:18px;
  color:#a52126;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 14px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field.full{
  grid-column:1 / -1;
}

label{
  font-size:13px;
  font-weight:700;
  color:#7e2a2a;
}

input, textarea{
  border:1px solid #e9c8d0;
  border-radius:12px;
  padding:11px 12px;
}

textarea{
  min-height:80px;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#b41111,#8e1515);
  color:white;
}

.preview{
  position:sticky;
  top:20px;
}


.top-nav-wrapper {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;

  width: 100%;

  margin-bottom: 8px;   /* 🔥 вместо 100px */
}

.back-btn {
  position: absolute;
  left: -270px;
  top: 20px;

  display: inline-flex;
  align-items: center;
  gap: 6px;

  padding: 6px 14px;

  border-radius: 999px;

  background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.18),
      rgba(255,255,255,0.05)
    ),
    #9c1818;

  color: white;

  font-size: 13px;
  font-weight: 600;

  cursor: pointer;

  border: 1px solid rgba(255,255,255,0.35);

  transition: 0.28s ease;   /* 🔥 КЛЮЧ */

  box-shadow:
    0 8px 20px rgba(0,0,0,0.38),
    0 3px 8px rgba(0,0,0,0.25),
    inset 0 3px 6px rgba(255,255,255,0.22),
    inset 0 -6px 14px rgba(70,0,20,0.35);
}

.step:hover{
  background:#d94b4b;
  color:#fff;
}


.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:95%;
  height:95%;
  background:white;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.modal iframe{
  width:100%;
  height:100%;
  border:none;
}

#closeModal{
  position:absolute;
  top:10px;
  right:14px;
  z-index:10;
  background:#b41111;
  color:white;
  border:none;
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
}

.table-section {
  width: 93%;
  margin: 40px auto;
  padding: 18px;

  background: rgba(255,255,255,0.75);
  border-radius: 18px;

/* RUBY FRAME */
.ruby-frame-outer {

  border-radius: 16px;
  padding: 10px;
  margin-top: 14px;

.ruby-frame-inner {
  border: 2px solid #ffcccc;
  border-radius: 14px;
  padding: 6px;
}

.scroll-container {
  position: relative;
  height: 260px;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 4px;
}

/* RUBY SCROLLBAR */
.scroll-container::-webkit-scrollbar {
  width: 9px;
}

.scroll-container::-webkit-scrollbar-track {
  background: #ffe6eb;
  border-radius: 10px;
}

.scroll-container::-webkit-scrollbar-thumb {
  background: #b41111;
  border-radius: 10px;
  border: 2px solid #ffe6eb;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 6px;
}

th, td {
  padding: 10px 6px;
  border-bottom: 1px solid #e9d4d4;
  font-size: 15px;
  text-align: center;
}

th {
  color: #9c1818;
  font-weight: 800;
}

/* STICKY HEADER */
#guestTable thead th {
  position: sticky;
  top: 0;
  background: #faf4f6;
  z-index: 20;
}

.footer-buttons {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

.footer-btn {
  padding: 10px 18px;
  font-size: 15px;
  font-weight: 600;
  border-radius: 12px;

      to bottom,
      rgba(255,255,255,0.15),

  border: none;

  box-shadow:

  transition: 0.25s ease;
}

.footer-btn:hover {

/* COMPOSER MAIN */
.email-composer{
  position:fixed;
  bottom:20px;
  right:20px;
  width:380px;

  background:rgba(255,255,255,0.95);
  border-radius:18px;
  padding:16px;

/* HEADER */
.composer-header{

  margin-bottom:12px;

/* CLOSE + EXPAND */
.close-btn{

.expand-btn{

async function saveToSupabase(data) {

  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  console.log("📦 DATA:", data);
  console.log("🔑 TOKEN:", token);

  const { error } = await sb
    .from("wedding_info")
    .upsert(
      [{ site_edit_token: token, ...data }],
      { onConflict: "site_edit_token" }
    );

  if (error) {
    console.error("❌ FULL ERROR:", error);
    alert(error.message + " | " + error.details);
  }
}


async function loadFromSupabase() {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  if (error) {
    console.error("LOAD ERROR:", error);
    return null;
  }

  return data;
}

  const params = new URLSearchParams(location.search);
  const token = params.get("t");

  const { data } = await sb
    .from("guests")
    .select("*")
    .eq("token", token);

  guests = data || [];

  renderGuests();
}


function renderGuests(){

  const tbody = document.querySelector("#guestTable tbody");

  if (!tbody) {
    console.log("❌ tbody not found");
    return;
  }

tbody.innerHTML = "";

guests.forEach((g, i) => {
  tbody.innerHTML += `
    <tr>
      <td>
        <input type="checkbox"
          class="rowCheck"
          data-id="${g.guest_id}"              // 🔥 ВОТ ФИКС
          data-email="${g.email || ""}"
          data-phone="${g.phone || ""}">
      </td>
      <td>${i+1}</td>
      <td>${g.first_name || ""} ${g.last_name || ""}</td>
      <td>${g.email || ""}</td>
      <td>${g.phone || ""}</td>
    </tr>
  `;
});
}


// 🔥 ВАЖНО — запускаем загрузку
loadGuests();


document.addEventListener("change", (e) => {

  // чекбоксы строк
  if (e.target.classList.contains("rowCheck")) {
    refreshComposerFields();
  }

  // select all
  if (e.target.id === "selectAll") {
    setTimeout(() => refreshComposerFields(), 10);
  }

});

// 🔥 ОБЩАЯ ФУНКЦИЯ СБОРА ДАННЫХ
function refreshComposerFields() {
  const selected = [...document.querySelectorAll(".rowCheck:checked")];

  const emails = [];
  const phones = [];

  selected.forEach(ch => {
    if (ch.dataset.email) emails.push(ch.dataset.email);
    if (ch.dataset.phone) phones.push(ch.dataset.phone);
  });

  document.getElementById("composerEmails").value =
    [...new Set(emails)].join(", ");

  document.getElementById("composerPhones").value =
    [...new Set(phones)].join(", ");
}


// 🔥 ВСЯ ЛОГИКА ПОСЛЕ ЗАГРУЗКИ DOM
document.addEventListener("DOMContentLoaded", () => {

  const composer = document.getElementById("composerBox");
  const closeBtn = document.getElementById("composerClose");
  const expandBtn = document.getElementById("composerExpand");
  const sendBtn = document.getElementById("composerSend");
  const openBtn = document.getElementById("sendEmailBtn");

  let expanded = false;

  // 🔥 OPEN COMPOSER
  if (openBtn) {

openBtn.onclick = () => {

  const selected = [...document.querySelectorAll(".rowCheck:checked")];

  if (!selected.length) {
    alert("Select at least one guest");
    return;
  }

  composer.style.display = "block";

  refreshComposerFields(); // 🔥 ВОТ КЛЮЧ
};
  }

  // 🔥 CLOSE (крестик)
  if (closeBtn) {
    closeBtn.onclick = () => {
      composer.style.display = "none";
    };
  }

  // 🔥 EXPAND / COLLAPSE (как в образце)
  if (expandBtn) {
    expandBtn.onclick = () => {

      expanded = !expanded;

      if (expanded) {
        composer.style.width = "600px";
        composer.style.height = "80vh";
        composer.style.right = "20px";
        composer.style.bottom = "20px";
      } else {
        composer.style.width = "380px";
        composer.style.height = "auto";
      }
    };
  }

  // 🔥 SEND

if (sendBtn) {
  sendBtn.onclick = async () => {

    const selected = [...document.querySelectorAll(".rowCheck:checked")];

    if (!selected.length) {
      alert("No recipients");
      return;
    }

const guests = selected.map(ch => ({
  guest_id: ch.dataset.id,   // 🔥 ВОТ КЛЮЧЕВОЙ ФИКС
  email: ch.dataset.email,
  phone: ch.dataset.phone,
  name: "Guest"              // можно пока так
}));
    const subject = document.getElementById("composerSubject").value.trim();
    const message = document.getElementById("composerBody").value.trim();
    const token = new URLSearchParams(location.search).get("t") || "";

    console.log("🚀 SENDING:", guests);
console.log("📧 EMAILS ONLY:", guests.map(g => g.email));

    try {

      const res = await fetch("/.netlify/functions/send-invites", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          guests, // 🔥 ФИКС
          subject,
          message,
          token
        })
      });

      const data = await res.json();

      console.log("✅ RESPONSE:", data);

      if (!res.ok) {
        console.error("❌ SEND FAILED:", data);
        alert(data.error || "Send failed");
        return;
      }

      alert("Sent successfully 🚀");

    } catch (err) {
      console.error("❌ NETWORK ERROR:", err);
      alert("Network error");
    }

  };
}
    });

</script>
