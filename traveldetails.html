<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Travel & Details Admin</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  color:#6a2a2a;
}

.page{
  max-width:1280px;
  margin:28px auto 60px;
  padding:0 20px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:32px;
  color:#9c1818;
}

.layout{
  display:grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap:22px;
}

.panel{
  background:rgba(255,255,255,0.82);
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 40px rgba(0,0,0,0.14);
}

.steps{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.step{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:#ffe5ea;
  font-weight:600;
}

.step.active{
  background:#b41111;
  color:#fff;
}

.section{
  display:none;
}

.section.active{
  display:block;
}

.section-box{
  margin-bottom:18px;
  padding:16px;
  border-radius:16px;
  background:#fff9fa;
  border:1px solid #f3d8de;
}

.section-box h2{
  margin:0 0 12px;
  font-size:18px;
  color:#a52126;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 14px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field.full{
  grid-column:1 / -1;
}

label{
  font-size:13px;
  font-weight:700;
  color:#7e2a2a;
}

input, textarea{
  border:1px solid #e9c8d0;
  border-radius:12px;
  padding:11px 12px;
}

textarea{
  min-height:80px;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#b41111,#8e1515);
  color:white;
}

.preview{
  position:sticky;
  top:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
<div class="page">

<div class="topbar">
<h1>Travel & Details Admin</h1>
<div id="tokenPill"></div>
</div>

<div class="layout">

<div class="panel">

<!-- STEPS -->
<div class="steps">
<div class="step active">Basic</div>
<div class="step">Schedule</div>
<div class="step">Travel</div>
<div class="step">Venue</div>
<div class="step">Details</div>
</div>

<!-- STEP 1 -->
<div class="section active">
<div class="section-box">
<h2>Basic</h2>
<div class="grid">
<div class="field">
<label>Couple Names</label>
<input id="coupleName" placeholder="Jessica & John">
</div>
<div class="field">
<label>Wedding Date</label>
<input id="weddingDate" type="date">
</div>
<div class="field full">
<label>Hero Subtitle</label>
<input id="heroSubtitle" placeholder="Everything you need to know for the big day.">
</div>
</div>
</div>
</div>

<!-- STEP 2 -->
<div class="section">
<div class="section-box">
<h2>Schedule</h2>
<div class="grid">

<div class="field"><label>Time 1</label><input id="scheduleTime1" placeholder="3:00 PM"></div>
<div class="field"><label>Event 1</label><input id="scheduleText1" placeholder="Ceremony begins"></div>

<div class="field"><label>Time 2</label><input id="scheduleTime2" placeholder="4:30 PM"></div>
<div class="field"><label>Event 2</label><input id="scheduleText2" placeholder="Cocktail hour"></div>

<div class="field"><label>Time 3</label><input id="scheduleTime3" placeholder="6:00 PM"></div>
<div class="field"><label>Event 3</label><input id="scheduleText3" placeholder="Dinner & celebration"></div>

<div class="field"><label>Time 4</label><input id="scheduleTime4" placeholder="10:00 PM"></div>
<div class="field"><label>Event 4</label><input id="scheduleText4" placeholder="Dancing continues"></div>

</div>
</div>
</div>

<!-- STEP 3 -->
<div class="section">
<div class="section-box">
<h2>Flights & Stay</h2>
<div class="grid">

<div class="field"><label>Airport</label><input id="airport" placeholder="JFK"></div>
<div class="field"><label>Transfer Time</label><input id="transferTime" placeholder="45 minutes"></div>

<div class="field full"><label>Flights Description</label>
<textarea id="flightsText" placeholder="Fly into..."></textarea></div>

<div class="field"><label>Hotel 1</label><input id="hotel1" placeholder="Hotel Option 1"></div>
<div class="field"><label>Hotel 2</label><input id="hotel2" placeholder="Hotel Option 2"></div>
<div class="field full"><label>Hotel 3</label><input id="hotel3" placeholder="Hotel Option 3"></div>

</div>
</div>
</div>

<!-- STEP 4 -->
<div class="section">
<div class="section-box">
<h2>Venue</h2>
<div class="grid">

<div class="field"><label>Venue Name</label><input id="venueName" placeholder="The Grand Garden"></div>
<div class="field"><label>Map Link</label><input id="mapLink" placeholder="https://maps.google.com/..."></div>

<div class="field full"><label>Venue Address</label>
<textarea id="venueAddress"></textarea></div>

<div class="field full"><label>Venue Note</label>
<input id="venueNote" placeholder="Please use the main entrance."></div>

</div>
</div>
</div>

<!-- STEP 5 -->
<div class="section">
<div class="section-box">
<h2>Details</h2>
<div class="grid">

<div class="field full"><label>Getting Around</label>
<textarea id="gettingAround"></textarea></div>

<div class="field full"><label>Dress Code</label>
<textarea id="dressCode"></textarea></div>

<div class="field"><label>Weather</label><input id="weather"></div>
<div class="field"><label>Weather Note</label><input id="weatherNote"></div>

</div>
</div>

<div class="section-box">
<h2>FAQ</h2>
<div class="grid">

<div class="field"><label>Question 1</label><input id="faqQ1"></div>
<div class="field"><label>Answer 1</label><input id="faqA1"></div>

<div class="field"><label>Question 2</label><input id="faqQ2"></div>
<div class="field"><label>Answer 2</label><input id="faqA2"></div>

<div class="field"><label>Question 3</label><input id="faqQ3"></div>
<div class="field"><label>Answer 3</label><input id="faqA3"></div>

<div class="field"><label>Question 4</label><input id="faqQ4"></div>
<div class="field"><label>Answer 4</label><input id="faqA4"></div>

</div>
</div>
</div>

<div class="actions">
<button onclick="prevStep()">← Back</button>
<button onclick="nextStep()">Next →</button>
</div>

<button id="saveDraftBtn">Save Draft</button>

</div>

<!-- PREVIEW -->
<div class="panel preview">
  <iframe
    id="previewFrame"
    style="width:100%; height:900px; border:none; border-radius:20px;"
  ></iframe>
</div>

</div>
</div>

<script>

// WIZARD
let currentStep=0;

const params = new URLSearchParams(location.search);
const token = params.get("t") || params.get("token") || "demo-token";

document.getElementById("previewFrame").src =
  `/venue_map.html?t=${encodeURIComponent(token)}`;

const steps=document.querySelectorAll(".step");
const sections=document.querySelectorAll(".section");

function showStep(i){
sections.forEach(s=>s.classList.remove("active"));
steps.forEach(s=>s.classList.remove("active"));
sections[i].classList.add("active");
steps[i].classList.add("active");
}

function nextStep(){
if(currentStep<sections.length-1){currentStep++;showStep(currentStep);}
}

function prevStep(){
if(currentStep>0){currentStep--;showStep(currentStep);}
}

// ТВОЙ SUPABASE 1:1
const sb = window.supabase.createClient(
"https://octwwpatppbenqwkcqaw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

    const params = new URLSearchParams(location.search);
    const token = params.get("t") || params.get("token") || "demo-token";
    const storageKey = `venueMapDraft:${token}`;

    document.getElementById("tokenPill").textContent = `Token: ${token}`;

    const fieldIds = [
      "coupleName","heroSubtitle","weddingDate",
      "scheduleTime1","scheduleText1","scheduleTime2","scheduleText2",
      "scheduleTime3","scheduleText3","scheduleTime4","scheduleText4",
      "airport","transferTime","flightsText",
      "hotel1","hotel2","hotel3",
      "venueName","mapLink","venueAddress","venueNote",
      "gettingAround","dressCode","weather","weatherNote",
      "trip1","trip2","trip3",
      "faqQ1","faqA1","faqQ2","faqA2","faqQ3","faqA3","faqQ4","faqA4"
    ];

    function getFormData(){
      const data = {};
      fieldIds.forEach(id => {
        const el = document.getElementById(id);
        data[id] = el ? el.value : "";
      });
      return data;
    }

    function setFormData(data){
      fieldIds.forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] != null) el.value = data[id];
      });
    }

    function saveDraft(){
      localStorage.setItem(storageKey, JSON.stringify(getFormData()));
    }

    function loadDraft(){
      const raw = localStorage.getItem(storageKey);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        setFormData(data);
      } catch(e) {
        console.error("Draft parse error", e);
      }
    }

    function formatDate(value){
      if (!value) return "";
      const [y,m,d] = value.split("-");
      const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      ];
      return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
    }

    function updatePreview(){
      const data = getFormData();

      document.getElementById("previewCouple").textContent =
        data.coupleName || "Couple Name";

      document.getElementById("previewSubtitle").textContent =
        data.heroSubtitle || "Everything you need to know for the big day.";

      const schedule = [
        [data.scheduleTime1, data.scheduleText1],
        [data.scheduleTime2, data.scheduleText2],
        [data.scheduleTime3, data.scheduleText3],
        [data.scheduleTime4, data.scheduleText4]
      ]
      .filter(([t,txt]) => t || txt)
      .map(([t,txt]) => `<div><b>${t || ""}</b> ${txt || ""}</div>`)
      .join("");

      document.getElementById("previewSchedule").innerHTML =
        schedule || "<div>—</div>";

      document.getElementById("previewFlights").innerHTML = `
        <div>${data.flightsText || "—"}</div>
        <div style="margin-top:8px;"><b>Airport:</b> ${data.airport || "—"}</div>
        <div><b>Transfer:</b> ${data.transferTime || "—"}</div>
      `;

      document.getElementById("previewVenue").innerHTML = `
        <div><b>${data.venueName || "Venue Name"}</b></div>
        <div style="white-space:pre-line;">${data.venueAddress || "—"}</div>
        <div style="margin-top:8px;">${data.venueNote || ""}</div>
      `;

      document.getElementById("previewDress").innerHTML =
        `<div>${data.dressCode || "—"}</div>`;

      const faq = [
        [data.faqQ1, data.faqA1],
        [data.faqQ2, data.faqA2],
        [data.faqQ3, data.faqA3],
        [data.faqQ4, data.faqA4]
      ]
      .filter(([q,a]) => q || a)
      .map(([q,a]) => `<div style="margin-bottom:8px;"><b>${q || ""}</b><br>${a || ""}</div>`)
      .join("");

      document.getElementById("previewFaq").innerHTML = faq || "<div>—</div>";
    }

    fieldIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", () => {
        saveDraft();
        updatePreview();
      });
    });

document.getElementById("saveDraftBtn").addEventListener("click", async () => {
  const f = getFormData();

  const data = {

    schedule_time_1: f.scheduleTime1,
    schedule_text_1: f.scheduleText1,
    schedule_time_2: f.scheduleTime2,
    schedule_text_2: f.scheduleText2,
    schedule_time_3: f.scheduleTime3,
    schedule_text_3: f.scheduleText3,
    schedule_time_4: f.scheduleTime4,
    schedule_text_4: f.scheduleText4,

    airport: f.airport,
    transfer_time: f.transferTime,
    flights_text: f.flightsText,

    hotel_1: f.hotel1,
    hotel_2: f.hotel2,
    hotel_3: f.hotel3,

    venue_name: f.venueName,
    map_link: f.mapLink,
    venue_address: f.venueAddress,
    venue_note: f.venueNote,

    getting_around: f.gettingAround,
    dress_code: f.dressCode,
    weather: f.weather,
    weather_note: f.weatherNote,

    trip_1: f.trip1,
    trip_2: f.trip2,
    trip_3: f.trip3,

    faq_q1: f.faqQ1,
    faq_a1: f.faqA1,
    faq_q2: f.faqQ2,
    faq_a2: f.faqA2,
    faq_q3: f.faqQ3,
    faq_a3: f.faqA3,
    faq_q4: f.faqQ4,
    faq_a4: f.faqA4
  };

  await saveToSupabase(data);

  alert("Saved to Supabase ✅");
});


document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Reset all fields?")) return;
  localStorage.removeItem(storageKey);
  location.reload();
});


document.getElementById("openPreviewBtn").addEventListener("click", () => {
  saveDraft();
  window.open(`/venue_map.html?t=${encodeURIComponent(token)}`, "_blank");
});


(async () => {
  const data = await loadFromSupabase();

  if (data) {
    const mapped = {

      scheduleTime1: data.schedule_time_1,
      scheduleText1: data.schedule_text_1,
      scheduleTime2: data.schedule_time_2,
      scheduleText2: data.schedule_text_2,
      scheduleTime3: data.schedule_time_3,
      scheduleText3: data.schedule_text_3,
      scheduleTime4: data.schedule_time_4,
      scheduleText4: data.schedule_text_4,

      airport: data.airport,
      transferTime: data.transfer_time,
      flightsText: data.flights_text,

      hotel1: data.hotel_1,
      hotel2: data.hotel_2,
      hotel3: data.hotel_3,

      venueName: data.venue_name,
      mapLink: data.map_link,
      venueAddress: data.venue_address,
      venueNote: data.venue_note,

      gettingAround: data.getting_around,
      dressCode: data.dress_code,
      weather: data.weather,
      weatherNote: data.weather_note,

      trip1: data.trip_1,
      trip2: data.trip_2,
      trip3: data.trip_3,

      faqQ1: data.faq_q1,
      faqA1: data.faq_a1,
      faqQ2: data.faq_q2,
      faqA2: data.faq_a2,
      faqQ3: data.faq_q3,
      faqA3: data.faq_a3,
      faqQ4: data.faq_q4,
      faqA4: data.faq_a4
    };

    setFormData(mapped);
  }

  updatePreview();
})();
async function saveToSupabase(data) {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  const { error } = await sb
    .from("wedding_info")
    .upsert(
      [{ site_edit_token: token, ...data }],
      { onConflict: "site_edit_token" }
    );

  if (error) {
    console.error("SAVE ERROR:", error);
    alert("Ошибка сохранения");
  }
}

async function loadFromSupabase() {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  if (error) {
    console.error("LOAD ERROR:", error);
    return null;
  }

  return data;
}


  </script>
</body>
</html>
