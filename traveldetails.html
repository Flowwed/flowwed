  <style>
    body{
      margin:0;
      font-family:"Segoe UI", Arial, sans-serif;

    .page{

      margin:28px auto 60px;

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;

    h1{

    .token-pill{

      background:#fff7f8;
      border:1px solid #ffd5dc;

      font-weight:600;

    .layout{
      display:grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap:22px;
      align-items:start;

    .panel{
      background:rgba(255,255,255,0.82);
      border-radius:22px;

      box-shadow:

    .section{

      padding:16px;

    .section h2{
      margin:0 0 12px;
      font-size:18px;
      color:#a52126;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px 14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:13px;
      font-weight:700;
      color:#7e2a2a;
    }

    input, textarea{
      width:100%;
      box-sizing:border-box;
      border:1px solid #e9c8d0;
      border-radius:12px;
      padding:11px 12px;
      font-size:14px;
      background:#fff;
      color:#5d2222;
    }

    textarea{
      min-height:84px;
      resize:vertical;
      line-height:1.45;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    button{
      border:none;
      cursor:pointer;
      padding:12px 18px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg,#b41111,#8e1515);
      box-shadow:0 8px 20px rgba(0,0,0,0.18);

    button.secondary{
      background:linear-gradient(135deg,#8f7f7f,#6d6161);
    }

    button.light{
      background:linear-gradient(135deg,#ffffff,#f4ecec);
      color:#8b1a1a;
      border:1px solid #e5d3d3;
    }

    .hint{
      margin-top:10px;
      font-size:13px;
      color:#8a6666;
    }

    .preview-card{
      background:linear-gradient(180deg,#ffffff 0%,#fff6f7 100%);
      border-radius:24px;
      padding:24px;

    .preview-block{

      padding:14px 16px;
      border-radius:16px;
      background:#fff;
      border:1px solid #f0d9de;

    .preview-block strong{

      display:block;
      margin-bottom:6px;
    }

    .small{

      color:#8b6666;
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }

<body>

    <div class="topbar">

    </div>

    <div class="layout">

      <div class="panel">
        <div class="section">
          <h2>Basic</h2>
          <div class="grid">

            <div class="field">

            <div class="field full">

          </div>
        </div>

        <div class="section">

          <div class="grid">
            <div class="field"><label>Time 1</label><input id="scheduleTime1" placeholder="3:00 PM"></div>
            <div class="field"><label>Event 1</label><input id="scheduleText1" placeholder="Ceremony begins"></div>

            <div class="field"><label>Time 2</label><input id="scheduleTime2" placeholder="4:30 PM"></div>
            <div class="field"><label>Event 2</label><input id="scheduleText2" placeholder="Cocktail hour"></div>

            <div class="field"><label>Time 3</label><input id="scheduleTime3" placeholder="6:00 PM"></div>
            <div class="field"><label>Event 3</label><input id="scheduleText3" placeholder="Dinner & celebration"></div>

            <div class="field"><label>Time 4</label><input id="scheduleTime4" placeholder="10:00 PM"></div>
            <div class="field"><label>Event 4</label><input id="scheduleText4" placeholder="Dancing continues"></div>
          </div>
        </div>

        <div class="section">
          <h2>Flights & Stay</h2>
          <div class="grid">

            <div class="field"><label>Transfer Time</label><input id="transferTime" placeholder="45 minutes"></div>
            <div class="field full"><label>Flights Description</label><textarea id="flightsText" placeholder="Fly into..."></textarea></div>

            <div class="field"><label>Hotel 1</label><input id="hotel1" placeholder="Hotel Option 1 — 10 min from venue"></div>
            <div class="field"><label>Hotel 2</label><input id="hotel2" placeholder="Hotel Option 2 — city center"></div>
            <div class="field full"><label>Hotel 3</label><input id="hotel3" placeholder="Hotel Option 3 — budget friendly"></div>
          </div>
        </div>

        <div class="section">
          <h2>Venue</h2>
          <div class="grid">
            <div class="field"><label>Venue Name</label><input id="venueName" placeholder="The Grand Garden"></div>
            <div class="field"><label>Map Link</label><input id="mapLink" placeholder="https://maps.google.com/..."></div>
            <div class="field full"><label>Venue Address</label><textarea id="venueAddress" placeholder="Full address line"></textarea></div>
            <div class="field full"><label>Venue Note</label><input id="venueNote" placeholder="Please use the main entrance."></div>
          </div>
        </div>

        <div class="section">
          <h2>Details</h2>
          <div class="grid">
            <div class="field full"><label>Getting Around</label><textarea id="gettingAround" placeholder="Uber, Bolt, local taxis..."></textarea></div>
            <div class="field full"><label>Dress Code</label><textarea id="dressCode" placeholder="Formal / Semi-formal attire..."></textarea></div>
            <div class="field"><label>Weather</label><input id="weather" placeholder="24°C / 75°F"></div>

          </div>
        </div>

          <div class="grid">
            <div class="field"><label>Place 1</label><input id="trip1" placeholder="Old Town"></div>
            <div class="field"><label>Place 2</label><input id="trip2" placeholder="Sea View Point"></div>

            <div class="field"><label>Question 4</label><input id="faqQ4" placeholder="Will this page be updated?"></div>

        <div class="actions">

            <div id="previewSchedule"></div>

            <strong>Flights & Arrival</strong>
            <div id="previewFlights"></div>
          </div>

          <div class="preview-block">
            <strong>Venue</strong>
            <div id="previewVenue"></div>
          </div>

          <div class="preview-block">
            <strong>Dress Code</strong>
            <div id="previewDress"></div>

          <div class="preview-block">
            <strong>Helpful Info</strong>
            <div id="previewFaq"></div>
          </div>
        </div>
      </div>

    </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get("t") || params.get("token") || "demo-token";
    const storageKey = `venueMapDraft:${token}`;

    document.getElementById("tokenPill").textContent = `Token: ${token}`;

    const fieldIds = [
      "coupleName","heroSubtitle","weddingDate",
      "scheduleTime1","scheduleText1","scheduleTime2","scheduleText2",
      "scheduleTime3","scheduleText3","scheduleTime4","scheduleText4",
      "airport","transferTime","flightsText",
      "hotel1","hotel2","hotel3",
      "venueName","mapLink","venueAddress","venueNote",
      "gettingAround","dressCode","weather","weatherNote",
      "trip1","trip2","trip3",
      "faqQ1","faqA1","faqQ2","faqA2","faqQ3","faqA3","faqQ4","faqA4"
    ];

    function getFormData(){
      const data = {};
      fieldIds.forEach(id => {
        const el = document.getElementById(id);
        data[id] = el ? el.value : "";
      });
      return data;
    }

    function setFormData(data){
      fieldIds.forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] != null) el.value = data[id];
      });
    }

    function saveDraft(){
      localStorage.setItem(storageKey, JSON.stringify(getFormData()));
    }

    function loadDraft(){
      const raw = localStorage.getItem(storageKey);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        setFormData(data);
      } catch(e) {
        console.error("Draft parse error", e);
      }
    }

    function formatDate(value){
      if (!value) return "";
      const [y,m,d] = value.split("-");
      const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      ];
      return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
    }

    function updatePreview(){
      const data = getFormData();

      document.getElementById("previewCouple").textContent =
        data.coupleName || "Couple Name";

      document.getElementById("previewSubtitle").textContent =
        data.heroSubtitle || "Everything you need to know for the big day.";

      const schedule = [
        [data.scheduleTime1, data.scheduleText1],
        [data.scheduleTime2, data.scheduleText2],
        [data.scheduleTime3, data.scheduleText3],
        [data.scheduleTime4, data.scheduleText4]
      ]
      .filter(([t,txt]) => t || txt)
      .map(([t,txt]) => `<div><b>${t || ""}</b> ${txt || ""}</div>`)
      .join("");

      document.getElementById("previewSchedule").innerHTML =
        schedule || "<div>—</div>";

      document.getElementById("previewFlights").innerHTML = `
        <div>${data.flightsText || "—"}</div>
        <div style="margin-top:8px;"><b>Airport:</b> ${data.airport || "—"}</div>
        <div><b>Transfer:</b> ${data.transferTime || "—"}</div>
      `;

      document.getElementById("previewVenue").innerHTML = `
        <div><b>${data.venueName || "Venue Name"}</b></div>
        <div style="white-space:pre-line;">${data.venueAddress || "—"}</div>
        <div style="margin-top:8px;">${data.venueNote || ""}</div>
      `;

      document.getElementById("previewDress").innerHTML =
        `<div>${data.dressCode || "—"}</div>`;

      const faq = [
        [data.faqQ1, data.faqA1],
        [data.faqQ2, data.faqA2],
        [data.faqQ3, data.faqA3],
        [data.faqQ4, data.faqA4]
      ]
      .filter(([q,a]) => q || a)
      .map(([q,a]) => `<div style="margin-bottom:8px;"><b>${q || ""}</b><br>${a || ""}</div>`)
      .join("");

      document.getElementById("previewFaq").innerHTML = faq || "<div>—</div>";
    }

    fieldIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", () => {
        saveDraft();
        updatePreview();
      });
    });

document.getElementById("saveDraftBtn").addEventListener("click", async () => {
  const data = getFormData();

  await saveToSupabase(data);

  alert("Saved to Supabase ✅");
});
    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("Reset all fields?")) return;
      localStorage.removeItem(storageKey);
      location.reload();
    });

    document.getElementById("openPreviewBtn").addEventListener("click", () => {
      saveDraft();
      window.open(`/venue_map.html?t=${encodeURIComponent(token)}`, "_blank");
    });

(async () => {
  const data = await loadFromSupabase();

  if (data) {
    // преобразуем под твою форму
    const mapped = {
      coupleName: data.couple_name,
      weddingDate: data.wedding_date,
      heroSubtitle: data.hero_subtitle,

      scheduleTime1: data.schedule_time_1,
      scheduleText1: data.schedule_text_1,
      scheduleTime2: data.schedule_time_2,
      scheduleText2: data.schedule_text_2,
      scheduleTime3: data.schedule_time_3,
      scheduleText3: data.schedule_text_3,
      scheduleTime4: data.schedule_time_4,
      scheduleText4: data.schedule_text_4,

      airport: data.airport,
      transferTime: data.transfer_time,
      flightsText: data.flights_text,

      hotel1: data.hotel_1,
      hotel2: data.hotel_2,
      hotel3: data.hotel_3,

      venueName: data.venue_name,
      mapLink: data.map_link,
      venueAddress: data.venue_address,
      venueNote: data.venue_note,

      gettingAround: data.getting_around,
      dressCode: data.dress_code,
      weather: data.weather,
      weatherNote: data.weather_note,

      trip1: data.trip_1,
      trip2: data.trip_2,
      trip3: data.trip_3,

      faqQ1: data.faq_q1,
      faqA1: data.faq_a1,
      faqQ2: data.faq_q2,
      faqA2: data.faq_a2,
      faqQ3: data.faq_q3,
      faqA3: data.faq_a3,
      faqQ4: data.faq_q4,
      faqA4: data.faq_a4
    };

    setFormData(mapped);
  }

  updatePreview();
})();

async function saveToSupabase(data) {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  const { error } = await window.supabase
    .from("wedding_info")
    .upsert(
      [{ site_edit_token: token, ...data }],
      { onConflict: "site_edit_token" }
    );

  if (error) {
    console.error("SAVE ERROR:", error);
    alert("Ошибка сохранения");
  }
}

async function loadFromSupabase() {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  const { data, error } = await window.supabase
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  if (error) {
    console.error("LOAD ERROR:", error);
    return null;
  }

  return data;
}


  </script>
