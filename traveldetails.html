<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Travel & Details Admin</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  color:#6a2a2a;
}

.page{
  max-width:1280px;
  margin:28px auto 60px;
  padding:0 20px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:32px;
  color:#9c1818;
}

.layout{
  display:grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap:22px;
}

.panel{
  background:rgba(255,255,255,0.82);
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 40px rgba(0,0,0,0.14);
}

.steps{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.step{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:#ffe5ea;
  font-weight:600;
}

.step.active{
  background:#b41111;
  color:#fff;
}

.section{
  display:none;
}

.section.active{
  display:block;
}

.section-box{
  margin-bottom:18px;
  padding:16px;
  border-radius:16px;
  background:#fff9fa;
  border:1px solid #f3d8de;
}

.section-box h2{
  margin:0 0 12px;
  font-size:18px;
  color:#a52126;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 14px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field.full{
  grid-column:1 / -1;
}

label{
  font-size:13px;
  font-weight:700;
  color:#7e2a2a;
}

input, textarea{
  border:1px solid #e9c8d0;
  border-radius:12px;
  padding:11px 12px;
}

textarea{
  min-height:80px;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#b41111,#8e1515);
  color:white;
}

.preview{
  position:sticky;
  top:20px;
}



.top-nav-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 10px;
}

.back-btn {
  position: fixed;   /* ← вместо absolute */
  left: 20px;
  top: 20px;
  z-index: 1000;     /* чтобы всегда сверху */
  display: inline-flex;
  align-items: center;
  gap: 6px;

  padding: 4px 10px;

  font-size: 16px;
  font-weight: 500;

  color: #b40012;
  background: transparent;
  border: none;

  cursor: pointer;

  outline: none;
  box-shadow: none;
}

.back-btn:active {
  transform: translateY(1px);
  opacity: 0.5;
}

.back-arrow {
  font-size: 26px;
  transform: translateY(-1px);
}


    /* ============================= */
    /* RUBY GLASS BUTTON STYLE       */
    /* ============================= */

    button,
    .footer-btn {
      padding: 14px 22px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.35);

      font-size: 16px;
      font-weight: 700;
      color: white;

      cursor: pointer;
      transition: 0.28s ease;

      background: linear-gradient(

    button:active {

async function saveToSupabase(data) {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  const { error } = await sb
    .from("wedding_info")
    .upsert(
      [{ site_edit_token: token, ...data }],
      { onConflict: "site_edit_token" }
    );

  if (error) {
    console.error("SAVE ERROR:", error);
    alert("Ошибка сохранения");
  }
}

async function loadFromSupabase() {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  if (error) {
    console.error("LOAD ERROR:", error);
    return null;
  }

  return data;
}
