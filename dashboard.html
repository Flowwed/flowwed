<script>
document.addEventListener("DOMContentLoaded", () => {

if (!EMILY_ENABLED) return;


  // элементы модалки
  const modal = document.getElementById("emilyModal");
  const iframe = document.getElementById("emilyIframe");
  const closeBtn = document.getElementById("closeEmilyModal");

  // clickable элементы
  const knob = document.querySelector(".access-knob");
  const banner = document.querySelector(".access-banner");

  // получаем token из URL, как в остальном коде
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");


function openEmilyModal() {
  if (!token) {
    alert("Missing token in URL");
    return;
  }

  const page =
    document.querySelector(".page-title")?.textContent ||
    document.title ||
    "Dashboard";

  iframe.src = `https://coruscating-pika-435f9a.netlify.app/emillyai?t=${encodeURIComponent(token)}&page=${encodeURIComponent(page)}`;
  modal.style.display = "flex";
}

  // назначаем клики
if (knob) {
  knob.addEventListener("click", openEmilyModal);
}

if (banner) {
  banner.addEventListener("click", openEmilyModal);
}

  closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
  });

});
</script>
