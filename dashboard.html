/* =============================================== */

/* =============================================== */

.big-btn {
  width: 160px;

  border-radius: 32px;

  background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.22),
      rgba(255,255,255,0.05)

  backdrop-filter: blur(22px) saturate(180%);

  color: white;
  font-size: 18px;
  font-weight: 600;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;

  cursor: pointer;
  position: relative;
  overflow: visible;

  /* SUPER SMOOTH */
  transition:
    transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1),
    box-shadow 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);

  /* depth */
  box-shadow:
    0 18px 40px rgba(0,0,0,0.45),
    0 6px 14px rgba(0,0,0,0.35),
    inset 0 4px 8px rgba(255,255,255,0.25),
    inset 0 -10px 20px rgba(80,0,20,0.45);
}

/* glossy top reflection */
.big-btn::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 40%;
  border-radius: inherit;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.55),
    rgba(255,255,255,0)
  );
  pointer-events: none;
}

/* icon */

  font-size: 30px;
  color: #ffe6ec;
  text-shadow: 0 2px 6px rgba(0,0,0,0.25);

/* =============================================== */
/*      SOFT BREATHING ANIMATION FOR BUTTONS       */
/* =============================================== */

  50%  { transform: scale(1.015); } /* VERY subtle */

    transform: scale(1);

      0 18px 40px rgba(0,0,0,0.45),
      inset 0 4px 8px rgba(255,255,255,0.18),
      inset 0 -10px 20px rgba(80,0,20,0.40),
      0 0 0 rgba(255,60,100,0);
  }
}

/* ================================================= */
/*           Smooth Bubble Tooltip                   */
/* ================================================= */

.big-btn {
  position: relative;
}

.big-btn .bubble {
  position: absolute;
  bottom: 220px;
  left: 50%;
  transform: translateX(-50%) scale(0.98);

  display: block;
  box-sizing: border-box;

  background: #e5e5ea;
  color: #1a1a1a;

  padding: 14px 18px;
  border-radius: 20px;

  font-size: 15px;
  font-weight: 500;
  line-height: 1.45;
  text-align: left;

  width: 420px;
  max-width: 420px;
  white-space: normal;

  box-shadow:
    0 6px 14px rgba(0,0,0,0.15),
    0 2px 4px rgba(0,0,0,0.08);

  opacity: 0;
  pointer-events: none;
  transition:
    opacity 0.25s ease,
    transform 0.25s ease;
  z-index: 20;
}

.big-btn .bubble::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 10px solid #e5e5ea;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
}

.big-btn:hover .bubble {
  opacity: 1;
  transform: translateX(-50%) translateY(-6px) scale(1);
}

.access-knob {
 display: none;

  position: relative;
  z-index: 2;
  overflow: hidden; /* на всякий случай */

animation: emilyBreath 4.5s ease-in-out infinite;
  transform-origin: center center;

cursor: pointer;


}

/* стеклянное внутреннее кольцо */
.access-knob::before {
  content: "";
  position: absolute;
  inset: 8px;               /* размер кольца */
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.75);
  box-shadow:
    0 0 8px rgba(255,255,255,0.4),
    0 0 18px rgba(255,180,200,0.35);
  pointer-events: none;
}

.access-knob img {
  position: absolute;
  inset: 14px;              
  width: calc(100% - 28px);
  height: calc(100% - 28px);
  border-radius: 50%;
  object-fit: cover;
  z-index: 3;
}

@keyframes emilyBreath {
  0% {
    transform: scale(1);
    box-shadow:
      0 18px 40px rgba(0,0,0,0.45),
      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -10px 20px rgba(80,0,20,0.45),

      inset 0 8px 16px rgba(255,255,255,0.35),

      0 0 16px rgba(255,70,120,0.30),
      0 0 34px rgba(255,70,120,0.22),

  100% {

      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -10px 20px rgba(80,0,20,0.45),
      0 0 0 rgba(255,70,120,0);

function openPage(page) {

  const params = new URLSearchParams(window.location.search);

  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  let file = "";

  switch (page) {
    case "guestbook":
      file = "Guests.html";
      break;

    case "upload":
      file = "upload.html";
      break;

    case "std":
      file = "savethedate.html";
      break;

    case "rsvp":
      file = "postwed.html";
      break;

    case "seating":
      file = "SeatingChart.html";
      break;

    case "registry":
      file = "gift_registry.html";
      break;

    case "budget":
      file = "Budget.html";
      break;

    case "reports":
       file = "traveldetails.html";
      break;

    case "memories":
      file = "postwed2.html";
      break;

    case "album":
      file = "just_married.html";
      break;

    case "story":
      file = "story.html";
      break;

    case "updates":
      file = "dash-updates.html";
      break;

    case "party":
     file = "wedparty.html";
      break;

    case "yourweb":
      file = "YourWeb.html";
      break;

    case "wedreports":
      file = "wed_reports.html";
      break;

    default:
      alert("Not connected: " + page);
      return;
  }

if (page === "yourweb") {
  window.open(`${file}?t=${token}`, "_blank");
} else {

  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = `${file}?t=${token}`;
  }, 300);

}
}


</script>
