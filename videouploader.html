<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Uploader</title>

<style>
body {
  font-family: Arial;
  background: #f6e2e5;
  margin: 0;
  padding: 40px;
}

/* layout */
.uploader-container {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 20px;

  width: 640px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 20px;
}

/* preview */
#previewBox {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 9/16;

  border-radius: 18px;
  border: 1px solid #ccc;
  background: #fafafa;

  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#previewBox.placeholder::before {
  content: "";
  width: 60px;
  height: 60px;
  opacity: 0.3;
  background: url("https://cdn-icons-png.flaticon.com/512/685/685655.png") center/contain no-repeat;
}

#preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}


/* controls */

.controls-card {
  display: flex;
  flex-direction: column;
  gap: 12px;

  justify-content: center;   /* 👈 центр по вертикали */
  height: 100%;              /* 👈 занимает всю высоту */
}

input, select {
  height: 42px;
  border-radius: 10px;
  border: 1px solid #ccc;
  padding: 0 12px;        /* 👈 добавили */
  display: flex;
  align-items: center;    /* 👈 центрирует текст */
}

button {
  height: 48px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
transition: 0.2s ease;
}

#uploadBtn {
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.05)
  ), #9c1818;

  color: white;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.35),
    0 3px 8px rgba(0,0,0,0.25),
    inset 0 3px 6px rgba(255,255,255,0.2),
    inset 0 -6px 14px rgba(70,0,20,0.3);
}

#uploadBtn:hover {
  transform: translateY(-3px) scale(1.02);

  box-shadow:
    0 14px 28px rgba(0,0,0,0.45),
    0 6px 14px rgba(0,0,0,0.3),
    inset 0 4px 10px rgba(255,255,255,0.25),
    inset 0 -10px 18px rgba(60,0,20,0.35);
}

#uploadBtn:active {
  transform: scale(0.96);
}


.see-web-btn {
  margin-top: 16px;

  background: linear-gradient(180deg, #ffffff, #f2f2f2);
  color: #b40012;

  border: 1px solid rgba(180, 17, 17, 0.25);

  box-shadow:
    0 6px 14px rgba(0,0,0,0.12),
    inset 0 1px 0 rgba(255,255,255,0.9);

  transition: 0.2s ease;
}

.see-web-btn:hover {
  background: linear-gradient(180deg, #fff5f6, #f7d9dc);
  transform: translateY(-2px);

  box-shadow:
    0 10px 20px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.95);
}


#fileInput {
  display: none !important;
}


/* status */
#status {
  font-size: 14px;
}

.progress-container {
  margin-top: 12px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  height: 10px;
  display: none;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background: #c30c1e;
  transition: width 0.2s;
}


.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999999;
}

.modal-window {
  position: relative;
  background: white;
  width: 75vw;
  height: 75vh;
  border-radius: 18px;
  overflow: hidden;
}

.modal-iframe {
  width: 100%;
  height: 100%;
  border: none;
}


.back-btn {
  position: absolute;
  left: 120px;
  top: 50%;
  transform: translateY(-50%);

  display: inline-flex;
  align-items: center;
  gap: 6px;

  height: 32px;
  padding: 0 14px;

  border-radius: 999px;

  background:
    linear-gradient(to bottom, rgba(255,255,255,0.25), rgba(255,255,255,0.05)),
    #9c1818;

  color: white;
  font-size: 12px;
  font-weight: 600;
  line-height: 1;

  border: 1px solid rgba(255,255,255,0.35);

  box-shadow:
    0 4px 10px rgba(0,0,0,0.25),
    inset 0 1px 3px rgba(255,255,255,0.2);
}
.back-btn:hover {
  transform: translateY(-50%) translateY(-2px);
}

.back-btn:active {
  transform: translateY(-50%) scale(0.96);
}


.top-header {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 10px;
  margin-bottom: 18px;
}




/* ================= HEADER (same as Reports) ================= */

h1 {
  text-align: center;
  font-size: 36px;
  font-weight: 600;
  background: linear-gradient(to bottom, #ff3b3b, #b41111, #5e0202);
  -webkit-background-clip: text;
  color: transparent;
  margin-top: 28px;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

/* couple names under title */
.couple-subtitle {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  margin-top: -20px;
  margin-bottom: 25px;
  color: #b41111;
  opacity: 0.85;
}

/* info bubble */
.ios-banner {
  margin: 0 auto 36px auto;
  padding: 16px 24px;
  max-width: 880px;
  text-align: center;

  background: rgba(250, 250, 250, 0.65);
  border-radius: 18px;

  border: 1px solid rgba(255,255,255,0.55);
  backdrop-filter: blur(18px);

  color: #555;
  font-size: 15.5px;
  font-weight: 550;
  line-height: 1.45;

  box-shadow:
    0 6px 16px rgba(0,0,0,0.10); 
    inset 0 3px 8px rgba(255,255,255,0.25);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal.hidden{
  display:none;
}

.modal-box{
  background:#fff;
  padding:20px 24px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
  min-width:220px;
}

.modal-box p{
  margin:0 0 16px;
  font-size:14px;
  color:#4a2b2b;
}

.modal-actions{
  display:flex;
  gap:12px;
  justify-content:center;
}

.modal-actions button{
  padding:6px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:13px;
}


/* ================= BANNER ROW ================= */

.banner-row {
  max-width: 1400px;
  margin: 0 auto 1px;
  padding: 0 16px;

  display: grid;
  grid-template-columns: 1fr auto 1fr; /* 🔑 */
  align-items: center;
}

/* пустой баланс слева */
.banner-spacer {
  /* ничего не нужно */
}

/* bubble — строго центр экрана */
.ios-banner {
  justify-self: center;
  text-align: center;
}

.info-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  width: 18px;
  height: 18px;

  margin-right: 8px;

  border-radius: 50%;
  background: linear-gradient(180deg, #ff4d4d, #b41111);
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  color: white;

  font-size: 12px;
  font-weight: bold;

  flex-shrink: 0;
}


.guide-link {
  color: #2a6bff;
  text-decoration: underline;
  cursor: pointer;
  font-weight: 700;
}


</style>
</head>

<body>

<div class="top-header">
  <button id="backBtn" class="back-btn" type="button">
    <span class="back-arrow">‹</span>
    Back to Dash
  </button>




  <h1>Web Video</h1>
</div>



<div class="ios-banner">
<span class="info-icon">i</span>
  Add a video to your landing page. Check the Quick User Guide
  <span id="openGuide" class="guide-link">here</span>
</div>



<div class="uploader-container">

  <div id="previewBox" class="placeholder">

  </div>

<input type="file" id="fileInput" hidden>

<div class="progress-container" id="progressContainer">
  <div class="progress-bar" id="progressBar"></div>
</div>


    <div id="status"></div>

    <button class="see-web-btn" id="previewPageBtn">
      👁 Preview Your Page
    </button>

<button id="deleteBtn" class="see-web-btn">
  🗑 Delete Video
</button>

  </div>

</div>

<script>
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";


const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");


const params = new URLSearchParams(window.location.search);
const token = params.get("t");

const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const preview = document.getElementById("preview");
const previewBox = document.getElementById("previewBox");
const status = document.getElementById("status");
const deleteBtn = document.getElementById("deleteBtn");

let slug = null;
let localVideoURL = null;
let currentVideoPath = null;

/* LOAD SLUG */
async function loadSlug() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/sites?edit_token=eq.${token}&select=slug,video_path`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

if (data.length) {
  slug = data[0].slug;

  const videoPath = data[0].video_path;

currentVideoPath = videoPath;

  if (videoPath) {
const videoUrl = `${SUPABASE_URL}/storage/v1/object/public/galleries/${videoPath}?t=${Date.now()}`;


    preview.src = videoUrl;
    preview.load(); 
    preview.style.display = "block";
    previewBox.classList.remove("placeholder");
  }
}
}

/* PREVIEW */
fileInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

localVideoURL = URL.createObjectURL(file);
preview.src = localVideoURL;

  preview.style.display = "block";
  previewBox.classList.remove("placeholder");
});

/* UPLOAD */

uploadBtn.onclick = async () => {

  const file = fileInput.files[0];

const MAX_SIZE = 80 * 1024 * 1024; // 80MB

if (file.size > MAX_SIZE) {
  status.innerText = "❌ Video too large (max 80MB)";
  return;
}

  if (!file) {
    status.innerText = "Choose video first";
    return;
  }


  if (!slug) {
    status.innerText = "No slug";
    return;
  }

// 👇 ВОТ СЮДА ВСТАВИЛ
  const originalText = uploadBtn.innerHTML;

  uploadBtn.disabled = true;
  uploadBtn.innerHTML = "Uploading...";

  progressContainer.style.display = "block";
  progressBar.style.width = "0%";

  status.innerText = "Uploading...";

  try {

    const safeName = file.name.replace(/\s+/g, "_");
    const path = `${slug}/main/${safeName}`;


    const res = await fetch("/.netlify/functions/mint-upload-url-2", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        slug,
        token,
        slot: "main",
        filename: safeName,
        page_key: "main_video"
      })
    });

    const data = await res.json();

console.log("MINT RESPONSE:", data);

console.log("UPLOAD RESPONSE:", data);

    const uploadURL =
      data.uploadURL || data.url || data.signedUrl;

    if (!uploadURL) {
      console.error("NO URL FROM FUNCTION:", data);
      throw new Error("No upload URL returned");
    }

await uploadFileWithProgress(uploadURL, file, (p) => {
  progressBar.style.width = p + "%";
});

console.log("UPLOAD FILE NAME:", file.name);
console.log("EXPECTED PATH:", path);
console.log("FINAL PATH SAVED:", path);


  const realPath =
  data.path ||
  data.filePath ||
  data.storagePath ||
  data.key;

console.log("REAL PATH:", realPath);

await fetch(`${SUPABASE_URL}/rest/v1/sites?edit_token=eq.${token}`, {
  method: "PATCH",
  headers: {
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    video_path: realPath
  })
});

// 👇 ВОТ ЭТА СТРОКА
currentVideoPath = realPath;

const videoUrl = `${SUPABASE_URL}/storage/v1/object/public/galleries/${realPath}`;

    status.innerText = "✅ Uploaded!";

uploadBtn.disabled = false;
uploadBtn.innerHTML = originalText;

setTimeout(() => {
  progressContainer.style.display = "none";
  progressBar.style.width = "0%";
}, 800);


if (localVideoURL) {
  preview.src = localVideoURL;
  preview.load();
}


  } catch (e) {
    console.error(e);
    status.innerText = "❌ Upload failed";
  }

  uploadBtn.disabled = false;

};


/* PREVIEW PAGE */
document.getElementById("previewPageBtn").onclick = () => {

  const modal = document.getElementById("videoPreviewModal");
  const iframe = document.getElementById("videoPreviewIframe");
  const closeBtn = document.getElementById("closeVideoPreview");

  if (!token) {
    alert("Missing token");
    return;
  }

  iframe.src = `https://flowwed.netlify.app/?t=${token}`;
  modal.style.display = "flex";

  closeBtn.onclick = () => {
    modal.style.display = "none";
    iframe.src = "";
  };

};


deleteBtn.onclick = async () => {

  if (!currentVideoPath) {
    status.innerText = "No video to delete";
    return;
  }

  const res = await fetch("/.netlify/functions/delete-video", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      token,
      path: currentVideoPath
    })
  });

  if (!res.ok) {
    const txt = await res.text();
    console.error("DELETE ERROR:", txt);
    status.innerText = "❌ Delete failed";
    return;
  }

  // очистка UI
  preview.src = "";
  preview.style.display = "none";
  fileInput.value = "";
  previewBox.classList.add("placeholder");
  status.innerText = "🗑 Deleted";

  currentVideoPath = null;
};



loadSlug();


function uploadFileWithProgress(url, file, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("PUT", url, true);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        onProgress(percent);
      }
    };

    xhr.onload = () => resolve();
    xhr.onerror = () => reject();

    xhr.send(file);
  });
}

const chooseFileBtn = document.getElementById("chooseFileBtn");
const fileName = document.getElementById("fileName");

chooseFileBtn.onclick = () => {
  fileInput.click();
};

fileInput.addEventListener("change", e => {
  const file = e.target.files[0];

  if (file) {
    fileName.innerText = file.name;
  } else {
    fileName.innerText = "No file chosen";
  }
});

</script>
