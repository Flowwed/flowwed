<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Uploader</title>

<style>
body {
  font-family: Arial;
  background: #f6e2e5;
  margin: 0;
  padding: 40px;
}

/* layout */
.uploader-container {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 20px;

  width: 720px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 20px;
}

/* preview */
#previewBox {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 9/16;

  border-radius: 18px;
  border: 1px solid #ccc;
  background: #fafafa;

  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#previewBox.placeholder::before {
  content: "";
  width: 60px;
  height: 60px;
  opacity: 0.3;
  background: url("https://cdn-icons-png.flaticon.com/512/685/685655.png") center/contain no-repeat;
}

#preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* remove btn */
#removeBtn {
  position: absolute;
  top: 10px;
  right: 10px;

  width: 26px;
  height: 26px;

  border-radius: 50%;
  background: white;
  color: red;

  display: none;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  font-weight: bold;
}

/* controls */
.controls-card {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input, select {
  height: 42px;
  border-radius: 10px;
  border: 1px solid #ccc;
  padding: 0 10px;
}

button {
  height: 48px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
}

#uploadBtn {
  background: #c30c1e;
  color: white;
}

.see-web-btn {
  background: #eee;
}

/* status */
#status {
  font-size: 14px;
}
</style>
</head>

<body>

<div class="uploader-container">

  <div id="previewBox" class="placeholder">
    <video id="preview" controls></video>
    <div id="removeBtn">×</div>
  </div>

  <div class="controls-card">
    <input type="file" id="fileInput" accept="video/mp4,video/webm">

    <button id="uploadBtn">
      Upload Video
    </button>

    <div id="status"></div>

    <button class="see-web-btn" id="previewPageBtn">
      👁 Preview Your Page
    </button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";





const params = new URLSearchParams(window.location.search);
const token = params.get("t");

const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const preview = document.getElementById("preview");
const previewBox = document.getElementById("previewBox");
const removeBtn = document.getElementById("removeBtn");
const status = document.getElementById("status");

let slug = null;
let localVideoURL = null;

/* LOAD SLUG */
async function loadSlug() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/sites?edit_token=eq.${token}&select=slug`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();
  if (data.length) slug = data[0].slug;
}

/* PREVIEW */
fileInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

localVideoURL = URL.createObjectURL(file);
preview.src = localVideoURL;

  preview.style.display = "block";
  previewBox.classList.remove("placeholder");
  removeBtn.style.display = "flex";
});

/* UPLOAD */

uploadBtn.onclick = async () => {

  const file = fileInput.files[0];

  if (!file) {
    status.innerText = "Choose file first";
    return;
  }

  if (!slug) {
    status.innerText = "No slug";
    return;
  }

  uploadBtn.disabled = true;
  status.innerText = "Uploading...";

  try {

    const safeName = file.name.replace(/\s+/g, "_");
    const path = `${slug}/main/${safeName}`;

    const res = await fetch("/.netlify/functions/mint-upload-url-2", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        slug,
        token,
        slot: "main",
        filename: safeName,
        page_key: "main_video"
      })
    });

    const data = await res.json();

    const uploadURL =
      data.uploadURL || data.url || data.signedUrl;

    if (!uploadURL) {
      console.error("NO URL FROM FUNCTION:", data);
      throw new Error("No upload URL returned");
    }

    await fetch(uploadURL, {
      method: "PUT",
      body: file,
      headers: {
        "Content-Type": file.type || "video/mp4"
      }
    });

    await fetch(`${SUPABASE_URL}/rest/v1/sites?edit_token=eq.${token}`, {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        video_path: path
      })
    });

const videoUrl = `${SUPABASE_URL}/storage/v1/object/public/galleries/${path}`;



    status.innerText = "✅ Uploaded!";

if (localVideoURL) {
  preview.src = localVideoURL;
  preview.load();
}


  } catch (e) {
    console.error(e);
    status.innerText = "❌ Upload failed";
  }

  uploadBtn.disabled = false;

};

/* REMOVE */
removeBtn.onclick = () => {
  preview.src = "";
  preview.style.display = "none";
  fileInput.value = "";
  previewBox.classList.add("placeholder");
  removeBtn.style.display = "none";
  status.innerText = "";
};

/* PREVIEW PAGE */
document.getElementById("previewPageBtn").onclick = () => {
  window.open(`https://flowwed.netlify.app/?t=${token}`, "_blank");
};

loadSlug();
</script>

</body>
</html>
