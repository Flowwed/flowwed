<style>
body {

.page-title {

}

#coupleHeader {

.manager-grid {

.manager-btn {

  display: flex;

  justify-content: center;

.manager-btn i {

.header-row {

  display: flex;

.back-btn,
.visit-btn {

  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 18px;
  padding: 10px 22px;

  color: white;
  font-weight: 700;
  cursor: pointer;

  backdrop-filter: blur(16px) saturate(160%);

    inset 0 -6px 12px rgba(80,0,20,0.45),

}

.back-btn:hover,

}

.back-btn:active,
.visit-btn:active {
  transform: scale(0.96);

    inset 0 6px 14px rgba(0,0,0,0.45);
}

.page-title {

.ios-banner {
  margin: 34px auto 60px auto;
  padding: 16px 24px;
  max-width: 800px;
  background: rgba(250,250,250,0.65);
  border-radius: 18px;
}

/* ===== GLASS FLOATING BUTTONS — NEUTRAL GRAY GLOW ===== */

.manager-btn {
  position: relative;
  overflow: hidden;

  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);

  /* COLOR LAYER */
  background: #9c1818;

  /* GLASS VEIL */
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.45),
    inset 0 6px 14px rgba(255,255,255,0.22),
    inset 0 -10px 20px rgba(0,0,0,0.45),
    0 14px 34px rgba(0,0,0,0.35);

  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease;
}

/* GLASS SHINE */
.manager-btn::after {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 42%;
  border-radius: inherit;

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.75),
    rgba(255,255,255,0.15),
    rgba(255,255,255,0)
  );

  opacity: 0.55;
  pointer-events: none;
}

/* neutral gray air glow */
.manager-btn::before {
  content: "";
  position: absolute;
  inset: -16px;
  border-radius: 28px;
  background: radial-gradient(
    circle,
    rgba(220, 220, 220, 0.55),
    rgba(220, 220, 220, 0) 70%
  );
  filter: blur(24px);
  opacity: 0.6;
  z-index: -1;
  transition: opacity 0.3s ease;
}

/* hover — floating */
.manager-btn:hover {
  transform: translateY(-4px);
  box-shadow:
    0 20px 48px rgba(0, 0, 0, 0.35),
    inset 0 1px 1px rgba(255,255,255,0.75),
    inset 0 -6px 14px rgba(0, 0, 0, 0.3);
}

/* press-in */
.manager-btn:active {
  transform: translateY(0) scale(0.97);
  box-shadow:
    inset 0 6px 14px rgba(0, 0, 0, 0.45),
    inset 0 -2px 6px rgba(255,255,255,0.4);
}

.manager-btn:active::before {
  opacity: 0.3;
}

/* mobile */
@media (hover: none) {
  .manager-btn:hover {
    transform: none;
  }
}

@keyframes bounceBack {
  0% {
    transform: scale(0.97);
  }
  60% {
    transform: scale(1.03);
  }
  100% {
    transform: scale(1);
  }
}

/* press-in */
.manager-btn:active {
  transform: scale(0.97);
}

/* bounce back when released */
.manager-btn:not(:active) {
  animation: bounceBack 0.35s cubic-bezier(.25,.8,.25,1);
}

.access-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 35px auto 0;

  width: 100%;
  max-width: 820px;

/* КРУГ С ФОТО + СТЕКЛЯННОЕ КОЛЬЦО */
.access-knob {
 display: none;
  width: 80px;
  height: 80px;
  border-radius: 50%;

  background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.22),
      rgba(255,255,255,0.05)
  ),
  #9c1818;

  border: 1px solid rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(22px) saturate(180%);

  box-shadow:
    0 18px 40px rgba(0,0,0,0.45),
    inset 0 4px 8px rgba(255,255,255,0.25),
    inset 0 -10px 20px rgba(80,0,20,0.45);

  position: relative;
  z-index: 2;
  overflow: hidden;

  animation: emilyBreath 4.5s ease-in-out infinite;
  transform-origin: center center;

  cursor: pointer;
}

.access-knob::before {
  content: "";
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.75);
  box-shadow:
    0 0 8px rgba(255,255,255,0.4),
    0 0 18px rgba(255,180,200,0.35);
  pointer-events: none;
}

.access-knob img {
  position: absolute;
  inset: 14px;
  width: calc(100% - 28px);
  height: calc(100% - 28px);
  border-radius: 50%;
  object-fit: cover;
  z-index: 3;
}

.access-knob {
  margin-left: -15px;
}


@keyframes emilyBreath {
  0% {
    transform: scale(1);
    box-shadow:
      0 18px 40px rgba(0,0,0,0.45),
      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -10px 20px rgba(80,0,20,0.45),
      0 0 0 rgba(255,70,120,0);
  }

  50% {
    transform: scale(1.06);
    box-shadow:
      0 28px 50px rgba(0,0,0,0.55),
      inset 0 8px 16px rgba(255,255,255,0.35),
      inset 0 -16px 28px rgba(90,0,30,0.55),
      0 0 16px rgba(255,70,120,0.30),
      0 0 34px rgba(255,70,120,0.22),
      0 0 64px rgba(255,70,120,0.12);
  }

  100% {
    transform: scale(1);
    box-shadow:
      0 18px 40px rgba(0,0,0,0.45),
      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -10px 20px rgba(80,0,20,0.45),
      0 0 0 rgba(255,70,120,0);
  }
}

<script>
function openPage(page) {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  let file = "";

  switch (page) {
  case "story":
    file = "story.html";
    break;
  case "jmarried":
    file = "just_married.html";
    break;
  case "map":
    file = "map.html";
    break;
  case "upload":
    file = "upload.html";
    break;
  case "registry":
    file = "gift_registry.html";
    break;
  case "updates":
    file = "dash-updates.html";
    break;
  default:
    return;
}


  window.open(`${file}?t=${token}`, "_blank");
}

function goBack() {
  document.referrer ? location.href = document.referrer : history.back();
}

function visitSite() {
  const params = new URLSearchParams(window.location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  window.open(`https://flowwed.netlify.app/index.html?t=${token}`, "_blank");
}
</script>

    `&page=${encodeURIComponent(page)}` +
