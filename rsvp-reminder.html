<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSVP Reminder</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  margin:0;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;

  min-height:100vh;
  padding-top:40px;
}

/* NOTIFY BLOCK */
#notifyBlock{
  max-width:380px;
  width:90%;
  margin-bottom:16px;
  padding:14px;
  border-radius:14px;
  background:#fff7f7;
  border:1px solid #ffd0d0;

  display:flex;
  align-items:center;
  gap:10px;
}

/* CARD */
.card{
  background:white;
  padding:28px;
  border-radius:18px;
  max-width:380px;
  width:90%;
  text-align:center;

  border:2px solid #b41111;

  box-shadow:
    0 14px 30px rgba(0,0,0,0.25),
    inset 0 0 6px rgba(255,255,255,0.5);
}

h2{
  color:#9c1818;
  margin-bottom:12px;
}

p{
  color:#6a2a2a;
  font-size:15px;
  line-height:1.5;
  margin-bottom:20px;
}

button{
  background:#b41111;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NOTIFY BLOCK (ADMIN ONLY) -->
<div id="notifyBlock">

  <div style="
    width:22px;
    height:22px;
    border-radius:50%;
    background:#b41111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:700;
  ">i</div>

  <div style="flex:1;font-size:13px;color:#7e2a2a;font-weight:600;">
    Send this reminder to your guests via SMS
  </div>

  <button id="notifyBtn" style="padding:8px 14px;font-size:13px;">
    Notify
  </button>

</div>

<!-- CARD -->
<div class="card">

  <h2>We haven’t received your RSVP yet</h2>

  <p>
    We hope you can join us for our special day.<br>
    Please confirm your attendance at your earliest convenience.
  </p>

  <button id="goRSVP">Confirm RSVP</button>

</div>

<script>

// =============================
// PARAMS
// =============================
const params = new URLSearchParams(window.location.search);
const token = params.get("t");

// 👉 если есть shared=1 → это гость
const isShared = params.get("shared") === "1";


// =============================
// RSVP BUTTON
// =============================
document.getElementById("goRSVP").onclick = () => {
  window.location.href =
    `${window.location.origin}/rsvpresponse.html?t=${token}`;
};


// =============================
// NOTIFY BUTTON (ADMIN ONLY)
// =============================
document.getElementById("notifyBtn").onclick = async () => {

  const link =
    `${window.location.origin}/rsvp-reminder.html?t=${token}&shared=1`;

  if (navigator.share) {
    try {
      await navigator.share({
        title: "RSVP Reminder",
        text: "Please confirm your attendance",
        url: link
      });
    } catch(e){}
  } else {
    alert("Sharing not supported on this device");
  }

};


// =============================
// HIDE NOTIFY FOR GUEST
// =============================
if (isShared) {
  document.getElementById("notifyBlock").style.display = "none";
}

</script>

</body>
</html>
