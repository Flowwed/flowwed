<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSVP Reminder</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  margin:0;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;

  min-height:100vh;
  padding-top:40px;
}

/* NOTIFY BLOCK */

/* BLOCK */
#notifyBlock{
  max-width:380px;
  width:90%;
  margin-bottom:16px;
  padding:12px 14px;

  border-radius:14px;
  background:#fff7f7;
  border:1px solid #ffd0d0;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

/* ICON */
.notify-icon{
  width:22px;
  height:22px;
  border-radius:50%;

  background:#b41111;
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:13px;
  font-weight:700;
}

/* TEXT */
.notify-text{
  flex:1;

  font-size:15px;
  color:#7e2a2a;
  font-weight:600;
}

/* BUTTON */
#notifyBtn{
  background:#3d605c;
  color:white;

  padding:10px 18px;

  border-radius:999px;
  border:none;

  font-weight:700;
  font-size:14px;

  cursor:pointer;
  white-space:nowrap;

  box-shadow:
    0 4px 10px rgba(0,0,0,0.15),
    inset 0 2px 4px rgba(255,255,255,0.25);
}

#notifyBtn:hover{
  background:#6e7f7c;
}


/* CARD */
.card{
  background:white;

  padding:32px 22px;        /* ↑ больше вертикали, меньше ширины */

  border-radius:18px;

  max-width:320px;          /* ← СУЖАЕМ карточку */
  width:90%;

  text-align:center;

  display:flex;             /* ↓ делаем вертикальный layout */
  flex-direction:column;
  justify-content:center;
}
.card h2 {
  max-width:260px;
  margin:0 auto 12px auto;
}

.card p {
  max-width:260px;          /* ← СУЖАЕМ ТЕКСТ */
  margin:0 auto 20px auto;
}


.card {
  border: 2px solid #b41111;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.25),
    inset 0 0 6px rgba(255,255,255,0.4),
    0 0 14px rgba(180,17,17,0.25); /* 🔥 ruby glow */
}


h2{
  color:#9c1818;
  margin-bottom:12px;
}

p{
  color:#6a2a2a;
  font-size:15px;
  line-height:1.5;
  margin-bottom:20px;
}

button{
  background:#b41111;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

#signature{
  margin-top:18px;
  font-size:14px;
  color:#7a2a2a;
  font-weight:600;
  opacity:0.85;
  font-style: italic;

}

.card {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.35s ease;
}


</style>
</head>

<body>

<!-- NOTIFY BLOCK -->

<div id="notifyBlock">

  <div class="notify-icon">i</div>

  <div class="notify-text">
    Send this card to your guests
  </div>

  <button id="notifyBtn">
    Send
  </button>

</div>
<!-- CARD -->
<div class="card">

  <h2 id="reminderTitle"></h2>

  <p id="reminderText"></p>

  <button id="goRSVP"></button>

<div id="signature"></div>



</div>

<script type="module">
// =============================
// PARAMS
// =============================
const params = new URLSearchParams(window.location.search);
const token = params.get("t");
const type = params.get("type");
const isShared = params.get("shared") === "1";

// =============================
// CONFIG (СНАЧАЛА!)
// =============================
const CONFIG = {

  maybe: {
    title: "Still deciding?",
    text: `
      Please confirm your final decision.<br><br>
      We’d love to celebrate together.
    `,
    btnText: "Confirm Decision",
    showBtn: true
  },

  yes: {
    title: "You’re coming!",
    text: `
      We’re so happy you’ll be joining us.<br><br>
      Can’t wait to celebrate together.
    `,
    showBtn: false
  },

  no: {
    title: "We’ll miss you",
    text: `
      Sorry you won’t be able to join us.<br><br>
      Hope to see you soon.
    `,
    showBtn: false
  },

  noresponse: {
    title: "RSVP needed",
    text: `
      We haven’t received your RSVP yet.<br><br>
      Will you be joining us?
    `,
    btnText: "Confirm RSVP",
    showBtn: true
  },

  memories: {
    title: "Share your memories",
    text: `
      We’d love to hear from you.<br><br>
      Tap below to share your memories.
    `,
    btnText: "Open Memory Form",
    showBtn: true
  },

std: {
  title: "Save The Date",
  text: `
    We’re excited to celebrate with you.<br><br>
    Please mark your calendar.
  `,
  btnText: "View Details",
  showBtn: true
},

rsvp: {
  title: "RSVP",
  text: `
    We would love to celebrate with you.<br><br>
    Please confirm your attendance.
  `,
  btnText: "View Details",
  showBtn: true
},

travel: {
  title: "Travel & Event",
  text: `
    All travel and event details are ready for you.<br><br>
    We can’t wait to see you.
  `,
  btnText: "View Details",
  showBtn: true
},

updates: {
  title: "Latest Updates",
  text: `
    Latest news and updates are here.<br><br>
    Don’t miss any important details.
  `,
  btnText: "View Details",
  showBtn: true
}


};

// =============================
// SAFE STATE (ПОСЛЕ CONFIG)
// =============================
const safeType = type || "noresponse";
const state = CONFIG[safeType] || CONFIG.noresponse;

console.log("TYPE:", type);
console.log("STATE:", state);

// =============================
// DOM
// =============================
const titleEl = document.getElementById("reminderTitle");
const textEl  = document.getElementById("reminderText");
const btnEl   = document.getElementById("goRSVP");

// =============================
// APPLY UI
// =============================

if (!state || !titleEl || !textEl || !btnEl) {
  console.error("UI ERROR:", { state, titleEl, textEl, btnEl });

  document.body.innerHTML = `
    <div style="
      font-family:sans-serif;
      padding:40px;
      text-align:center;
    ">
      <h2>Something went wrong</h2>
      <p>Please reopen the link or contact the host.</p>
    </div>
  `;

} else {

  titleEl.textContent = state.title;
  textEl.innerHTML    = state.text;

  if (state.showBtn) {
    btnEl.style.display = "inline-block";
    btnEl.textContent = state.btnText || "Confirm";
  } else {
    btnEl.style.display = "none";
  }

  // ✅ ВАЖНО: только здесь показываем карточку
  const card = document.querySelector(".card");
  if (card) {
    card.style.opacity = "1";
    card.style.transform = "translateY(0)";
  }

}

// =============================
// RSVP BUTTON
// =============================

btnEl.onclick = () => {

  let link;

  // 🔥 Memories → своя форма
  if (type === "memories") {
    link = `${window.location.origin}/postwed-form.html?t=${token}`;
  } 
  
  // 🔥 Maybe → RSVP + группа
  else if (type === "maybe") {
    link = `${window.location.origin}/rsvpresponse.html?t=${token}&group=rsvpMaybe`;
  } 

  // ✅ NEW: Save The Date
  else if (type === "std") {
    link = `${window.location.origin}/std_preview.html?t=${token}`;
  }


else if (type === "rsvp") {
  link = `${window.location.origin}/rsvpresponse.html?t=${token}`;
}


else if (type === "travel") {
  link = `${window.location.origin}/venue_map.html?t=${token}`;
}


else if (type === "updates") {
  link = `${window.location.origin}/updates.html?t=${token}`;
}


  // 🔥 Остальные → обычный RSVP
  else {
    link = `${window.location.origin}/rsvpresponse.html?t=${token}`;
  }

  window.location.href = link;
};

// =============================
// NOTIFY BUTTON ADMIN
// =============================
document.getElementById("notifyBtn").onclick = async () => {

  const link =
    `${window.location.origin}/rsvp-reminder.html?t=${token}&type=${type}&shared=1`;

  if (navigator.share) {
    try {
      await navigator.share({
        title: "RSVP Reminder",
        text:
          type === "maybe"
            ? "Please confirm your final decision"
            : "Please confirm your attendance",
        url: link
      });
    } catch(e){}
  } else {
    alert("Sharing not supported on this device");
  }

};


// =============================
// HIDE NOTIFY FOR GUEST
// =============================
if (isShared) {
  document.getElementById("notifyBlock").style.display = "none";
}


import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"

);

let coupleName = "";

async function loadCoupleName() {

  const { data } = await supabase
    .from("sites")
    .select("couple_name")
    .eq("edit_token", token)
    .single();

  if (data?.couple_name) {
    coupleName = data.couple_name.trim();
  }

  renderSignature();
}

function renderSignature() {
  const el = document.getElementById("signature");
  if (!el) return;

  el.innerHTML = `
    With love,<br>
    <strong>${coupleName || "The Couple"}</strong>
  `;
}

// 🔥 вызов
loadCoupleName();



</script>

</body>
</html>
