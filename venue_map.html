<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel & Event</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  color:#6a2a2a;
}

.container{
  max-width:820px;
  margin:30px auto;
  padding:16px;
}

h1{
  text-align:center;
  color:#b41111;
}

.date{
  text-align:center;
  margin-bottom:20px;
  opacity:.8;
}

/* ACCORDION */
.section{
  background:#fff;
  border-radius:16px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
  padding:14px;
  font-weight:700;
  cursor:pointer;
  background:#fff5f7;
}

.content{
  display:none;
  padding:14px;
}

.item{
  margin-bottom:10px;
}

.empty{
  text-align:center;
  margin-top:50px;
  color:#999;
}
</style>
</head>

<body>

<div class="container">

<h1 id="couple">—</h1>
<div id="date" class="date"></div>

<div class="section">
  <div class="header">Schedule</div>
  <div class="content" id="schedule"></div>
</div>

<div class="section">
  <div class="header">Travel</div>
  <div class="content" id="travel"></div>
</div>

<div class="section">
  <div class="header">Venue</div>
  <div class="content" id="venue"></div>
</div>

<div class="section">
  <div class="header">Details</div>
  <div class="content" id="details"></div>
</div>

<div class="section">
  <div class="header">FAQ</div>
  <div class="content" id="faq"></div>
</div>

<div id="empty" class="empty" style="display:none;">
No data found
</div>

</div>

<script>

// ============================
// INIT
// ============================

const sb = window.supabase.createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

const token = new URLSearchParams(location.search).get("t");

// ============================
// ACCORDION
// ============================

document.querySelectorAll(".header").forEach(h=>{
  h.onclick = () => {
    const c = h.nextElementSibling;
    const open = c.style.display === "block";

    document.querySelectorAll(".content").forEach(x=>x.style.display="none");

    if(!open) c.style.display = "block";
  };
});

// ============================
// LOAD DATA
// ============================

async function load(){

  if(!token){
    showEmpty();
    return;
  }

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  console.log(data);

  if(error || !data){
    showEmpty();
    return;
  }

  renderBasic(data);
  renderSchedule(data);
  renderTravel(data);
  renderVenue(data);
  renderDetails(data);
  renderFAQ(data);
}

// ============================
// RENDER
// ============================

function renderBasic(d){
  document.getElementById("couple").textContent = d.couple_name || "—";
  document.getElementById("date").textContent = d.wedding_date || "";
}

// 🔥 SCHEDULE (dual support)
function renderSchedule(d){

  const el = document.getElementById("schedule");
  el.innerHTML = "";

  if(d.schedule && Array.isArray(d.schedule)){
    d.schedule.forEach(i=>{
      if(i.time || i.text){
        el.innerHTML += `<div class="item"><b>${i.time||""}</b> — ${i.text||""}</div>`;
      }
    });
  } else {
    [
      [d.schedule_time_1, d.schedule_text_1],
      [d.schedule_time_2, d.schedule_text_2],
      [d.schedule_time_3, d.schedule_text_3],
      [d.schedule_time_4, d.schedule_text_4]
    ].forEach(([t,txt])=>{
      if(t || txt){
        el.innerHTML += `<div class="item"><b>${t||""}</b> — ${txt||""}</div>`;
      }
    });
  }
}

// TRAVEL
function renderTravel(d){
  document.getElementById("travel").innerHTML = `
    <div class="item">Airport: ${d.airport || "-"}</div>
    <div class="item">Transfer: ${d.transfer_time || "-"}</div>
    <div class="item">${d.flights_text || ""}</div>
  `;
}

// VENUE
function renderVenue(d){
  document.getElementById("venue").innerHTML = `
    <div class="item">${d.venue_name || ""}</div>
    <div class="item">${d.venue_address || ""}</div>
    ${d.map_link ? `<a href="${d.map_link}" target="_blank">Open Map</a>` : ""}
  `;
}

// DETAILS
function renderDetails(d){
  document.getElementById("details").innerHTML = `
    <div class="item">Getting around: ${d.getting_around || "-"}</div>
    <div class="item">Dress code: ${d.dress_code || "-"}</div>
    <div class="item">Weather: ${d.weather || "-"}</div>
  `;
}

// 🔥 FAQ (dual support)
function renderFAQ(d){

  const el = document.getElementById("faq");
  el.innerHTML = "";

  if(d.faq && Array.isArray(d.faq)){
    d.faq.forEach(i=>{
      if(i.q || i.a){
        el.innerHTML += `<div class="item"><b>${i.q}</b><br>${i.a}</div>`;
      }
    });
  } else {
    [
      [d.faq_q1, d.faq_a1],
      [d.faq_q2, d.faq_a2],
      [d.faq_q3, d.faq_a3],
      [d.faq_q4, d.faq_a4]
    ].forEach(([q,a])=>{
      if(q || a){
        el.innerHTML += `<div class="item"><b>${q}</b><br>${a}</div>`;
      }
    });
  }
}

// ============================
// EMPTY STATE
// ============================

function showEmpty(){
  document.getElementById("empty").style.display = "block";
}

// ============================

load();

</script>

</body>
</html>
