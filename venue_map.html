<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel & Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fdeff1;
  color:#732323;
}

header{
  text-align:center;
  padding:40px 20px;
}

h1{color:#a52126;margin:0;}

.container{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

.accordion{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.acc-item{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
}

.acc-title{
  padding:16px;
  cursor:pointer;
  font-weight:600;
  background:#fff5f6;
}

.acc-content{
  max-height:0;
  overflow:hidden;
  transition:0.3s;
  padding:0 16px;
}

.acc-item.active .acc-content{
  max-height:800px;
  padding:16px;
}

.hotel-item{
  display:block;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  background:#ffe5e8;
  text-decoration:none;
  color:#732323;
}

.timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.timeline-item{
  display:flex;
  gap:12px;
  background:#fff5f6;
  padding:10px;
  border-radius:10px;
}

.timeline-time{
  font-weight:700;
  color:#a52126;
  min-width:80px;
}

.timeline-text{
  color:#6f2a2a;
}


</style>
</head>

<body>

<header>
  <h1 id="coupleName">Wedding</h1>
</header>

<div class="container">

<div class="accordion">

<div class="acc-item active">
  <div class="acc-title">⏰ Schedule</div>
  <div class="acc-content" id="schedule"></div>
</div>

<div class="acc-item">
<div class="acc-title">✈️ Travel</div>
<div class="acc-content" id="travel"></div>
</div>

<div class="acc-item">
<div class="acc-title">🏨 Hotels</div>
<div class="acc-content" id="hotels"></div>
</div>

<div class="acc-item">
<div class="acc-title">📍 Venue</div>
<div class="acc-content" id="venue"></div>
</div>

<div class="acc-item">
<div class="acc-title">👗 Dress Code</div>
<div class="acc-content" id="dress"></div>
</div>

<div class="acc-item">
<div class="acc-title">🗺 Things to Do</div>
<div class="acc-content" id="things"></div>
</div>

<div class="acc-item">
<div class="acc-title">❓ FAQ</div>
<div class="acc-content" id="faq"></div>
</div>

</div>

</div>

<script>
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
; // ← вставь свой

function getToken(){
  const p = new URLSearchParams(location.search);
  return p.get("t") || p.get("token") || "";
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  global:{
    headers:{
      site_edit_token: getToken()
    }
  }
});

async function loadData(){
  const token = getToken();
  if(!token) return;

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  if(error){
    console.log(error);
    return;
  }

  if(!data) return;

  // NAME
  document.getElementById("coupleName").innerText =
    data.couple_name || "Wedding";

  // TRAVEL
  document.getElementById("travel").innerHTML = `
    ${data.flights_text || ""}
    <br><br>
    <b>Airport:</b> ${data.airport || ""}<br>
    <b>Transfer:</b> ${data.transfer_time || ""}
  `;

  // SCHEDULE

const scheduleEl = document.getElementById("schedule");

if (data.schedule && Array.isArray(data.schedule)) {

  scheduleEl.innerHTML = `
    <div class="timeline">
      ${data.schedule
        .filter(i => i.time || i.text)
        .map(i => `
          <div class="timeline-item">
            <div class="timeline-time">${i.time || ""}</div>
            <div class="timeline-text">${i.text || ""}</div>
          </div>
        `).join("")}
    </div>
  `;

} else {

  // fallback (старые поля)
  const list = [
    [data.schedule_time_1, data.schedule_text_1],
    [data.schedule_time_2, data.schedule_text_2],
    [data.schedule_time_3, data.schedule_text_3],
    [data.schedule_time_4, data.schedule_text_4]
  ];

  scheduleEl.innerHTML = `
    <div class="timeline">
      ${list
        .filter(([t, txt]) => t || txt)
        .map(([t, txt]) => `
          <div class="timeline-item">
            <div class="timeline-time">${t || ""}</div>
            <div class="timeline-text">${txt || ""}</div>
          </div>
        `).join("")}
    </div>
  `;
}



  // HOTELS
  const hotelsEl = document.getElementById("hotels");

  if(data.hotels){
    hotelsEl.innerHTML = data.hotels.split("\n").map(line=>{
      const [name, link] = line.split("—");
      if(link){
        return `<a class="hotel-item" href="${link.trim()}" target="_blank">${name.trim()}</a>`;
      }
      return `<div class="hotel-item">${line}</div>`;
    }).join("");
  } else {
    hotelsEl.innerHTML = "No hotel info yet.";
  }

  // VENUE
  document.getElementById("venue").innerHTML = `
    <b>${data.venue_name || ""}</b><br>
    ${data.venue_address || ""}<br><br>
    <a href="${data.map_link || "#"}" target="_blank">Open map</a>
  `;

  // DRESS
  document.getElementById("dress").innerHTML =
    data.dress_code || "";

  // THINGS
  document.getElementById("things").innerHTML =
    data.things_to_do || "";

  // FAQ
  const faqEl = document.getElementById("faq");
  faqEl.innerHTML = "";

  if(data.faq){
    data.faq.forEach(f=>{
      faqEl.innerHTML += `<b>${f.q}</b><br>${f.a}<br><br>`;
    });
  }
}

loadData();

// ACCORDION (auto-close others)
document.querySelectorAll(".acc-title").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".acc-item").forEach(i=>i.classList.remove("active"));
    t.parentElement.classList.add("active");
  };
});
</script>

</body>
</html>
