<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel & Event</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #fff1f4, #ffffff);
  color:#6a2a2a;
}

.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#b41111;
}

.section{
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.label{
  font-weight:700;
  color:#9c1818;
}

.item{
  margin-bottom:10px;
}

a.map{
  color:#2a6bff;
  text-decoration:underline;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

  <h1 id="couple">—</h1>
  <div id="date" style="text-align:center;margin-bottom:20px;"></div>

  <div class="section">
    <div class="label">Schedule</div>
    <div id="schedule"></div>
  </div>

  <div class="section">
    <div class="label">Travel</div>
    <div id="travel"></div>
  </div>

  <div class="section">
    <div class="label">Venue</div>
    <div id="venue"></div>
  </div>

  <div class="section">
    <div class="label">Details</div>
    <div id="details"></div>
  </div>

  <div class="section">
    <div class="label">FAQ</div>
    <div id="faq"></div>
  </div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"

);

const token = new URLSearchParams(location.search).get("t");

async function load(){

  if(!token) return;

  const { data } = await supabase
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .single();

  if(!data) return;

  // BASIC
  document.getElementById("couple").textContent = data.couple_name || "";
  document.getElementById("date").textContent = data.wedding_date || "";

  // SCHEDULE
  const sch = document.getElementById("schedule");

  if(data.schedule){
    data.schedule.forEach(i=>{
      sch.innerHTML += `<div class="item"><b>${i.time}</b> — ${i.text}</div>`;
    });
  }

  // TRAVEL
  document.getElementById("travel").innerHTML = `
    <div class="item">Airport: ${data.airport || ""}</div>
    <div class="item">Transfer: ${data.transfer_time || ""}</div>
    <div class="item">${data.flights_text || ""}</div>
    <div class="item">Hotels: ${data.hotel_1 || ""}, ${data.hotel_2 || ""}, ${data.hotel_3 || ""}</div>
  `;

  // VENUE
  document.getElementById("venue").innerHTML = `
    <div class="item">${data.venue_name || ""}</div>
    <div class="item">${data.venue_address || ""}</div>
    <div class="item">${data.venue_note || ""}</div>
    <a class="map" href="${data.map_link || '#'}" target="_blank">Open Map</a>
  `;

  // DETAILS
  document.getElementById("details").innerHTML = `
    <div class="item">Getting around: ${data.getting_around || ""}</div>
    <div class="item">Dress code: ${data.dress_code || ""}</div>
    <div class="item">Weather: ${data.weather || ""}</div>
    <div class="item">${data.weather_note || ""}</div>
  `;

  // FAQ
  const faqBox = document.getElementById("faq");

  if(data.faq){
    data.faq.forEach(i=>{
      faqBox.innerHTML += `
        <div class="item">
          <b>${i.q}</b><br>${i.a}
        </div>
      `;
    });
  }

}

load();

</script>

</body>
</html>
