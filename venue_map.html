<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Wedding Details</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#fafafa;
  padding:30px;
  max-width:800px;
  margin:auto;
}

h1{
  text-align:center;
  color:#b41111;
}

.block{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<h1 id="couple">...</h1>
<div id="content"></div>

<script>

// 🔑 токен
const params = new URLSearchParams(location.search);
const token = params.get("t");

// 🔥 ВАЖНО: твой ключ
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";

// 🔥 КЛИЕНТ С HEADER (КАК У ТЕБЯ)
const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY,
  {
    global: {
      headers: {
        site_edit_token: token
      }
    }
  }
);

// 🚀 загрузка
async function load(){

  if(!token){
    document.body.innerHTML = "❌ Нет токена";
    return;
  }

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .maybeSingle();

  if(error){
    console.log(error);
    document.body.innerHTML = "❌ Ошибка загрузки";
    return;
  }

  if(!data){
    document.body.innerHTML = "❌ Нет данных";
    return;
  }

  render(data);
}

// 🎨 вывод
function render(d){

  document.getElementById("couple").innerText =
    d.couple_name || "Wedding";

  const html = `

  <div class="block">
    <b>Schedule</b><br>
    ${(d.schedule || []).map(i =>
      `<div>${i.time} — ${i.text}</div>`
    ).join("")}
  </div>

  <div class="block">
    <b>Flights</b><br>
    ${d.flights_text || ""}
  </div>

  <div class="block">
    <b>Hotels</b><br>
    ${d.hotel_1 || ""}<br>
    ${d.hotel_2 || ""}<br>
    ${d.hotel_3 || ""}
  </div>

  <div class="block">
    <b>Venue</b><br>
    ${d.venue_name || ""}<br>
    ${d.venue_address || ""}<br>
    <a href="https://maps.google.com/?q=${encodeURIComponent(d.venue_address || "")}" target="_blank">
      карта
    </a>
  </div>

  <div class="block">
    <b>FAQ</b><br>
    ${(d.faq || []).map(i =>
      `<div><b>${i.q}</b><br>${i.a}</div>`
    ).join("")}
  </div>

  `;

  document.getElementById("content").innerHTML = html;
}

load();

</script>

</body>
</html>
