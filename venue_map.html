<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel & Event</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  color:#6a2a2a;
}

.container{
  max-width:820px;
  margin:30px auto;
  padding:16px;
}

h1{
  text-align:center;
  color:#b41111;
  margin-bottom:6px;
}

.date{
  text-align:center;
  margin-bottom:20px;
  opacity:0.8;
}

/* ACCORDION */
.section{
  background:white;
  border-radius:16px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
  padding:14px;
  font-weight:700;
  color:#9c1818;
  cursor:pointer;
  background:#fff5f7;
}

.content{
  display:none;
  padding:14px;
}

.item{
  margin-bottom:10px;
}

.map{
  color:#2a6bff;
  text-decoration:underline;
}

.empty{
  text-align:center;
  margin-top:60px;
  color:#999;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

<h1 id="couple">—</h1>
<div id="date" class="date"></div>

<div class="section">
  <div class="header">Schedule</div>
  <div class="content" id="schedule"></div>
</div>

<div class="section">
  <div class="header">Travel</div>
  <div class="content" id="travel"></div>
</div>

<div class="section">
  <div class="header">Venue</div>
  <div class="content" id="venue"></div>
</div>

<div class="section">
  <div class="header">Details</div>
  <div class="content" id="details"></div>
</div>

<div class="section">
  <div class="header">FAQ</div>
  <div class="content" id="faq"></div>
</div>

<div id="empty" class="empty" style="display:none;">
No event data found
</div>

</div>

<script>

// ✅ SUPABASE (НЕ трогай)
const sb = window.supabase.createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

// ✅ TOKEN
const token = new URLSearchParams(location.search).get("t");

// ✅ ACCORDION
document.querySelectorAll(".header").forEach(h=>{
  h.onclick = () => {
    const c = h.nextElementSibling;
    const isOpen = c.style.display === "block";

    document.querySelectorAll(".content").forEach(x=>{
      x.style.display = "none";
    });

    if(!isOpen){
      c.style.display = "block";
    }
  };
});

// ✅ LOAD DATA
async function load(){

  if(!token){
    document.getElementById("empty").style.display="block";
    return;
  }

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(error || !data){
    document.getElementById("empty").style.display="block";
    return;
  }

  // BASIC
  document.getElementById("couple").textContent = data.couple_name || "—";
  document.getElementById("date").textContent = data.wedding_date || "";

  // SCHEDULE
  const sch = document.getElementById("schedule");

  if(data.schedule?.length){
    data.schedule.forEach(i=>{
      sch.innerHTML += `<div class="item"><b>${i.time}</b> — ${i.text}</div>`;
    });
  } else {
    sch.innerHTML = "No schedule yet";
  }

  // TRAVEL
  document.getElementById("travel").innerHTML = `
    <div class="item">Airport: ${data.airport || "-"}</div>
    <div class="item">Transfer: ${data.transfer_time || "-"}</div>
    <div class="item">${data.flights_text || ""}</div>
    <div class="item">Hotels: ${[data.hotel_1,data.hotel_2,data.hotel_3].filter(Boolean).join(", ") || "-"}</div>
  `;

  // VENUE
  document.getElementById("venue").innerHTML = `
    <div class="item">${data.venue_name || ""}</div>
    <div class="item">${data.venue_address || ""}</div>
    <div class="item">${data.venue_note || ""}</div>
    ${
      data.map_link
      ? `<a class="map" href="${data.map_link}" target="_blank">Open Map</a>`
      : ""
    }
  `;

  // DETAILS
  document.getElementById("details").innerHTML = `
    <div class="item">Getting around: ${data.getting_around || "-"}</div>
    <div class="item">Dress code: ${data.dress_code || "-"}</div>
    <div class="item">Weather: ${data.weather || "-"}</div>
    <div class="item">${data.weather_note || ""}</div>
  `;

  // FAQ
  const faq = document.getElementById("faq");

  if(data.faq?.length){
    data.faq.forEach(i=>{
      faq.innerHTML += `
        <div class="item">
          <b>${i.q}</b><br>${i.a}
        </div>
      `;
    });
  } else {
    faq.innerHTML = "No questions yet";
  }

}

load();

</script>

</body>
</html>
