<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Wedding Details</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#fafafa;
  padding:30px;
  max-width:800px;
  margin:auto;
}

h1{
  text-align:center;
  color:#b41111;
}

.block{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.title{
  font-weight:700;
  margin-bottom:10px;
  color:#b41111;
}
</style>
</head>

<body>

<h1 id="couple">Loading...</h1>
<div id="date"></div>

<div id="content"></div>

<script>

// 🔑 токен из URL
const params = new URLSearchParams(window.location.search);
const token = params.get("t");

// 🔌 Supabase
const sb = supabase.createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"

);

// 📦 загрузка данных
async function load(){

  const { data } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .single();

  if(!data){
    document.body.innerHTML = "Нет данных";
    return;
  }

  render(data);
}

// 🎨 вывод
function render(d){

  document.getElementById("couple").innerText =
    d.couple_name || "Wedding";

  document.getElementById("date").innerText =
    d.wedding_date || "";

  const html = `

  <div class="block">
    <div class="title">Schedule</div>
    ${d.schedule?.map(i => `
      <div>${i.time} — ${i.text}</div>
    `).join("")}
  </div>

  <div class="block">
    <div class="title">Flights</div>
    <div>${d.flights_text || ""}</div>
  </div>

  <div class="block">
    <div class="title">Hotels</div>
    <div>${d.hotel_1 || ""}</div>
    <div>${d.hotel_2 || ""}</div>
    <div>${d.hotel_3 || ""}</div>
  </div>

  <div class="block">
    <div class="title">Venue</div>
    <div>${d.venue_name || ""}</div>
    <div>${d.venue_address || ""}</div>
    <a href="https://maps.google.com/?q=${encodeURIComponent(d.venue_address || "")}" target="_blank">
      Открыть карту
    </a>
  </div>

  <div class="block">
    <div class="title">Details</div>
    <div>${d.getting_around || ""}</div>
    <div>${d.dress_code || ""}</div>
  </div>

  <div class="block">
    <div class="title">FAQ</div>
    ${d.faq?.map(i => `
      <div><b>${i.q}</b><br>${i.a}</div><br>
    `).join("")}
  </div>

  `;

  document.getElementById("content").innerHTML = html;
}

load();

</script>

</body>
</html>
