<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel & Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fdeff1;
  color:#732323;
}

header{
  text-align:center;
  padding:40px 20px;
}

h1{color:#a52126;margin:0;}

.container{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

.accordion{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.acc-item{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
}

.acc-title{
  padding:16px;
  cursor:pointer;
  font-weight:600;
  background:#fff5f6;
}

.acc-content{
  max-height:0;
  overflow:hidden;
  transition:0.3s;
  padding:0 16px;
}

.acc-item.active .acc-content{
  max-height:1000px;
  padding:16px;
}

.hotel-item{
  display:block;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  background:#ffe5e8;
  text-decoration:none;
  color:#732323;
}

.timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.timeline-item{
  display:flex;
  gap:12px;
  background:#fff5f6;
  padding:10px;
  border-radius:10px;
}

.timeline-time{
  font-weight:700;
  color:#a52126;
  min-width:80px;
}
</style>
</head>

<body>

<header>
  <h1 id="coupleName">Wedding</h1>
</header>

<div class="container">

<div class="accordion">

<!-- ✅ SCHEDULE -->
<div class="acc-item active">
  <div class="acc-title">⏰ Schedule</div>
  <div class="acc-content" id="schedule"></div>
</div>

<!-- ✅ TRAVEL (ВСЁ ВНУТРИ) -->
<div class="acc-item">
  <div class="acc-title">✈️ Travel & Stay</div>
  <div class="acc-content" id="travel"></div>
</div>

<!-- ✅ VENUE -->
<div class="acc-item">
  <div class="acc-title">📍 Venue</div>
  <div class="acc-content" id="venue"></div>
</div>

<!-- ✅ DETAILS -->
<div class="acc-item">
  <div class="acc-title">👗 Event Details</div>
  <div class="acc-content" id="details"></div>
</div>

<!-- ✅ FAQ -->
<div class="acc-item">
  <div class="acc-title">❓ FAQ</div>
  <div class="acc-content" id="faq"></div>
</div>

</div>

</div>

<script>
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "ТВОЙ_KEY";

function getToken(){
  const p = new URLSearchParams(location.search);
  return p.get("t") || p.get("token") || "";
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  global:{ headers:{ site_edit_token: getToken() } }
});

async function loadData(){
  const token = getToken();
  if(!token) return;

  const { data } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  if(!data) return;

  document.getElementById("coupleName").innerText =
    data.couple_name || "Wedding";

  // =========================
  // SCHEDULE
  // =========================
  const s = document.getElementById("schedule");

  if(data.schedule){
    s.innerHTML = data.schedule.map(i=>`
      <div class="timeline-item">
        <div class="timeline-time">${i.time||""}</div>
        <div>${i.text||""}</div>
      </div>
    `).join("");
  }

  // =========================
  // TRAVEL (ВСЁ В ОДНОМ)
  // =========================
  let html = "";

  if(data.flights_text){
    html += `<b>Travel Notes</b><br>${data.flights_text}<br><br>`;
  }

  if(data.airport || data.transfer_time){
    html += `<b>Arrival</b><br>
    Airport: ${data.airport||""}<br>
    Transfer: ${data.transfer_time||""}<br><br>`;
  }

  if(data.hotels){
    html += `<b>Where to Stay</b><br>`;
    html += data.hotels.split("\n").map(line=>{
      const [n,l]=line.split("—");
      if(l){
        return `<a class="hotel-item" href="${l.trim()}" target="_blank">${n.trim()}</a>`;
      }
      return `<div class="hotel-item">${line}</div>`;
    }).join("");
    html += "<br>";
  }

  if(data.stay_links){
    html += `<b>Booking Platforms</b><br>`;
    html += data.stay_links.split("\n").map(line=>{
      const [n,l]=line.split("—");
      return `<a class="hotel-item" href="${l.trim()}" target="_blank">${n.trim()}</a>`;
    }).join("");
    html += "<br>";
  }

  if(data.things_to_do){
    html += `<b>Things to Do</b><br>${data.things_to_do}`;
  }

  document.getElementById("travel").innerHTML = html;

  // =========================
  // VENUE
  // =========================
  document.getElementById("venue").innerHTML = `
    <b>${data.venue_name||""}</b><br>
    ${data.venue_address||""}<br><br>
    <a href="${data.map_link||"#"}" target="_blank">Open map</a>
  `;

  // =========================
  // DETAILS
  // =========================
  document.getElementById("details").innerHTML = `
    <b>Dress Code</b><br>${data.dress_code||""}<br><br>
    <b>Important Info</b><br>${data.important_info||""}
  `;

  // =========================
  // FAQ
  // =========================
  const faq = document.getElementById("faq");
  faq.innerHTML = "";

  (data.faq||[]).forEach(f=>{
    faq.innerHTML += `<b>${f.q}</b><br>${f.a}<br><br>`;
  });
}

loadData();

// accordion
document.querySelectorAll(".acc-title").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".acc-item").forEach(i=>i.classList.remove("active"));
    t.parentElement.classList.add("active");
  };
});
</script>

</body>
</html>
