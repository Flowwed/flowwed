<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel & Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fdeff1;
  color:#732323;
}
header{
  text-align:center;
  padding:40px 20px;
}
h1{color:#a52126;margin:0;}

.container{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

.accordion{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.acc-item{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 16px rgba(0,0,0,0.1);
}

.acc-title{
  padding:16px;
  cursor:pointer;
  font-weight:600;
  background:#fff5f6;
}

.acc-content{
  max-height:0;
  overflow:hidden;
  transition:0.3s;
  padding:0 16px;
}

.acc-item.active .acc-content{
  max-height:1000px;
  padding:16px;
}

.timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.timeline-item{
  display:flex;
  gap:12px;
  background:#fff5f6;
  padding:10px;
  border-radius:10px;
}

.timeline-time{
  font-weight:700;
  color:#a52126;
  min-width:80px;
}

.block{
  margin-bottom:14px;
}

.block b{
  display:block;
  margin-bottom:4px;
}

.link-item{
  display:block;
  margin:6px 0;
  padding:8px;
  border-radius:8px;
  background:#ffe5e8;
  text-decoration:none;
  color:#732323;
}
</style>
</head>

<body>

<header>
  <h1 id="coupleName">Wedding</h1>
</header>

<div class="container">

<div class="accordion">

<div class="acc-item active">
  <div class="acc-title">⏰ Schedule</div>
  <div class="acc-content" id="schedule"></div>
</div>

<div class="acc-item">
  <div class="acc-title">✈️ Travel & Stay</div>
  <div class="acc-content" id="travel"></div>
</div>

<div class="acc-item">
  <div class="acc-title">📍 Venue</div>
  <div class="acc-content" id="venue"></div>
</div>

<div class="acc-item">
  <div class="acc-title">📋 Details</div>
  <div class="acc-content" id="details"></div>
</div>

<div class="acc-item">
  <div class="acc-title">❓ FAQ</div>
  <div class="acc-content" id="faq"></div>
</div>

</div>

</div>

<script>
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
;

function getToken(){
  const p = new URLSearchParams(location.search);
  return p.get("t") || "";
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  global:{ headers:{ site_edit_token: getToken() } }
});

function parseLinks(text){
  if(!text) return "";

  return text.split("\n").map(line=>{
    let [name, link] = line.split("—");

    name = (name || "").trim();
    link = (link || "").trim();

    // если ссылки нет — используем name как ссылку
    if(!link && name.includes(".")){
      link = name;
    }

    // если нет http — добавляем
    if(link && !link.startsWith("http")){
      link = "https://" + link;
    }

if(link){
  return `<a class="link-item" href="${link}" target="_blank" rel="noopener noreferrer">${name}</a>`;
}

    return `<div class="link-item">${name}</div>`;
  }).join("");
}



async function loadData(){
  const token = getToken();
  if(!token) return;

  const { data } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  if(!data) return;

  document.getElementById("coupleName").innerText =
    data.couple_name || "Wedding";

  // SCHEDULE
  const scheduleEl = document.getElementById("schedule");

  if(data.schedule){
    scheduleEl.innerHTML = `
      <div class="timeline">
        ${data.schedule.map(i => `
          <div class="timeline-item">
            <div class="timeline-time">${i.time || ""}</div>
            <div>${i.text || ""}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  // TRAVEL
  document.getElementById("travel").innerHTML = `
    <div class="block"><b>Travel Notes</b>${data.flights_text || ""}</div>
    <div class="block"><b>Airport</b>${data.airport || ""}</div>
    <div class="block"><b>Transfer</b>${data.transfer_time || ""}</div>

    <div class="block"><b>Hotels</b>
      ${parseLinks(data.hotels)}
    </div>

    <div class="block"><b>Booking Platforms</b>
      ${parseLinks(data.stay_links)}
    </div>

    <div class="block"><b>Things To Do</b>
      ${data.things_to_do || ""}
    </div>
  `;

  // VENUE
  const mapLink = data.venue_address
    ? `https://maps.google.com/?q=${encodeURIComponent(data.venue_address)}`
    : "#";

  document.getElementById("venue").innerHTML = `
    <div class="block"><b>${data.venue_name || ""}</b></div>
    <div class="block">${data.venue_address || ""}</div>
    <div class="block">${data.venue_note || ""}</div>
    <a class="link-item" href="${mapLink}" target="_blank" rel="noopener noreferrer">Open map</a>
  `;

  // DETAILS
  document.getElementById("details").innerHTML = `
    <div class="block"><b>Dress Code</b>${data.dress_code || ""}</div>
    <div class="block"><b>Important Info</b>${data.important_info || ""}</div>
    <div class="block"><b>Weather</b>${parseLinks(data.weather_link)}</div>
  `;

  // FAQ
  const faqEl = document.getElementById("faq");
  faqEl.innerHTML = "";

  if(data.faq){
    data.faq.forEach(f=>{
      faqEl.innerHTML += `
        <div class="block">
          <b>${f.q}</b>
          ${f.a}
        </div>
      `;
    });
  }
}

loadData();

// accordion

document.querySelectorAll(".acc-title").forEach(t=>{
  t.onclick = ()=>{
    const item = t.parentElement;

    // если уже открыт → закрываем
    if(item.classList.contains("active")){
      item.classList.remove("active");
      return;
    }

    // иначе: закрываем все и открываем нужный
    document.querySelectorAll(".acc-item").forEach(i=>i.classList.remove("active"));
    item.classList.add("active");
  };
});
</script>

</body>
</html>
