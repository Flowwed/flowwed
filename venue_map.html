<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Wedding Details</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#fafafa;
  padding:30px;
  max-width:800px;
  margin:auto;
}

h1{
  text-align:center;
  color:#b41111;
}

.block{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.acc{
  margin-bottom:16px;
  border-radius:14px;
  overflow:hidden;
  background:white;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

/* HEADER */
.acc-header{
  padding:16px 18px;
  font-weight:700;
  cursor:pointer;

  background:#f8e2e2;   /* 💖 основной цвет */
  color:#7a2a2a;

  position:relative;
  transition:0.25s;
}

.acc-header:hover{
  background:#f1cfcf;
}

/* стрелка */
.acc-header::after{
  content:"▼";
  position:absolute;
  right:18px;
  top:50%;
  color:#7a2a2a;
  transform:translateY(-50%);
  transition:0.25s;
  font-size:12px;
  opacity:0.9;

}

/* поворот стрелки */
.acc.open .acc-header::after{
  transform:translateY(-50%) rotate(180deg);
}

/* BODY */
.acc-body{
  max-height:0;
  overflow:hidden;
  transition:0.35s ease;
  padding:0 18px;
  background:#fff8f9;
  color:#6a2a2a;
  font-size:15px;
  line-height:1.5;
}

/* открытый блок */
.acc.open .acc-body{
  max-height:600px;
  padding:16px 18px;
}

/* отступы внутри */
.acc-body div{
  margin-bottom:8px;
}

/* ссылки */
.acc-body a{
  color:#b41111;
  text-decoration:underline;
  font-weight:600;
}


#weddingDate{
  text-align:center;
  margin-top:8px;
  margin-bottom:10px;   /* 👈 ВАЖНО (разделяет с блоками) */

  font-size:20px;
  font-weight:600;     /* 💥 жирнее */

  color:#9c3a3a;
}

#content{
  margin-top:25px;
}


body{
  background:#fff6f6;
}



</style>
</head>

<body>

<h1 id="couple">...</h1>
<div id="weddingDate"></div>   <!-- 👈 ДОБАВИЛ -->
<div id="content"></div>



<script>

// 🔑 токен
const params = new URLSearchParams(location.search);
const token = params.get("t");

// 🔥 ВАЖНО: твой ключ
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";

// 🔥 КЛИЕНТ С HEADER (КАК У ТЕБЯ)
const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY,
  {
    global: {
      headers: {
        site_edit_token: token
      }
    }
  }
);

// 🚀 загрузка
async function load(){

  if(!token){
    document.body.innerHTML = "❌ Нет токена";
    return;
  }

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .maybeSingle();

  if(error){
    console.log(error);
    document.body.innerHTML = "❌ Ошибка загрузки";
    return;
  }

  if(!data){
    document.body.innerHTML = "❌ No Data";
    return;
  }

  render(data);
}



// 🎨 ВЫВОД
function render(d){

  document.getElementById("couple").innerText =
    d.couple_name || "Wedding";

document.getElementById("weddingDate").innerText =
   formatDate(d.wedding_date);

  const html = `

  ${accordion("Schedule",
    (d.schedule && d.schedule.length)
      ? d.schedule.map(i => `<div>${i.time} — ${i.text}</div>`).join("")
      : "No Data"
  )}

  ${accordion("Flights", d.flights_text || "No Data")}

  ${accordion("Hotels", `
    ${d.hotel_1 || ""}<br>
    ${d.hotel_2 || ""}<br>
    ${d.hotel_3 || ""}
  `)}

  ${accordion("Venue", `
    ${d.venue_name || ""}<br>
    ${d.venue_address || ""}<br>
    <a href="https://maps.google.com/?q=${encodeURIComponent(d.venue_address || "")}" target="_blank">
      Open Map
    </a>
  `)}

  ${accordion("FAQ",
    (d.faq && d.faq.length)
      ? d.faq.map(i => `<div><b>${i.q}</b><br>${i.a}</div>`).join("")
      : "No Data"
  )}

  `;

  document.getElementById("content").innerHTML = html;
}


function formatDate(dateStr){
  if(!dateStr) return "";

  const date = new Date(dateStr);

  return date.toLocaleDateString("en-US", {
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}


// 🔧 ACCORDION
function accordion(title, content){
  return `
    <div class="acc">
      <div class="acc-header">${title}</div>
      <div class="acc-body">${content}</div>
    </div>
  `;
}


// 🖱 КЛИК
document.addEventListener("click", (e) => {

  if(!e.target.classList.contains("acc-header")) return;

  const block = e.target.parentElement;

  // закрываем остальные
  document.querySelectorAll(".acc").forEach(el => {
    if(el !== block) el.classList.remove("open");
  });

  // toggle текущий
  block.classList.toggle("open");
});


// 🚀 ЗАПУСК (ВАЖНО — В КОНЦЕ)
load();

</script>
</body>
</html>
