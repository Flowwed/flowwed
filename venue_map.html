<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding Details</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  padding:20px 14px 28px;
  background:#fff6f6;
  font-family:Arial, sans-serif;
}

/* ===== TITLE ===== */
h1{
  margin:0;
  text-align:center;
  font-size:32px;
  color:#6b2f38;
}

#weddingDate{
  text-align:center;
  margin-top:10px;
  margin-bottom:18px;
  font-size:18px;
  font-weight:700;
  color:#9c5962;
}

/* ===== CONTENT ===== */
#content{
  max-width:760px;
  margin:0 auto;
}

/* ===== CARDS ===== */
.acc{
  margin-bottom:14px;
  border-radius:16px;

  /* 💖 мягкий розовый фон */
  background:rgba(248,226,226,0.7);

  backdrop-filter: blur(14px);

  border:1px solid rgba(255,255,255,0.7);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.08),
    0 4px 10px rgba(0,0,0,0.05),
    inset 0 1px 2px rgba(255,255,255,0.7);

  transition:0.25s ease;
}

/* HEADER */
.acc-header{
  padding:16px 18px;
  font-weight:600;
  font-size:17px;
  cursor:pointer;

  color:#5a2f35;
  position:relative;
}

/* hover */
.acc:hover{
  transform: translateY(-1px);
}

/* click */
.acc:active{
  transform: scale(0.995);
}

/* стрелка */
.acc-header::after{
  content:"›";
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  color:rgba(0,0,0,0.25);
  transition:0.25s;
}

.acc.open .acc-header::after{
  transform:translateY(-50%) rotate(90deg);
}

/* BODY */
.acc-body{
  max-height:0;
  overflow:hidden;
  transition:0.35s ease;

  padding:0 18px;
  color:#6a3a3a;
  font-size:16px;
  line-height:1.55;
}

.acc.open .acc-body{
  max-height:700px;
  padding:14px 18px 18px;
}

/* LINKS */
.acc-body a{
  color:#9c5962;
  text-decoration:underline;
}

/* ===== MOBILE ===== */
@media (max-width: 768px){

  h1{
    font-size:26px;
  }

  #weddingDate{
    font-size:17px;
  }

  .acc-header{
    font-size:16px;
  }

  .acc-body{
    font-size:15px;
  }
}

</style>
</head>

<body>

<h1 id="couple"></h1>
<div id="weddingDate"></div>
<div id="content"></div>

<script>

// 🔑 token
const params = new URLSearchParams(location.search);
const token = params.get("t");

// 🔌 Supabase
const sb = supabase.createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI",
  {
    global:{
      headers:{
        site_edit_token: token
      }
    }
  }
);


// 🚀 LOAD
async function load(){

  if(!token){
    document.body.innerHTML = "❌ Нет токена";
    return;
  }

  const { data } = await sb
    .from("wedding_info")
    .select("*")
    .maybeSingle();

  if(!data){
    document.body.innerHTML = "❌ Нет данных";
    return;
  }

  render(data);
}


// 📅 DATE FORMAT
function formatDate(dateStr){
  if(!dateStr) return "";

  const date = new Date(dateStr);

  return date.toLocaleDateString("en-US", {
    year:"numeric",
    month:"long",
    day:"numeric"
  });
}


// 📦 ACCORDION
function accordion(title, content){
  return `
    <div class="acc">
      <div class="acc-header">${title}</div>
      <div class="acc-body">${content}</div>
    </div>
  `;
}


// 🎨 RENDER
function render(d){

  document.getElementById("couple").innerText =
    d.couple_name || "Wedding";

  document.getElementById("weddingDate").innerText =
    formatDate(d.wedding_date);

  const html = `

  ${accordion("Schedule",
    (d.schedule && d.schedule.length)
      ? d.schedule.map(i => `<div>${i.time} — ${i.text}</div>`).join("")
      : "No Data"
  )}

  ${accordion("Flights", d.flights_text || "No Data")}

  ${accordion("Hotels", `
    ${d.hotel_1 || ""}<br>
    ${d.hotel_2 || ""}<br>
    ${d.hotel_3 || ""}
  `)}

  ${accordion("Venue", `
    ${d.venue_name || ""}<br>
    ${d.venue_address || ""}<br>
    <a href="https://maps.google.com/?q=${encodeURIComponent(d.venue_address || "")}" target="_blank">
      Open Map
    </a>
  `)}

  ${accordion("FAQ",
    (d.faq && d.faq.length)
      ? d.faq.map(i => `<div><b>${i.q}</b><br>${i.a}</div>`).join("")
      : "No Data"
  )}

  `;

  document.getElementById("content").innerHTML = html;
}


// 🖱 CLICK
document.addEventListener("click", (e)=>{

  if(!e.target.classList.contains("acc-header")) return;

  const block = e.target.parentElement;

  document.querySelectorAll(".acc").forEach(el=>{
    if(el !== block) el.classList.remove("open");
  });

  block.classList.toggle("open");
});


// старт
load();

</script>
</body>
</html>
