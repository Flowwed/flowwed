<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:sans-serif;
  padding:20px;
}
.block{
  margin-bottom:20px;
}
</style>
</head>

<body>

<h1 id="couple"></h1>
<div id="date"></div>

<div class="block">
  <h3>Schedule</h3>
  <div id="schedule"></div>
</div>

<div class="block">
  <h3>Travel</h3>
  <div id="travel"></div>
</div>

<div class="block">
  <h3>Venue</h3>
  <div id="venue"></div>
</div>

<div class="block">
  <h3>Details</h3>
  <div id="details"></div>
</div>

<div class="block">
  <h3>FAQ</h3>
  <div id="faq"></div>
</div>

<script>

// ===== TOKEN (1:1 КАК В ОБРАЗЦЕ)
function getToken(){
  const params = new URLSearchParams(location.search);
  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("edit_token") ||
    sessionStorage.getItem("rsvpToken") ||
    "";

  sessionStorage.setItem("rsvpToken", token);
  return token;
}

const token = getToken();

// ===== SUPABASE (1:1)
const sb = window.supabase.createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

// ===== NAME (1:1)
async function loadName(){
  if(!token) return;

  const { data } = await sb
    .from("sites")
    .select("couple_name")
    .eq("edit_token", token)
    .maybeSingle();

  if(data?.couple_name){
    document.getElementById("couple").textContent = data.couple_name;
  }
}

// ===== MAIN DATA (1:1)
async function loadData(){

  if(!token){
    document.body.innerHTML = "NO TOKEN";
    return;
  }

  const { data, error } = await sb
    .from("wedding_info")
    .select("*")
    .eq("site_edit_token", token)
    .maybeSingle();

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(error || !data){
    document.body.innerHTML = "NO DATA";
    return;
  }

  document.getElementById("date").textContent = data.wedding_date || "";

  // SCHEDULE (как в образце)
  const sch = document.getElementById("schedule");
  sch.innerHTML = "";

  if (data.schedule && Array.isArray(data.schedule)) {
    data.schedule.forEach(i=>{
      sch.innerHTML += `<div>${i.time} — ${i.text}</div>`;
    });
  } else {
    [
      [data.schedule_time_1, data.schedule_text_1],
      [data.schedule_time_2, data.schedule_text_2],
      [data.schedule_time_3, data.schedule_text_3],
      [data.schedule_time_4, data.schedule_text_4]
    ].forEach(([t,txt])=>{
      if(t||txt){
        sch.innerHTML += `<div>${t} — ${txt}</div>`;
      }
    });
  }

  // TRAVEL
  document.getElementById("travel").innerHTML = `
    ${data.flights_text || ""}<br>
    ${data.airport || ""}<br>
    ${data.transfer_time || ""}
  `;

  // VENUE
  document.getElementById("venue").innerHTML = `
    ${data.venue_name || ""}<br>
    ${data.venue_address || ""}<br>
    <a href="${data.map_link}" target="_blank">MAP</a>
  `;

  // DETAILS
  document.getElementById("details").innerHTML = `
    ${data.getting_around || ""}<br>
    ${data.dress_code || ""}<br>
    ${data.weather || ""}
  `;

  // FAQ
  const faq = document.getElementById("faq");
  faq.innerHTML = "";

  if (data.faq && Array.isArray(data.faq)) {
    data.faq.forEach(i=>{
      faq.innerHTML += `<div><b>${i.q}</b><br>${i.a}</div>`;
    });
  } else {
    [
      [data.faq_q1, data.faq_a1],
      [data.faq_q2, data.faq_a2],
      [data.faq_q3, data.faq_a3],
      [data.faq_q4, data.faq_a4]
    ].forEach(([q,a])=>{
      if(q||a){
        faq.innerHTML += `<div><b>${q}</b><br>${a}</div>`;
      }
    });
  }

}

loadName();
loadData();

</script>

</body>
</html>
