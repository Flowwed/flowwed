<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel & Event</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  color:#6a2a2a;
}
.container{
  max-width:820px;
  margin:30px auto;
  padding:16px;
}
h1{text-align:center;color:#b41111;}
.date{text-align:center;margin-bottom:20px;opacity:.8;}
.section{
  background:#fff;
  border-radius:16px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
.header{
  padding:14px;
  font-weight:700;
  cursor:pointer;
  background:#fff5f7;
}
.content{display:none;padding:14px;}
.empty{text-align:center;margin-top:50px;color:#999;}
</style>
</head>

<body>

<div class="container">

<h1 id="couple">—</h1>
<div id="date" class="date"></div>

<div class="section">
  <div class="header">Schedule</div>
  <div class="content" id="schedule"></div>
</div>

<div class="section">
  <div class="header">Travel</div>
  <div class="content" id="travel"></div>
</div>

<div class="section">
  <div class="header">Venue</div>
  <div class="content" id="venue"></div>
</div>

<div class="section">
  <div class="header">Details</div>
  <div class="content" id="details"></div>
</div>

<div class="section">
  <div class="header">FAQ</div>
  <div class="content" id="faq"></div>
</div>

<div id="empty" class="empty" style="display:none;">
No data found
</div>

</div>

<script>

// =====================
// CONFIG
// =====================
const URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";

// =====================
// TOKEN
// =====================
const params = new URLSearchParams(location.search);
const token = params.get("t");

console.log("TOKEN:", token);

// =====================
// ACCORDION
// =====================
document.querySelectorAll(".header").forEach(h=>{
  h.onclick = () => {
    const c = h.nextElementSibling;
    const open = c.style.display === "block";
    document.querySelectorAll(".content").forEach(x=>x.style.display="none");
    if(!open) c.style.display="block";
  };
});

// =====================
// LOAD DATA
// =====================
async function load(){

  if(!token){
    document.getElementById("empty").style.display = "block";
    return;
  }

  const res = await fetch(
    `${URL}/rest/v1/wedding_info?select=*&site_edit_token=eq.${token}`,
    {
      headers:{
        apikey: KEY,
        Authorization: "Bearer " + KEY
      }
    }
  );

  const arr = await res.json();
  const data = arr[0];

  console.log("DATA:", data);

  if(!data){
    document.getElementById("empty").style.display = "block";
    return;
  }

  // =====================
  // BASIC
  // =====================
  document.getElementById("couple").textContent = data.couple_name || "";
  document.getElementById("date").textContent = data.wedding_date || "";

  // =====================
  // SCHEDULE
  // =====================
  const sch = document.getElementById("schedule");
  sch.innerHTML = "";

  if (data.schedule && Array.isArray(data.schedule)) {
    data.schedule.forEach(i=>{
      sch.innerHTML += `<div><b>${i.time||""}</b> — ${i.text||""}</div>`;
    });
  } else {
    for(let i=1;i<=10;i++){
      const t = data[`schedule_time_${i}`];
      const txt = data[`schedule_text_${i}`];
      if(t || txt){
        sch.innerHTML += `<div><b>${t||""}</b> — ${txt||""}</div>`;
      }
    }
  }

  // =====================
  // TRAVEL
  // =====================
  document.getElementById("travel").innerHTML = `
    ${data.flights_text || ""}<br><br>
    Airport: ${data.airport || ""}<br>
    Transfer: ${data.transfer_time || ""}<br><br>
    Hotels:<br>
    ${data.hotel_1 || ""}<br>
    ${data.hotel_2 || ""}<br>
    ${data.hotel_3 || ""}
  `;

  // =====================
  // VENUE
  // =====================
  document.getElementById("venue").innerHTML = `
    ${data.venue_name || ""}<br>
    ${data.venue_address || ""}<br>
    ${data.venue_note || ""}<br><br>
    ${data.map_link ? `<a href="${data.map_link}" target="_blank">Open Map</a>` : ""}
  `;

  // =====================
  // DETAILS
  // =====================
  document.getElementById("details").innerHTML = `
    ${data.getting_around || ""}<br><br>
    Dress: ${data.dress_code || ""}<br>
    Weather: ${data.weather || ""}<br>
    ${data.weather_note || ""}
  `;

  // =====================
  // FAQ
  // =====================
  const faq = document.getElementById("faq");
  faq.innerHTML = "";

  if (data.faq && Array.isArray(data.faq)) {
    data.faq.forEach(i=>{
      faq.innerHTML += `<div><b>${i.q}</b><br>${i.a}</div>`;
    });
  } else {
    for(let i=1;i<=10;i++){
      const q = data[`faq_q${i}`];
      const a = data[`faq_a${i}`];
      if(q || a){
        faq.innerHTML += `<div><b>${q||""}</b><br>${a||""}</div>`;
      }
    }
  }

}

load();

</script>
</body>
</html>
