<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Updates</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#fff6f6;
  padding:20px;
  max-width:700px;
  margin:auto;
}

h1{
  margin:0;
  text-align:center;
  font-size:34px;
  font-weight:800;
  background: linear-gradient(to bottom, #b03036, #5f2b33);
  -webkit-background-clip: text;
  color: transparent;
}

#weddingDate{
  text-align:center;
  margin-top:8px;
  margin-bottom:20px;
  font-size:20px;
  font-weight:700;
  color:#a06a73;
}

#notifyBlock{
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
}

#content{
  margin-top:20px;
}

.updates-box{
  background:white;
  border-radius:18px;
  padding:16px;
  max-height:420px;
  overflow-y:auto;
}

.update{
  padding:12px;
  margin-bottom:10px;
  background:#faf2f2;
  border-radius:10px;
}

.date{
  font-size:14px;
  font-weight:700;
  color:#8f5860;
}
</style>
</head>

<body>

<h1 id="couple">Loading...</h1>
<div id="weddingDate"></div>

<div id="notifyBlock">Send this page to your guests</div>

<div id="content"></div>

<script>

// 🔑 TOKEN
const params = new URLSearchParams(location.search);
const token = params.get("t");

// 🔌 SUPABASE (✔ ПОЛНЫЙ КЛЮЧ)
const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  global:{
    headers:{
      site_edit_token: token
    }
  }
});

// 🚀 LOAD
async function load(){

  if(!token){
    document.body.innerHTML = "❌ No token";
    return;
  }

  // ✅ 1. ИМЯ ИЗ sites
  const { data: site } = await sb
    .from("sites")
    .select("couple_name")
    .maybeSingle();

  document.getElementById("couple").innerText =
    site?.couple_name || "Wedding";

  // ✅ 2. ДАТА ИЗ wedding_info
  const { data: info } = await sb
    .from("wedding_info")
    .select("wedding_date")
    .maybeSingle();

  document.getElementById("weddingDate").innerText =
    formatDate(info?.wedding_date);

  // ✅ 3. UPDATES
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/our_story_page?select=wed_updates&edit_token=eq.${token}`,
    {
      headers: {
        apikey: SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  if(!data || !data.length || !data[0].wed_updates){
    document.getElementById("content").innerHTML = "No updates yet";
    return;
  }

  render(data[0].wed_updates);
}

// 🎨 RENDER
function render(list){
  const html = `
    <div class="updates-box">
      ${list.map(i => `
        <div class="update">
          <div class="date">${formatDate(i.created_at)}</div>
          <div>${i.content}</div>
        </div>
      `).join("")}
    </div>
  `;
  document.getElementById("content").innerHTML = html;
}

// 📅 FORMAT
function formatDate(d){
  if(!d) return "";
  return new Date(d).toLocaleDateString("en-US", {
    year:"numeric",
    month:"long",
    day:"numeric"
  });
}

load();

</script>

</body>
</html>
