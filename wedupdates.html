<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Updates</title>

<style>
body{
  font-family: Arial;
  background:#fff6f6;
  padding:20px;
  max-width:700px;
  margin:auto;
}

h1{
  text-align:center;
  font-size:28px;
  font-weight:800;
  color:#5f2b33;
  margin-bottom:10px;
}

#notifyBlock{
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.update{
  background:white;
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.date{
  font-weight:700;
  margin-bottom:8px;
  color:#8f5860;
}


#content{
  margin-top:20px;
}

/* контейнер со скроллом */
.updates-box{
  background:rgba(255,255,255,0.85);
  backdrop-filter: blur(14px);

  border-radius:18px;
  padding:16px;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.08),
    inset 0 1px 2px rgba(255,255,255,0.6);

  max-height:420px;       /* 🔥 высота */
  overflow-y:auto;        /* 🔥 СКРОЛЛ */
}

/* отдельный update */
.update{
  padding:14px 12px;
  border-radius:12px;
  margin-bottom:12px;

  background:rgba(250,242,242,0.9);

  box-shadow:
    0 4px 10px rgba(0,0,0,0.06),
    inset 0 1px 1px rgba(255,255,255,0.5);
}

/* дата */
.date{
  font-size:14px;
  font-weight:700;
  color:#8f5860;
  margin-bottom:6px;
}

/* текст */
.update div{
  font-size:16px;
  font-weight:500;
  line-height:1.6;
  color:#5f4045;
}

/* скролл (красивый) */
.updates-box::-webkit-scrollbar{
  width:8px;
}

.updates-box::-webkit-scrollbar-thumb{
  background:#d9bcbc;
  border-radius:10px;
}


</style>
</head>

<body>

<h1>Updates</h1>

<div id="notifyBlock">
  Send this page to your guests
</div>

<div id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const params = new URLSearchParams(location.search);
const token = params.get("t");
const isShared = params.get("shared") === "1";

if(isShared){
  document.getElementById("notifyBlock").style.display = "none";
}

const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load(){

  const { data } = await sb
    .from("our_story_page")
    .select("wed_updates")
    .eq("edit_token", token)
    .maybeSingle();

  if(!data || !data.wed_updates){
    document.getElementById("content").innerHTML = "No updates yet";
    return;
  }

  render(data.wed_updates);
}

function render(list){

  if(!list.length){
    document.getElementById("content").innerHTML = "No updates yet";
    return;
  }

  const html = `
    <div class="updates-box">
      ${list.map(i => `
        <div class="update">
          <div class="date">${formatDate(i.created_at)}</div>
          <div>${i.content}</div>
        </div>
      `).join("")}
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}


load();


</script>

</body>
</html>
