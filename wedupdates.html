<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Updates</title>

<style>
body{
  font-family: Arial;
  background:#fff6f6;
  padding:20px;
  max-width:700px;
  margin:auto;
}

/* 💎 HEADER */
h1{
  margin:0;
  text-align:center;
  font-size:34px;
  font-weight:800;
  color:#5f2b33;
}

#weddingDate{
  text-align:center;
  margin-top:8px;
  margin-bottom:20px;

  font-size:20px;
  font-weight:700;
  color:#8f5860;
}

/* 💎 ADMIN BLOCK */
#notifyBlock{
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 💎 CONTAINER */
#content{
  margin-top:20px;
}

/* 💎 SCROLL BOX */
.updates-box{
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(14px);

  border-radius:18px;
  padding:16px;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.08),
    inset 0 1px 2px rgba(255,255,255,0.6);

  max-height:420px;
  overflow-y:auto;
}

/* 💎 CARD */
.update{
  padding:14px 12px;
  border-radius:12px;
  margin-bottom:12px;

  background:rgba(250,242,242,0.95);

  box-shadow:
    0 4px 10px rgba(0,0,0,0.06),
    inset 0 1px 1px rgba(255,255,255,0.5);
}

/* 💎 DATE */
.date{
  font-size:14px;
  font-weight:700;
  color:#8f5860;
  margin-bottom:6px;
}

/* 💎 TEXT */
.update div{
  font-size:16px;
  font-weight:500;
  line-height:1.6;
  color:#5f4045;
}

/* 💎 SCROLLBAR */
.updates-box::-webkit-scrollbar{
  width:8px;
}
.updates-box::-webkit-scrollbar-thumb{
  background:#d9bcbc;
  border-radius:10px;
}


h1{
  margin:0;
  text-align:center;
  font-size:34px;
  font-weight:800;

  background: linear-gradient(to bottom, #a9444a, #5f2b33);
  -webkit-background-clip: text;
  color: transparent;
}

#weddingDate{
  text-align:center;
  margin-top:8px;
  margin-bottom:20px;

  font-size:20px;
  font-weight:700;
  color:#a06a73;
}


</style>
</head>

<body>

<h1 id="couple">Pari</h1>
<div id="weddingDate">September 27, 2026</div>

<div id="notifyBlock">
  Send this page to your guests
</div>

<div id="content"></div>

<script>

const params = new URLSearchParams(location.search);
const token = params.get("t");
const isShared = params.get("shared") === "1";

if(isShared){
  document.getElementById("notifyBlock").style.display = "none";
}

const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
;

// 🔥 ЗАГРУЗКА ВСЕГО
async function load(){

  // 1. тянем couple + date
  const infoRes = await fetch(
    `${SUPABASE_URL}/rest/v1/wedding_info?select=couple_name,wedding_date&edit_token=eq.${token}`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const info = await infoRes.json();

  if(info && info.length){
    document.getElementById("couple").innerText =
      info[0].couple_name || "Wedding";

    document.getElementById("weddingDate").innerText =
      formatDate(info[0].wedding_date);
  }

  // 2. тянем updates
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/our_story_page?select=wed_updates&edit_token=eq.${token}`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  if(!data || !data.length || !data[0].wed_updates){
    document.getElementById("content").innerHTML = "No updates yet";
    return;
  }

  render(data[0].wed_updates);
}

function render(list){

  const html = `
    <div class="updates-box">
      ${list.map(i => `
        <div class="update">
          <div class="date">${formatDate(i.created_at)}</div>
          <div>${i.content}</div>
        </div>
      `).join("")}
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}

function formatDate(d){
  return new Date(d).toLocaleDateString("en-US", {
    year:"numeric",
    month:"long",
    day:"numeric"
  });
}

load();
</script>

</body>
</html>
