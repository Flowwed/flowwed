<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Updates</title>

<!-- 🔥 ВАЖНО: supabase библиотека -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#fff6f6;
  padding:20px;
  max-width:700px;
  margin:auto;
}

/* HEADER */
h1{
  margin:0;
  text-align:center;
  font-size:34px;
  font-weight:800;

  background: linear-gradient(to bottom, #b03036, #5f2b33);
  -webkit-background-clip: text;
  color: transparent;
}

#weddingDate{
  text-align:center;
  margin-top:8px;
  margin-bottom:20px;

  font-size:20px;
  font-weight:700;
  color:#a06a73;
}

/* ADMIN BLOCK */
#notifyBlock{
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* CONTENT */
#content{
  margin-top:20px;
}

/* SCROLL BOX */
.updates-box{
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(14px);

  border-radius:18px;
  padding:16px;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.08),
    inset 0 1px 2px rgba(255,255,255,0.6);

  max-height:420px;
  overflow-y:auto;
}

/* UPDATE CARD */
.update{
  padding:14px 12px;
  border-radius:12px;
  margin-bottom:12px;

  background:rgba(250,242,242,0.95);

  box-shadow:
    0 4px 10px rgba(0,0,0,0.06),
    inset 0 1px 1px rgba(255,255,255,0.5);
}

/* DATE */
.date{
  font-size:14px;
  font-weight:700;
  color:#8f5860;
  margin-bottom:6px;
}

/* TEXT */
.update div{
  font-size:16px;
  font-weight:500;
  line-height:1.6;
  color:#5f4045;
}

/* SCROLLBAR */
.updates-box::-webkit-scrollbar{
  width:8px;
}
.updates-box::-webkit-scrollbar-thumb{
  background:#d9bcbc;
  border-radius:10px;
}
</style>
</head>

<body>

<h1 id="couple">Loading...</h1>
<div id="weddingDate"></div>

<div id="notifyBlock">
  Send this page to your guests
</div>

<div id="content"></div>

<script>

// 🔑 TOKEN
const params = new URLSearchParams(location.search);
const token = params.get("t");
const isShared = params.get("shared") === "1";

if(isShared){
  document.getElementById("notifyBlock").style.display = "none";
}

// 🔌 SUPABASE (✅ КЛЮЧ ВСТАВЛЕН)
const sb = supabase.createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI",
  {
    global:{
      headers:{
        site_edit_token: token
      }
    }
  }
);

// 🚀 LOAD
async function load(){

  if(!token){
    document.body.innerHTML = "❌ No token";
    return;
  }

  // 🔹 1. берём имя из sites
  const { data: site, error: siteError } = await sb
    .from("sites")
    .select("couple_name")
    .eq("edit_token", token)
    .maybeSingle();

  console.log("SITE:", site);
  console.log("SITE ERROR:", siteError);

  // 🔹 2. берём остальное как было
  const { data: info, error } = await sb
    .from("wedding_info")
    .select("*")
    .maybeSingle();

  console.log("INFO:", info);
  console.log("ERROR:", error);

  // 🔹 3. имя (приоритет sites)
  document.getElementById("couple").innerText =
    site?.couple_name || info?.couple_name || "Wedding";

  // 🔹 4. дата
  document.getElementById("weddingDate").innerText =
    info ? formatDate(info.wedding_date) : "";
}


  // 💎 UPDATES
  const res = await fetch(
    `https://octwwpatppbenqwkcqaw.supabase.co/rest/v1/our_story_page?select=wed_updates&edit_token=eq.${token}`,
    {
      headers: {
        apikey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI",
        Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
      }
    }
  );

  const data = await res.json();

  console.log("UPDATES:", data);

  if(!data || !data.length || !data[0].wed_updates){
    document.getElementById("content").innerHTML = "No updates yet";
    return;
  }

  render(data[0].wed_updates);
}

// 🎨 RENDER
function render(list){
  const html = `
    <div class="updates-box">
      ${list.map(i => `
        <div class="update">
          <div class="date">${formatDate(i.created_at)}</div>
          <div>${i.content}</div>
        </div>
      `).join("")}
    </div>
  `;
  document.getElementById("content").innerHTML = html;
}

// 📅 FORMAT
function formatDate(d){
  if(!d) return "";
  return new Date(d).toLocaleDateString("en-US", {
    year:"numeric",
    month:"long",
    day:"numeric"
  });
}

load();

</script>


</body>
</html>
