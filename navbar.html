<style>
.navbar {
  position: sticky;
  top: 0;
  z-index: 9999;

  display: flex;
  justify-content: flex-end;
  align-items: center;

  padding: 14px 40px;

  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.nav-links {
  display: flex;
  gap: 26px;
  margin-left: auto;
  font-size: 15px;
}

.nav-links a {
  text-decoration: none;
  color: #3a1a1a;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s;
}

.nav-links a:hover {
  color: #b41111;
}

.nav-links a.active {
  color: #b41111;
  font-weight: 700;
  position: relative;
}

.nav-links a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 100%;
  height: 2px;
  background: #b41111;
}
</style>

<script>
// ===== TOKEN =====
const params = new URLSearchParams(window.location.search);
const token =
  params.get("t") ||
  params.get("token") ||
  params.get("TOKEN") ||
  params.get("T") ||
  "";

// ===== LINKS (строго как у тебя в dashboard) =====
document.getElementById("nav-home").href = `dashboard.html?t=${token}`;
document.getElementById("nav-guests").href = `Guests.html?t=${token}`;
document.getElementById("nav-std").href = `savethedate.html?t=${token}`;
document.getElementById("nav-rsvp").href = `postwed.html?t=${token}`;
document.getElementById("nav-budget").href = `Budget.html?t=${token}`;
document.getElementById("nav-memories").href = `postwed2.html?t=${token}`;
document.getElementById("nav-gifts").href = `gift_registry.html?t=${token}`;
document.getElementById("nav-seating").href = `SeatingChart.html?t=${token}`;
document.getElementById("nav-album").href = `just_married.html?t=${token}`;

// ===== ACTIVE =====
const current = window.location.pathname.split("/").pop().toLowerCase();

const map = {
  "dashboard.html": "nav-home",
  "guests.html": "nav-guests",
  "savethedate.html": "nav-std",
  "postwed.html": "nav-rsvp",
  "budget.html": "nav-budget",
  "postwed2.html": "nav-memories",
  "gift_registry.html": "nav-gifts",
  "seatingchart.html": "nav-seating",
  "just_married.html": "nav-album"
};

if (map[current]) {
  document.getElementById(map[current]).classList.add("active");
}
</script>
