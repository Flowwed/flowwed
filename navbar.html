<style>
.navbar {
  position: sticky;
  top: 0;
  z-index: 9999;
  display: flex;
  justify-content: flex-end;
  padding: 14px 40px;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.nav-links {
  display: flex;
  gap: 26px;
  margin-left: auto;
}

.nav-links a {
  text-decoration: none;
  color: #3a1a1a;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s;
}

.nav-links a:hover {
  color: #b41111;
}

.nav-links a.active {
  color: #b41111;
  font-weight: 700;
  position: relative;
}

.nav-links a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 100%;
  height: 2px;
  background: #b41111;
}
</style>

<script>
// ===== TOKEN =====
function getToken() {
  const p = new URLSearchParams(window.location.search);
  return p.get("t") || p.get("token") || p.get("TOKEN") || p.get("T") || "";
}

// ===== ПЕРЕХОД (ГЛАВНОЕ) =====
function goNav(page) {
  const token = getToken();
  const url = token ? page + "?t=" + token : page;
  window.location.href = url;
}

// ===== ACTIVE =====
(function() {
  const current = window.location.pathname.split("/").pop().toLowerCase();

  const map = {
    "dashboard.html": "nav-home",
    "guests.html": "nav-guests",
    "savethedate.html": "nav-std",
    "postwed.html": "nav-rsvp",
    "budget.html": "nav-budget",
    "postwed2.html": "nav-memories",
    "gift_registry.html": "nav-gifts",
    "seatingchart.html": "nav-seating",
    "just_married.html": "nav-album"
  };

  if (map[current]) {
    const el = document.getElementById(map[current]);
    if (el) el.classList.add("active");
  }
})();
</script>
