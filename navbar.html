<!-- ================= NAVBAR ================= -->
<div class="navbar">
  <div class="nav-links">

    <a data-page="dashboard">Home</a>
    <a data-page="Guests">Guests</a>
    <a data-page="savethedate">Save the Date</a>
    <a data-page="postwed">RSVP</a>
    <a data-page="Budget">Budget</a>
    <a data-page="postwed2">Memories</a>
    <a data-page="gift_registry">Gifts</a>
    <a data-page="SeatingChart">Seating</a>
    <a data-page="just_married">Album</a>

  </div>
</div>

<style>
.navbar {
  position: sticky;
  top: 0;
  z-index: 9999;

  display: flex;
  justify-content: flex-end;
  align-items: center;

  padding: 14px 40px;

  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.nav-links {
  display: flex;
  gap: 26px;
  margin-left: auto;
  font-size: 15px;
}

.nav-links a {
  text-decoration: none;
  color: #3a1a1a;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s;
}

.nav-links a:hover {
  color: #b41111;
}

.nav-links a.active {
  color: #b41111;
  font-weight: 700;
  position: relative;
}

.nav-links a.active::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 100%;
  height: 2px;
  background: #b41111;
}
</style>

<script>
// ================= TOKEN =================
function getToken() {
  const params = new URLSearchParams(window.location.search);
  return (
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T") ||
    ""
  );
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  const token = getToken();
  const links = document.querySelectorAll(".nav-links a");

  // ===== CLICK HANDLER (главное) =====
  links.forEach(link => {
    link.addEventListener("click", (e) => {
      e.preventDefault();

      const page = link.dataset.page;

      if (!page) return;

      const url = token
        ? `${page}.html?t=${encodeURIComponent(token)}`
        : `${page}.html`;

      window.location.href = url;
    });
  });

  // ===== ACTIVE PAGE =====
  const current = window.location.pathname.split("/").pop().toLowerCase();

  links.forEach(link => {
    const page = (link.dataset.page || "").toLowerCase() + ".html";

    if (page === current) {
      link.classList.add("active");
    }
  });
});
</script>
