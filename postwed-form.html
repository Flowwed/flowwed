<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Share Your Wedding Memories</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#fff1f4,#ffffff);
margin:40px auto;
max-width:760px;
padding:0 18px;
color:#6a2a2a;
}

h1{
text-align:center;
font-size:32px;
color:#9c1818;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:15px;
margin-bottom:30px;
color:#7a3a3a;
}

.form-box{
background:white;
padding:26px;
border-radius:18px;
border:2px solid #b41111;
box-shadow:0 16px 38px rgba(0,0,0,0.18);
}

.field{margin-bottom:18px;}

.field label{
display:block;
font-weight:700;
margin-bottom:6px;
font-size:14px;
color:#7e2a2a;
}

input,textarea{
width:100%;
padding:11px;
border-radius:10px;
border:1px solid rgba(160,0,40,0.25);
box-sizing: border-box; /* 🔥 ВАЖНО */
}

textarea{
height:120px;
font-size:16px;
line-height:1.5;
}

.upload-box{
border:2px dashed #e0a8a8;
border-radius:12px;
padding:18px;
text-align:center;
background:#fff7f9;
}

.preview{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}

button{
margin-top:16px;
padding:12px;
border:none;
border-radius:12px;
background:#9c1818;
color:white;
font-weight:700;
cursor:pointer;
}

button.loading{
opacity:.6;
pointer-events:none;
}

.upload-tile {
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:140px;
height:110px;
margin:0 auto;
border:2px dashed #e0a8a8;
border-radius:14px;
cursor:pointer;
transition:.2s;
background:#fff7f9;
}

.upload-tile:hover {
background:#ffecee;
border-color:#9c1818;
}

.upload-icon {font-size:28px;margin-bottom:6px;}
.upload-text {font-size:13px;font-weight:600;color:#7a3a3a;}
.upload-tile input {display:none;}
</style>
</head>

<body>

<h1 id="pageTitle">Share Your Wedding Memories</h1>
<div class="subtitle">We would love to see your photos and hear your favorite moments ❤️</div>

<div class="form-box">
<div id="formArea">

<div class="field">
<label>Your Name</label>
<input id="guestName">
</div>

<div class="field">
<label>Your Email</label>
<input id="guestEmail" type="email">
</div>

<div class="field">
<label>Your Message</label>
<textarea id="guestMessage" placeholder="Max 30 words please"></textarea>
</div>

<div id="wordCount" style="
font-size:14px;
color:#a05a5a;
margin-top:6px;
text-align:right;
font-weight:500;
">
30 words left
</div>

<div class="upload-box">

  <label class="upload-tile">
    <div class="upload-icon">📷</div>
    <div class="upload-text">Add Photos</div>
    <input type="file" id="photoUpload" multiple accept="image/*">
  </label>

  <div class="upload-hint">
    Max 5 photos
  </div>

  <div id="photoPreview" class="preview"></div>

</div>
</div>

<button id="submitBtn">Submit Memory</button>
</div>

<!-- TOAST -->
<div id="toast" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
background:#9c1818;color:white;padding:14px 20px;border-radius:10px;font-weight:600;
display:none;z-index:999;"></div>

<!-- SUCCESS OVERLAY -->
<div id="successOverlay" style="
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(255,255,255,0.95);
display:none;align-items:center;justify-content:center;z-index:9999;
">
<div style="
background:white;padding:40px;border-radius:20px;text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.2);max-width:320px;
animation:pop .4s ease;
">
<div style="font-size:40px;">❤️</div>
<h2 style="color:#9c1818;">Thank you!</h2>
<p>Your memories have been saved</p>
<button id="closeOverlay">Close</button>
</div>
</div>

<style>
@keyframes pop {
from {transform:scale(.8);opacity:0;}
to {transform:scale(1);opacity:1;}
}
</style>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
"https://octwwpatppbenqwkcqaw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

const token = new URLSearchParams(location.search).get("t");

const photoInput = document.getElementById("photoUpload");
const preview = document.getElementById("photoPreview");

let allFiles = [];

function showToast(text){
const t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

// PREVIEW
function renderPreview() {
  preview.innerHTML = "";

  allFiles.forEach((file, index) => {

    const wrapper = document.createElement("div");
    wrapper.style.position = "relative";

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    const removeBtn = document.createElement("div");
    removeBtn.innerText = "✕";

    Object.assign(removeBtn.style, {
      position: "absolute",
      top: "4px",
      right: "6px",
      background: "#9c1818",
      color: "white",
      width: "18px",
      height: "18px",
      borderRadius: "50%",
      fontSize: "12px",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      cursor: "pointer"
    });

    removeBtn.onclick = () => {
      allFiles.splice(index, 1);
      renderPreview();
    };

    wrapper.appendChild(img);
    wrapper.appendChild(removeBtn);
    preview.appendChild(wrapper);
  });
}
photoInput.onchange=()=>{
allFiles=[...allFiles,...photoInput.files].slice(0,5);
renderPreview();
};

// SUBMIT
document.getElementById("submitBtn").onclick=async()=>{

const btn=document.getElementById("submitBtn");
btn.classList.add("loading");

try{

const name=document.getElementById("guestName").value.trim();
const email=document.getElementById("guestEmail").value.trim().toLowerCase();
const message=document.getElementById("guestMessage").value.trim();

if(!email){showToast("Enter email");return;}

// ===== CHECK GUEST =====
const { data: guest } = await supabase
  .from("guests")
  .select("*")
  .eq("token", token)
  .eq("email", email)
  .maybeSingle();

if (!guest) {
  showToast("You are not on the guest list.");
  btn.classList.remove("loading");
  return;
}


let urls=[];

for(let file of allFiles){
const fileName=`${crypto.randomUUID()}_${file.name}`;

const {error}=await supabase.storage.from("postwed-photos").upload(fileName,file);
if(error){showToast("Upload error");return;}

const {data}=supabase.storage.from("postwed-photos").getPublicUrl(fileName);
urls.push(data.publicUrl);
}

const { data: existing } = await supabase
  .from("postwed_messages")
  .select("*")
  .eq("token", token)
  .eq("guest_email", email)
  .maybeSingle();

if (existing && (existing.message || existing.photo1)) {
  showToast("You have already submitted your memories ❤️");
  btn.classList.remove("loading");
  return;
}
const { error: insertError } = await supabase
  .from("postwed_messages")
  .insert({
    token,
    guest_email: email,
    guest_name: name,
    message,
    photo1: urls[0] || null,
    photo2: urls[1] || null,
    photo3: urls[2] || null,
    photo4: urls[3] || null,
    photo5: urls[4] || null
  });

if (insertError) {
  console.log(insertError);
  showToast("Error saving");
  btn.classList.remove("loading");
  return;
}

// SUCCESS
document.getElementById("successOverlay").style.display="flex";

// очистка
document.getElementById("guestName").value="";
document.getElementById("guestEmail").value="";
document.getElementById("guestMessage").value="";
allFiles=[];
renderPreview();

}catch(e){
console.log(e);
showToast("Error");
}

btn.classList.remove("loading");
};

document.getElementById("closeOverlay").onclick=()=>{
document.getElementById("successOverlay").style.display="none";
};


const messageInput = document.getElementById("guestMessage");
const wordCount = document.getElementById("wordCount");

messageInput.addEventListener("input", () => {

  let words = messageInput.value.trim().split(/\s+/).filter(w => w.length > 0);

  // ограничение 30 слов
  if (words.length > 30) {
    showToast("Max 30 words please");
    words = words.slice(0, 30);
    messageInput.value = words.join(" ");
  }

  const remaining = 30 - words.length;

  wordCount.innerText = `${remaining} words left`;

  // цвет при приближении к лимиту
  if (remaining <= 5) {
    wordCount.style.color = "#9c1818";
  } else {
    wordCount.style.color = "#a05a5a";
  }

async function loadSiteData() {

  const { data, error } = await supabase
    .from("sites")
    .select("couple_name")
    .eq("token", token)
    .maybeSingle();

  if (error) {
    console.log("SITE LOAD ERROR:", error);
    return;
  }

  if (data && data.couple_name) {
    document.getElementById("pageTitle").innerText =
      `${data.couple_name} Wedding Memories`;
  }

}

loadSiteData();



});
</script>

</body>
</html>
