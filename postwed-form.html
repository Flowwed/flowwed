<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Share Your Wedding Memories</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#fff1f4,#ffffff);
margin:40px auto;
max-width:760px;
padding:0 18px;
color:#6a2a2a;
}

h1{text-align:center;color:#9c1818;}
.form-box{background:white;padding:24px;border-radius:16px;border:2px solid #b41111;}
.field{margin-bottom:16px;}
input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;}
.preview{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;}
button{padding:12px;background:#9c1818;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
button.loading{opacity:.6;pointer-events:none;}
#thanks{display:none;text-align:center;padding:30px;}
</style>
</head>

<body>

<h1>Share Your Wedding Memories</h1>

<div class="form-box">

<div id="formArea">

<div class="field">
<label>Name</label>
<input id="guestName">
</div>

<div class="field">
<label>Email</label>
<input id="guestEmail" type="email">
</div>

<div class="field">
<label>Message</label>
<textarea id="guestMessage"></textarea>
</div>

<div class="field">
<label>Photos (max 5)</label>
<input type="file" id="photoUpload" multiple accept="image/*">
<div id="photoPreview" class="preview"></div>
</div>

<button id="submitBtn">Submit</button>

</div>

<div id="thanks">
<h2>Thank you ❤️</h2>
</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
  "https://octwwpatppbenqwkcqaw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"

);

const token = new URLSearchParams(location.search).get("t");

const photoInput = document.getElementById("photoUpload");
const preview = document.getElementById("photoPreview");

// ===== PREVIEW =====
photoInput.addEventListener("change",()=>{
preview.innerHTML="";
[...photoInput.files].slice(0,5).forEach(file=>{
const reader=new FileReader();
reader.onload=e=>{
const img=document.createElement("img");
img.src=e.target.result;
preview.appendChild(img);
};
reader.readAsDataURL(file);
});
});

// ===== SUBMIT =====
document.getElementById("submitBtn").onclick = async () => {

const btn = document.getElementById("submitBtn");
btn.classList.add("loading");

try {

const email = guestEmail.value.trim().toLowerCase();
const name = guestName.value.trim();
const message = guestMessage.value.trim();

console.log("START SUBMIT");
console.log("TOKEN:", token);
console.log("EMAIL:", email);

// ❗ УБРАЛИ ЖЕСТКУЮ ПРОВЕРКУ ГОСТЯ
// (она ломала тебе всё)

const files = [...photoInput.files].slice(0,5);
let urls = [];

for(let i=0;i<files.length;i++){

const file = files[i];

// 💥 UUID = 100% уникально
const safeName = file.name.replace(/[^a-zA-Z0-9.]/g, "_");

const fileName = `${token}_${crypto.randomUUID()}_${safeName}`;
console.log("UPLOAD:", fileName);

// 💥 FIX: пересоздаём файл (убираем все метаданные)
const cleanFile = new File(
  [await file.arrayBuffer()],
  fileName,
  { type: file.type }
);

const { error } = await supabase.storage
.from("postwed-photos")
.upload(fileName, cleanFile);
if(error){
console.log("UPLOAD ERROR:", error);
continue;
}

const { data } = supabase.storage
.from("postwed-photos")
.getPublicUrl(fileName);

urls.push(data.publicUrl);
}

console.log("UPLOADED URLS:", urls);

// 💥 ВСЕГДА ВСТАВЛЯЕМ НОВУЮ ЗАПИСЬ
const { error: dbError } = await supabase
.from("postwed_messages")
.insert({
token: token,
guest_email: email,
guest_name: name,
message: message,
photo1: urls[0] || null,
photo2: urls[1] || null,
photo3: urls[2] || null,
photo4: urls[3] || null,
photo5: urls[4] || null
});

if(dbError){
console.log("DB ERROR:", dbError);
alert("DB ERROR — открой console");
btn.classList.remove("loading");
return;
}

// SUCCESS
formArea.style.display="none";
thanks.style.display="block";

} catch(err){
console.log("FATAL:", err);
alert("FATAL ERROR");
}

btn.classList.remove("loading");

};
</script>

</body>
</html>
