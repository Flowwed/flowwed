<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guest Archive</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#fff1f4,#ffffff);
margin:40px auto;
max-width:900px;
color:#6a2a2a;
}

/* ARCHIVE */

.archive-box{
background:rgba(255,255,255,0.9);
border-radius:18px;
padding:18px;
border:3px solid #b41111;
box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

.archive-header{
font-weight:800;
color:#9c1818;
margin-bottom:14px;
font-size:20px;
}

.archive-list{
display:flex;
flex-direction:column;
gap:12px;
}

/* folders */

.archive-folder{
border:1px solid #ffc9c9;
border-radius:12px;
overflow:hidden;
background:#fff;
}

.folder-header{
padding:12px;
font-weight:700;
background:#ffe3e3;
cursor:pointer;
}

.folder-header:hover{
background:#ffd0d0;
}

.folder-content{
padding:10px;
display:none;
}

/* items */

.archive-item{
padding:10px;
border-bottom:1px solid #eee;
}

.archive-item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
margin-right:8px;
margin-top:8px;
cursor:pointer;
transition:0.2s;
}

.archive-item img:hover{
transform:scale(1.05);
}

.msg-box{
background:#fff7f9;
padding:10px 12px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #ffd6d6;
line-height:1.4;
}

.archive-photos{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:6px;
}


.info-banner {
  margin: 24px auto 26px;
  max-width: 720px;
  padding: 12px 18px;

  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);

  border-radius: 14px;
  font-size: 15px;
  font-weight: 600;
  color: #7a3a4a;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.12),
    inset 0 1px 2px rgba(255,255,255,0.6);

  text-align: center;
}

.guide-link {
  color: #2a6bff;
  font-weight: 700;
  text-decoration: underline;
  cursor: pointer;
}

.top-nav-wrapper {
  position: relative;
  width: 100%;
}

.back-btn {
  position: absolute;
  left: -200px;
  top: 10px;

  padding: 6px 14px;
  border-radius: 999px;

  background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.18),
      rgba(255,255,255,0.05)
    ),
    #9c1818;

  color: white;
  font-size: 13px;
  font-weight: 600;

  border: 1px solid rgba(255,255,255,0.35);
  cursor: pointer;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.38),
    inset 0 3px 6px rgba(255,255,255,0.22);
transition: transform 0.2s ease, box-shadow 0.2s ease;

}


.back-btn:hover {
  transform: translateY(-2px);

  box-shadow:
    0 12px 26px rgba(0,0,0,0.35),
    inset 0 2px 6px rgba(255,255,255,0.35),
    inset 0 -8px 16px rgba(80,0,20,0.55);
}

.back-btn:active {
  transform: scale(0.96);

  box-shadow:
    inset 0 6px 14px rgba(0,0,0,0.45);
}


.archive-box {
  max-height: 520px;
  overflow-y: auto;
}

.archive-box {
  max-height: 520px;
  overflow-y: auto;
  scroll-behavior: smooth;
}


</style>
</head>

<body>

<div class="top-nav-wrapper">

  <button id="backBtn" class="back-btn" type="button">
    <span>‹</span> Back To Dash
  </button>

</div>

<h1 style="
  text-align:center;
  font-size:32px;
  font-weight:700;
  color:#9c1818;
  margin-bottom:10px;
">
  Guest Memories & Messages
</h1>


<div class="info-banner">
  View how your guest memories are organized and used.
  Open the Quick User Guide
  <span id="openGuide" class="guide-link">here</span>.
</div>

<div class="archive-box">

<div class="archive-header">
📁 Guest Memories & Messages
</div>

<div id="archiveList" class="archive-list"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
"https://octwwpatppbenqwkcqaw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

async function loadArchive(){

const token = new URLSearchParams(location.search).get("t");

console.log("TOKEN:", token);

const { data, error } = await supabase
.from("postwed_messages")
.select("*")
.eq("token", token)
.order("created_at",{ascending:false});

if(error){
console.log(error);
return;
}

const grouped = {};

data.forEach(item=>{
const key = item.guest_email || "unknown";

if(!grouped[key]){
grouped[key] = [];
}

grouped[key].push(item);
});

const list=document.getElementById("archiveList");
list.innerHTML="";

Object.keys(grouped).forEach(email=>{

const folder=document.createElement("div");
folder.className="archive-folder";

const header=document.createElement("div");
header.className="folder-header";
header.textContent="📁 " + email;

const content=document.createElement("div");
content.className="folder-content";
content.style.display = "none";


header.onclick=()=>{
content.style.display =
content.style.display==="none" ? "block" : "none";
};

grouped[email].forEach(item=>{

const photos=[
item.photo1,
item.photo2,
item.photo3,
item.photo4,
item.photo5
].filter(Boolean);

const div=document.createElement("div");
div.className="archive-item";

div.innerHTML=`
<div><b>${item.guest_email}</b></div>

<div class="msg-box">${item.message||""}</div>


<div class="archive-photos">

${photos.map(p=>`
  <img src="${p}" onclick="openPhoto('${p}')">
`).join("")}

</div>
`;

content.appendChild(div);

});

folder.appendChild(header);
folder.appendChild(content);
list.appendChild(folder);

});

}

window.openPhoto = function(src){
const modal = document.getElementById("photoModal");
const img = document.getElementById("photoModalImg");

if(!modal || !img) return;

img.src = src;
modal.style.display = "flex";
};

window.addEventListener("DOMContentLoaded", () => {

loadArchive();   // ← теперь здесь (правильное место)

const modal = document.getElementById("photoModal");

if(modal){
modal.onclick = () => {
modal.style.display = "none";
};
}

});

document.getElementById("openGuide").addEventListener("click", () => {
  document.getElementById("guideModal").style.display = "flex";
});

document.getElementById("closeGuide").addEventListener("click", () => {
  document.getElementById("guideModal").style.display = "none";
});


document.getElementById("backBtn").onclick = () => {

  const params = new URLSearchParams(window.location.search);

  const token =
    params.get("t") ||
    params.get("token") ||
    params.get("TOKEN") ||
    params.get("T");

  window.location.href = `dashboard.html?t=${token}`;
};


</script>


<div id="photoModal" style="
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">

<img id="photoModalImg"
onclick="event.stopPropagation()"
style="
max-width:90%;
max-height:90%;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
">
</div>


<div id="guideModal" style="
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  justify-content: flex-end;
  align-items: flex-start;
  padding-right: 4vw;
  padding-top: 8vh;
  z-index: 999999;
">

  <div style="
    width: 560px;
    height: 64vh;
    background: white;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  ">

    <div id="closeGuide" style="
      position:absolute;
      top:10px;
      right:14px;
      font-size:28px;
      font-weight:bold;
      cursor:pointer;
      z-index:10;
    ">×</div>

    <iframe src="tttguestmemories.html?embed=1" style="
      width:100%;
      height:100%;
      border:none;
    "></iframe>

  </div>
</div>


</body>
</html>
