<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guest Archive</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#fff1f4,#ffffff);
margin:40px auto;
max-width:900px;
color:#6a2a2a;
}

.archive-box{
background:rgba(255,255,255,0.9);
border-radius:18px;
padding:18px;
border:3px solid #b41111;
box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

.archive-header{
font-weight:800;
color:#9c1818;
margin-bottom:14px;
font-size:20px;
}

.archive-list{
display:flex;
flex-direction:column;
gap:12px;
}

.archive-folder{
border:1px solid #ffc9c9;
border-radius:12px;
overflow:hidden;
background:#fff;
}

.folder-header{
padding:12px;
font-weight:700;
background:#ffe3e3;
cursor:pointer;
}

.folder-content{
padding:10px;
display:none;
}

.archive-item{
padding:10px;
border-bottom:1px solid #eee;
}

.archive-item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
margin-right:8px;
margin-top:8px;
cursor:pointer;
}

.msg-box{
background:#fff7f9;
padding:10px 12px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #ffd6d6;
}

.archive-photos{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:6px;
}
</style>
</head>

<body>

<div class="archive-box">
<div class="archive-header">📁 Guest Memories Archive</div>
<div id="archiveList" class="archive-list"></div>
</div>

<!-- VIEW PHOTO -->
<div id="photoModal" style="
position:fixed; inset:0; background:rgba(0,0,0,0.8);
display:none; align-items:center; justify-content:center; z-index:9999;">
<img id="photoModalImg" style="max-width:90%;max-height:90%;border-radius:12px;">
</div>

<!-- SELECT PHOTO -->
<div id="selectPhotoModal" style="
position:fixed; inset:0; background:rgba(0,0,0,0.6);
display:none; align-items:center; justify-content:center; z-index:99999;">

<div style="background:white; position:relative; padding:24px; border-radius:16px; max-width:320px; text-align:center;">

<div id="closeSelectModal" style="position:absolute;top:10px;right:14px;font-size:22px;cursor:pointer;">×</div>

<div style="margin-bottom:18px;">
Add this photo to your gallery?
</div>

<div style="display:flex; gap:12px; justify-content:center;">
<button id="confirmAddPhoto">Yes</button>
<button id="cancelAddPhoto">No</button>
</div>

</div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";

const supabase = createClient(
"https://octwwpatppbenqwkcqaw.supabase.co",
API_KEY
);

let selectedPhotoUrl = null;

/* LOAD ARCHIVE */
async function loadArchive(){
const token = new URLSearchParams(location.search).get("t");

const { data } = await supabase
.from("postwed_messages")
.select("*")
.eq("token", token);

const list = document.getElementById("archiveList");
list.innerHTML = "";

const grouped = {};

data.forEach(item=>{
const key = item.guest_email || "unknown";
if(!grouped[key]) grouped[key]=[];
grouped[key].push(item);
});

Object.keys(grouped).forEach(email=>{
const folder = document.createElement("div");
folder.className="archive-folder";

const header = document.createElement("div");
header.className="folder-header";
header.textContent = email;

const content = document.createElement("div");
content.className="folder-content";

header.onclick = () => {
content.style.display = content.style.display==="block" ? "none":"block";
};

grouped[email].forEach(item=>{
const div = document.createElement("div");

const photos = [item.photo1,item.photo2,item.photo3,item.photo4,item.photo5].filter(Boolean);

div.innerHTML = `
<div>${item.message||""}</div>
<div class="archive-photos">
${photos.map(p=>`<img src="${p}" data-url="${p}">`).join("")}
</div>
`;

content.appendChild(div);
});

folder.appendChild(header);
folder.appendChild(content);
list.appendChild(folder);
});

/* CLICK HANDLER */
document.addEventListener("click",(e)=>{
if(e.target.tagName==="IMG" && e.target.dataset.url){
selectedPhotoUrl = e.target.dataset.url;
document.getElementById("selectPhotoModal").style.display="flex";
}
});
}

loadArchive();

/* MODAL LOGIC */
const selectModal = document.getElementById("selectPhotoModal");
const closeBtn = document.getElementById("closeSelectModal");
const cancelBtn = document.getElementById("cancelAddPhoto");
const confirmBtn = document.getElementById("confirmAddPhoto");

closeBtn.onclick = () => selectModal.style.display="none";
cancelBtn.onclick = () => selectModal.style.display="none";

selectModal.onclick = (e)=>{
if(e.target===selectModal){
selectModal.style.display="none";
}
};

confirmBtn.onclick = async ()=>{
selectModal.style.display="none";

if(!selectedPhotoUrl) return;

const token = new URLSearchParams(window.location.search).get("t");

await fetch(`https://octwwpatppbenqwkcqaw.supabase.co/rest/v1/gallery_images`,{
method:"POST",
headers:{
apikey: API_KEY,
Authorization: "Bearer " + API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
edit_token: token,
slot:"img"+Date.now(),
path:selectedPhotoUrl,
page_key:"just_married"
})
});

alert("done");
};
</script>

</body>
</html>
