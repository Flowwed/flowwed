<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guest Archive</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#fff1f4,#ffffff);
margin:40px auto;
max-width:900px;
color:#6a2a2a;
}

.archive-box{
background:rgba(255,255,255,0.9);
border-radius:18px;
padding:18px;
border:3px solid #b41111;
box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

.archive-header{
font-weight:800;
color:#9c1818;
margin-bottom:14px;
font-size:20px;
}

.archive-list{
display:flex;
flex-direction:column;
gap:12px;
}

.archive-folder{
border:1px solid #ffc9c9;
border-radius:12px;
overflow:hidden;
background:#fff;
}

.folder-header{
padding:12px;
font-weight:700;
background:#ffe3e3;
cursor:pointer;
}

.folder-content{
padding:10px;
display:none;
}

.archive-item{
padding:10px;
border-bottom:1px solid #eee;
}

.archive-item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.msg-box{
background:#fff7f9;
padding:10px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #ffd6d6;
}

.archive-photos{
display:flex;
flex-wrap:wrap;
gap:8px;
}
</style>
</head>

<body>

<div class="archive-box">
<div class="archive-header">📁 Guest Memories Archive</div>
<div id="archiveList" class="archive-list"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const SUPABASE_URL = "https://octwwpatppbenqwkcqaw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedPhotoUrl = null;

async function loadArchive(){
const token = new URLSearchParams(location.search).get("t");

const { data } = await supabase
.from("postwed_messages")
.select("*")
.eq("token", token)
.order("created_at",{ascending:false});

const grouped = {};

data.forEach(item=>{
const key = item.guest_email || "unknown";
if(!grouped[key]) grouped[key] = [];
grouped[key].push(item);
});

const list=document.getElementById("archiveList");
list.innerHTML="";

Object.keys(grouped).forEach(email=>{

const folder=document.createElement("div");
folder.className="archive-folder";

const header=document.createElement("div");
header.className="folder-header";
header.textContent="📁 " + email;

const content=document.createElement("div");
content.className="folder-content";

header.onclick=()=>{
content.style.display =
content.style.display==="none" ? "block" : "none";
};

grouped[email].forEach(item=>{

const photos=[item.photo1,item.photo2,item.photo3,item.photo4,item.photo5].filter(Boolean);

const div=document.createElement("div");
div.className="archive-item";

div.innerHTML=`
<div><b>${item.guest_email}</b></div>
<div class="msg-box">${item.message||""}</div>
<div class="archive-photos">
${photos.map(p=>`<img src="${p}" onclick="selectGuestPhoto('${p}')">`).join("")}
</div>
`;

content.appendChild(div);
});

folder.appendChild(header);
folder.appendChild(content);
list.appendChild(folder);
});
}

loadArchive();

window.selectGuestPhoto = function(url){
selectedPhotoUrl = url;
document.getElementById("selectPhotoModal").style.display = "flex";
};

document.getElementById("cancelAddPhoto").onclick = () => {
document.getElementById("selectPhotoModal").style.display = "none";
};

document.getElementById("confirmAddPhoto").onclick = async () => {

document.getElementById("selectPhotoModal").style.display = "none";

if(!selectedPhotoUrl) return;

const token = new URLSearchParams(window.location.search).get("t");

try{

// 🔥 получить slug
const slugRes = await fetch(
`${SUPABASE_URL}/rest/v1/gallery_images?edit_token=eq.${token}&select=path&limit=1`,
{ headers:{ apikey:SUPABASE_KEY, Authorization:"Bearer "+SUPABASE_KEY }}
);

const slugData = await slugRes.json();
if(!slugData.length){
alert("No gallery yet");
return;
}

const slug = slugData[0].path.split("/")[0];

// 🔥 получить занятые слоты
const slotsRes = await fetch(
`${SUPABASE_URL}/rest/v1/gallery_images?edit_token=eq.${token}&select=slot`,
{ headers:{ apikey:SUPABASE_KEY, Authorization:"Bearer "+SUPABASE_KEY }}
);

const used = (await slotsRes.json()).map(x=>x.slot);

// 🔥 найти слот
let i=51;
while(used.includes("img"+i)) i++;
const slot="img"+i;

// 🔥 собрать path
const fileName = selectedPhotoUrl.split("/").pop();
const finalPath = `${slug}/${slot}/${fileName}`;

// 🔥 вставка
const res = await fetch(
`${SUPABASE_URL}/rest/v1/gallery_images`,
{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
edit_token:token,
slot,
path:finalPath,
page_key:"just_married"
})
}
);

if(res.ok){
alert("✅ Added!");
}else{
alert("❌ Error");
}

}catch(e){
console.error(e);
alert("FAIL");
}
};

</script>

<!-- MODAL -->
<div id="selectPhotoModal" style="
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
">

<div style="background:white;padding:20px;border-radius:12px;">
<div>Would you like to add this photo?</div>

<div style="margin-top:10px;">
<button id="confirmAddPhoto">Yes</button>
<button id="cancelAddPhoto">No</button>
</div>

</div>
</div>

</body>
</html>
