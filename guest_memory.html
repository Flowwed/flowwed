<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guest Archive</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#fff1f4,#ffffff);
margin:40px auto;
max-width:900px;
color:#6a2a2a;
}

/* ARCHIVE */

.archive-box{
background:rgba(255,255,255,0.9);
border-radius:18px;
padding:18px;
border:3px solid #b41111;
box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

.archive-header{
font-weight:800;
color:#9c1818;
margin-bottom:14px;
font-size:20px;
}

.archive-list{
display:flex;
flex-direction:column;
gap:12px;
}

/* folders */

.archive-folder{
border:1px solid #ffc9c9;
border-radius:12px;
overflow:hidden;
background:#fff;
}

.folder-header{
padding:12px;
font-weight:700;
background:#ffe3e3;
cursor:pointer;
}

.folder-header:hover{
background:#ffd0d0;
}

.folder-content{
padding:10px;
display:none;
}

/* items */

.archive-item{
padding:10px;
border-bottom:1px solid #eee;
}

.archive-item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
margin-right:8px;
margin-top:8px;
cursor:pointer;
transition:0.2s;
}

.archive-item img:hover{
transform:scale(1.05);
}

.msg-box{
background:#fff7f9;
padding:10px 12px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #ffd6d6;
line-height:1.4;
}

.archive-photos{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:6px;
}


</style>
</head>

<body>

<div class="archive-box">

<div class="archive-header">
📁 Guest Memories Archive
</div>




<div id="archiveList" class="archive-list"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
"https://octwwpatppbenqwkcqaw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI"
);

async function loadArchive(){

const token = new URLSearchParams(location.search).get("t");

const { data, error } = await supabase
.from("postwed_messages")
.select("*")
.eq("token", token)
.order("created_at",{ascending:false});

if(error){
console.log(error);
return;
}

const grouped = {};

data.forEach(item=>{
const key = item.guest_email || "unknown";

if(!grouped[key]){
grouped[key] = [];
}

grouped[key].push(item);
});

const list=document.getElementById("archiveList");
list.innerHTML="";

Object.keys(grouped).forEach(email=>{

const folder=document.createElement("div");
folder.className="archive-folder";

const header=document.createElement("div");
header.className="folder-header";
header.textContent="📁 " + email;

const content=document.createElement("div");
content.className="folder-content";
content.style.display = "none";


header.onclick=()=>{
content.style.display =
content.style.display==="none" ? "block" : "none";
};

grouped[email].forEach(item=>{

const photos=[
item.photo1,
item.photo2,
item.photo3,
item.photo4,
item.photo5
].filter(Boolean);

const div=document.createElement("div");
div.className="archive-item";

div.innerHTML=`
<div><b>${item.guest_email}</b></div>

<div class="msg-box">${item.message||""}</div>


<div class="archive-photos">

${photos.map(p=>`
  <img src="${p}" onclick="selectGuestPhoto('${p}')">
`).join("")}

</div>
`;

content.appendChild(div);

});

folder.appendChild(header);
folder.appendChild(content);
list.appendChild(folder);

});

}

loadArchive();

window.openPhoto = function(src){
const modal = document.getElementById("photoModal");
const img = document.getElementById("photoModalImg");

if(!modal || !img) return;

img.src = src;
modal.style.display = "flex";
};
window.addEventListener("DOMContentLoaded", () => {

const modal = document.getElementById("photoModal");

if(modal){
modal.onclick = () => {
modal.style.display = "none";
};
}

});


let selectedPhotoUrl = null;

window.selectGuestPhoto = function(url){
selectedPhotoUrl = url;

const modal = document.getElementById("selectPhotoModal");
modal.style.display = "flex";
};

/* кнопка NO */
document.getElementById("cancelAddPhoto").onclick = () => {
document.getElementById("selectPhotoModal").style.display = "none";
};

/* пока YES ничего не делает */

document.getElementById("confirmAddPhoto").onclick = async () => {

document.getElementById("selectPhotoModal").style.display = "none";

if(!selectedPhotoUrl) return;

/* берём token */
const params = new URLSearchParams(window.location.search);
const token = params.get("t") || params.get("token");

/* берём первый свободный слот */
const slot = "img" + Date.now(); // временно уникальный слот

/* записываем в gallery_images */
await fetch(
  `https://octwwpatppbenqwkcqaw.supabase.co/rest/v1/gallery_images`,
  {
    method: "POST",
    headers: {
      apikey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI",

      Authorization: "Bearer " + "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdHd3cGF0cHBiZW5xd2tjcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5NjYxMjYsImV4cCI6MjA3NDU0MjEyNn0.kYX1yCkx3Zl2J_qLHZYcknLnx_aXl26zB--__MzkknI",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      edit_token: token,
      slot: slot,
      path: selectedPhotoUrl,
      page_key: "just_married"
    })
  }
);

alert("Photo added to your gallery!");

};

</script>


<div id="photoModal" style="
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">

<img id="photoModalImg"
onclick="event.stopPropagation()"
style="
max-width:90%;
max-height:90%;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
">
</div>


<div id="selectPhotoModal" style="
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
">

  <div style="
    background:white;
    padding:24px;
    border-radius:16px;
    max-width:320px;
    text-align:center;
  ">

    <div style="font-size:16px; margin-bottom:18px;">
      Would you like to add this photo to your post-wedding gallery?
    </div>

    <div style="display:flex; gap:12px; justify-content:center;">
      <button id="confirmAddPhoto" style="
        padding:10px 18px;
        border:none;
        border-radius:10px;
        background:#c30c1e;
        color:white;
        font-weight:600;
        cursor:pointer;
      ">Yes</button>

      <button id="cancelAddPhoto" style="
        padding:10px 18px;
        border:none;
        border-radius:10px;
        background:#ccc;
        cursor:pointer;
      ">No</button>
    </div>

  </div>

</div>


</body>
</html>
